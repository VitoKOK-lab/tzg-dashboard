<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TZG 金流總覽</title>
<!--
  TZG 金流總覽 — MONEY FLOW OVERVIEW
  ▸ Stripe / Plausible 風格的輕量分析儀表板：白底卡片、大數字 KPI、單軸圖表。
  ▸ 「流動」以動畫呈現：數字滾動、折線描繪、沿線流光、即時訂單跑馬燈、儀表填充。
  ▸ 零外部 JS 依賴（僅 Google Fonts）；所有圖表為手寫 SVG。
  ▸ 資料來源與 live.html 相同：output/dashboard_latest.html 的 const D + annual_plan.json。
  ▸ 參數：?demo=1 展示資料
-->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: light;
  --page: #f7f6f3;
  --surface: #ffffff;
  --ink: #1a1a20;
  --ink-2: #5a5e6b;
  --ink-3: #8a8e9b;
  --hairline: #eceae4;
  --grid: #f0eee9;
  --accent: #e6007e;        /* 品牌粉：主系列 / 今年 */
  --accent-soft: rgba(230, 0, 126, .08);
  --deemph: #9aa1ac;        /* 降調灰：去年（對照用） */
  --gold: #b08d3e;          /* 商品 */
  --indigo: #4f5fb0;        /* 客層 */
  --good: #067647;
  --bad: #d03b3b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  min-height: 100%;
  font-family: 'Montserrat', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  background: var(--page);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
}
/* 背景緩慢流動的品牌色暈（極低飽和，不干擾閱讀） */
.bg-flow { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.blob { position: absolute; width: 55vw; height: 55vw; border-radius: 50%; filter: blur(80px); opacity: .5; }
.blob.b1 { background: radial-gradient(circle, rgba(230,0,126,.07), transparent 65%); top: -18vw; right: -12vw; animation: drift1 26s ease-in-out infinite alternate; }
.blob.b2 { background: radial-gradient(circle, rgba(197,179,130,.10), transparent 65%); bottom: -22vw; left: -14vw; animation: drift2 32s ease-in-out infinite alternate; }
@keyframes drift1 { to { transform: translate(-9vw, 7vw) scale(1.15); } }
@keyframes drift2 { to { transform: translate(8vw, -6vw) scale(1.1); } }

.wrap { position: relative; z-index: 1; max-width: 1240px; margin: 0 auto; padding: 26px 22px 40px; }

/* ── 頁首 ── */
.head { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
.head h1 { font-size: 21px; font-weight: 700; letter-spacing: 3px; }
.head .en { font-size: 10px; letter-spacing: 3px; color: var(--ink-3); font-weight: 600; }
.head .spacer { flex: 1; }
.head .asof { font-size: 12px; color: var(--ink-3); }
.pill {
  font-size: 11px; font-weight: 600; color: var(--ink-2);
  background: var(--surface); border: 1px solid var(--hairline); border-radius: 999px;
  padding: 4px 12px;
}
.pill b { color: var(--accent); }
.demo-badge { font-size: 10px; font-weight: 700; letter-spacing: 1px; color: #fff; background: var(--accent); border-radius: 999px; padding: 3px 10px; }

/* ── 即時金流跑馬燈 ── */
.ticker {
  margin-top: 16px; overflow: hidden; white-space: nowrap; position: relative;
  background: var(--surface); border: 1px solid var(--hairline); border-radius: 12px;
  padding: 9px 0; font-size: 12px; color: var(--ink-2);
  mask-image: linear-gradient(90deg, transparent, #000 4%, #000 96%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 4%, #000 96%, transparent);
}
.ticker-track { display: inline-block; animation: tick var(--tickDur, 60s) linear infinite; will-change: transform; }
.ticker:hover .ticker-track { animation-play-state: paused; }
@keyframes tick { to { transform: translateX(-50%); } }
.tk { display: inline-flex; align-items: center; gap: 8px; padding: 0 26px; }
.tk .t { color: var(--ink-3); font-size: 11px; }
.tk .amt { font-weight: 700; color: var(--accent); }
.tk .sep { color: #d9d2c2; }

/* ── 卡片與網格 ── */
.grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 14px; margin-top: 16px; }
.card {
  background: var(--surface); border: 1px solid var(--hairline); border-radius: 14px;
  padding: 18px 20px;
  box-shadow: 0 1px 2px rgba(24,24,32,.04), 0 10px 28px rgba(24,24,32,.035);
}
.kpi { grid-column: span 3; }
.chart-7 { grid-column: span 12; }
.chart-m { grid-column: span 12; }
.list-card { grid-column: span 4; }
@media (max-width: 980px) {
  .kpi { grid-column: span 6; }
  .list-card { grid-column: span 12; }
}
@media (max-width: 560px) {
  .wrap { padding: 18px 12px 30px; }
  .kpi { grid-column: span 12; }
}

/* ── KPI 卡 ── */
.kpi .label { font-size: 11px; font-weight: 600; letter-spacing: 1px; color: var(--ink-3); }
.kpi .value { margin-top: 8px; font-size: 32px; font-weight: 700; line-height: 1.1; letter-spacing: .5px; }
.kpi.hero .value { font-size: 40px; }
.kpi .sub { margin-top: 7px; font-size: 12px; color: var(--ink-2); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.chip { font-size: 11px; font-weight: 700; border-radius: 999px; padding: 2px 9px; }
.chip.up { color: var(--good); background: rgba(6,118,71,.09); }
.chip.down { color: var(--bad); background: rgba(208,59,59,.08); }
.chip.flat { color: var(--ink-2); background: rgba(90,94,107,.08); }

/* 儀表（同色系軌道） */
.meter { margin-top: 12px; height: 8px; border-radius: 999px; background: var(--accent-soft); overflow: hidden; position: relative; }
.meter .fill {
  height: 100%; width: 0; border-radius: 999px;
  background: linear-gradient(90deg, #ff5fb0, var(--accent));
  transition: width 1.2s cubic-bezier(.2,.7,.2,1); position: relative; overflow: hidden;
}
.meter .fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,.55) 50%, transparent 70%);
  transform: translateX(-100%); animation: sheen 3.2s ease-in-out infinite;
}
@keyframes sheen { 40%, 100% { transform: translateX(100%); } }
.meter.goldy { background: rgba(176,141,62,.12); }
.meter.goldy .fill { background: linear-gradient(90deg, #d9b96a, var(--gold)); }

/* ── 圖表卡通用 ── */
.card-head { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; }
.card-head h2 { font-size: 13px; font-weight: 700; letter-spacing: 1px; }
.card-head .hint { font-size: 11px; color: var(--ink-3); }
.card-head .spacer { flex: 1; }
.legend { display: flex; gap: 14px; font-size: 11px; color: var(--ink-2); }
.legend .key { display: inline-flex; align-items: center; gap: 6px; }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.chart-box { position: relative; }
.chart-box svg { display: block; width: 100%; }

/* 提示框 */
.tip {
  position: absolute; z-index: 5; pointer-events: none; min-width: 130px;
  background: #26262e; color: #fff; border-radius: 10px; padding: 9px 12px;
  font-size: 12px; line-height: 1.75; opacity: 0; transform: translateY(4px);
  transition: opacity .15s, transform .15s; box-shadow: 0 8px 24px rgba(20,20,30,.25);
}
.tip.show { opacity: 1; transform: translateY(0); }
.tip .tt { font-size: 11px; color: #b9bcc8; }
.tip b { font-weight: 700; }
.tip .up { color: #5ad598; } .tip .down { color: #ff8f8f; }

/* ── 排行清單（來源 / 商品 / 客層） ── */
.rows { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
.rowi { position: relative; padding: 8px 10px; border-radius: 8px; overflow: hidden; }
.rowi .bar {
  position: absolute; inset: 0; width: 0; border-radius: 8px;
  transition: width 1s cubic-bezier(.2,.7,.2,1);
}
.rowi.pinkish .bar { background: rgba(230,0,126,.09); }
.rowi.goldish .bar { background: rgba(176,141,62,.13); }
.rowi.indigoish .bar { background: rgba(79,95,176,.11); }
.rowi .fg { position: relative; display: flex; align-items: baseline; gap: 8px; font-size: 12.5px; }
.rowi .nm { font-weight: 600; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }
.rowi .pct { font-size: 11px; color: var(--ink-3); }
.rowi .val { font-weight: 700; font-variant-numeric: tabular-nums; }
.rowi .rk { font-size: 10px; font-weight: 700; color: var(--ink-3); width: 14px; }

/* ── 覆蓋層 ── */
.overlay {
  position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px; background: var(--page);
  transition: opacity .4s; text-align: center; padding: 0 30px;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.overlay .ttl { font-size: 14px; letter-spacing: 4px; color: var(--ink-2); font-weight: 600; }
.overlay p { font-size: 12px; color: var(--ink-3); line-height: 1.8; }
.spin { width: 30px; height: 30px; border-radius: 50%; border: 3px solid #f0e6d8; border-top-color: var(--accent); animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.foot { margin-top: 20px; text-align: center; font-size: 11px; color: var(--ink-3); letter-spacing: 1px; }

@media (prefers-reduced-motion: reduce) {
  .blob, .meter .fill::after, .ticker-track { animation: none !important; }
}
</style>
</head>
<body>
<div class="bg-flow"><div class="blob b1"></div><div class="blob b2"></div></div>

<div class="wrap">
  <div class="head">
    <h1>金流總覽</h1><span class="en">MONEY&ensp;FLOW</span>
    <span id="demoBadge" class="demo-badge" style="display:none">DEMO</span>
    <div class="spacer"></div>
    <span class="pill" id="monthPill" style="display:none"></span>
    <span class="asof" id="asOf"></span>
  </div>

  <div class="ticker" id="ticker" style="display:none"><div class="ticker-track" id="tickerTrack"></div></div>

  <div class="grid">
    <!-- KPI 列 -->
    <div class="card kpi hero">
      <div class="label">本月營收</div>
      <div class="value" id="kMtd">—</div>
      <div class="sub"><span id="kMtdTarget"></span><span class="chip" id="kPace" style="display:none"></span></div>
      <div class="meter"><div class="fill" id="mMtd"></div></div>
    </div>
    <div class="card kpi">
      <div class="label">昨日營收</div>
      <div class="value" id="kYest">—</div>
      <div class="sub"><span id="kYestSub"></span><span class="chip" id="kYestChip" style="display:none"></span></div>
    </div>
    <div class="card kpi">
      <div class="label">本月訂單</div>
      <div class="value" id="kOrders">—</div>
      <div class="sub" id="kOrdersSub"></div>
    </div>
    <div class="card kpi">
      <div class="label">年度累計</div>
      <div class="value" id="kYtd">—</div>
      <div class="sub"><span id="kYtdSub"></span><span class="chip" id="kYtdPace" style="display:none"></span></div>
      <div class="meter goldy"><div class="fill" id="mYtd"></div></div>
    </div>

    <!-- 近七日 -->
    <div class="card chart-7">
      <div class="card-head">
        <h2>近七日營收</h2><span class="hint" id="hint7"></span>
        <div class="spacer"></div>
      </div>
      <div class="chart-box" id="box7"><div class="tip" id="tip7"></div></div>
    </div>

    <!-- 月營收對比 -->
    <div class="card chart-m">
      <div class="card-head">
        <h2>月營收 · 今年 vs 去年</h2><span class="hint" id="hintM"></span>
        <div class="spacer"></div>
        <div class="legend">
          <span class="key"><span class="dot" style="background:var(--accent)"></span><span id="lgY1">今年</span></span>
          <span class="key"><span class="dot" style="background:var(--deemph)"></span><span id="lgY0">去年</span></span>
        </div>
      </div>
      <div class="chart-box" id="boxM"><div class="tip" id="tipM"></div></div>
    </div>

    <!-- 排行清單 -->
    <div class="card list-card">
      <div class="card-head"><h2>訂單來源</h2><div class="spacer"></div><span class="hint">訂單占比</span></div>
      <div class="rows" id="listSrc"></div>
    </div>
    <div class="card list-card">
      <div class="card-head"><h2>熱銷商品 TOP 6</h2><div class="spacer"></div><span class="hint">本月營收</span></div>
      <div class="rows" id="listProd"></div>
    </div>
    <div class="card list-card">
      <div class="card-head"><h2>客戶分層</h2><div class="spacer"></div><span class="hint" id="hintTier"></span></div>
      <div class="rows" id="listTier"></div>
    </div>
  </div>

  <div class="foot">每 10 分鐘自動更新 · TZG 泰熙爾札娜珠寶</div>
</div>

<div class="overlay" id="loadingOverlay"><div class="spin"></div><div class="ttl">金流匯整中</div><p>正在載入營運資料…</p></div>
<div class="overlay hidden" id="errorOverlay"><div class="ttl">暫時無法載入</div><p>資料載入失敗，兩分鐘後自動重試，<br>或請重新整理頁面。</p></div>

<script>
/* ═════════ 0. 工具 ═════════ */
var Q = new URLSearchParams(location.search);
var DEMO = Q.get('demo') === '1';
function $(id) { return document.getElementById(id); }
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function fmt(n) { return '$' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmtWan(n) {
  if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(2) + ' 億';
  if (Math.abs(n) >= 1e6) return Math.round(n / 1e4).toLocaleString() + ' 萬';
  if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(1).replace(/\.0$/, '') + ' 萬';
  return '$' + Math.round(n).toLocaleString();
}
function ymd(t) { var d = new Date(t); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
/* 數字滾動 */
function countUp(el, target, fmtFn, dur) {
  var t0 = performance.now();
  function step(t) {
    var p = clamp((t - t0) / (dur || 900), 0, 1);
    var e = 1 - Math.pow(1 - p, 3);
    el.textContent = fmtFn(target * e);
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

/* ═════════ 1. 展示資料 ═════════ */
var DEMO_D = {
  target: 4500000,
  meta: { report_month: '7月', data_as_of: '（展示模式）', data_as_of_iso: ymd(Date.now() - 864e5) + 'T23:30:00', days_elapsed: 16, days_total: 31 },
  kpi: { rev_mtd: 2318400, orders_mtd: 497, avg_order: 4665, new_customers: 213, returning: 96 },
  yesterday: { rev: 152300, orders: 31 },
  last_7_days: { daily_target: 150000, data: [
    { date: '07/10', rev: 142000, orders: 30 }, { date: '07/11', rev: 168000, orders: 36 },
    { date: '07/12', rev: 131000, orders: 27 }, { date: '07/13', rev: 176500, orders: 39 },
    { date: '07/14', rev: 149800, orders: 33 }, { date: '07/15', rev: 152300, orders: 31 },
    { date: '07/16', rev: 96800, orders: 21, is_today: true }
  ]},
  prod_rev: [
    { name: '定制鉑金戒指', qty: 3, price: 46000, rev: 138000 },
    { name: '925銀戒指 鴿子蛋粉水晶', qty: 6, price: 15000, rev: 90000 },
    { name: '坦桑石手鍊', qty: 8, price: 9000, rev: 72000 },
    { name: '柏捷頓蝴蝶系列', qty: 5, price: 9900, rev: 49500 },
    { name: '招財之石｜金運石', qty: 20, price: 1600, rev: 32000 },
    { name: '愛情的味道｜手鍊', qty: 40, price: 500, rev: 20000 }
  ],
  sources: [
    { src: '業務推薦', orders: 120, rev: 980000 }, { src: 'LINE 來源', orders: 150, rev: 620000 },
    { src: 'Facebook 來源', orders: 110, rev: 450000 }, { src: '內容導流', orders: 90, rev: 210000 },
    { src: '直接/官網', orders: 27, rev: 58400 }
  ],
  active_tiers: [
    { name: '活躍', count: 554 }, { name: '溫層', count: 978 }, { name: '冷卻', count: 1567 },
    { name: '沉睡', count: 1515 }, { name: '流失', count: 612 }
  ],
  customers: [
    { time: '21:18', customer: '徐O雯', products: '坦桑石手鍊', amount: 8223 },
    { time: '20:42', customer: '林O徵', products: '925銀戒指 鴿子蛋粉水晶戒指', amount: 14563 },
    { time: '19:05', customer: '戴O吟', products: 'Loggon碧璽裸石', amount: 1560 },
    { time: '17:56', customer: '丁O芬', products: '太陽之石｜奧勒岡太陽石', amount: 3174 },
    { time: '15:24', customer: 'cO6', products: '定制鉑金戒指', amount: 45063 }
  ].map(function (c) { return { time: ymd(Date.now()) + ' ' + c.time + ':00', customer: c.customer, products: c.products, amount: c.amount }; }),
  monthly_26: [3605872, 4360250, 4571268, 5327966, 5713135, 3571133, 2318400, 0, 0, 0, 0, 0].map(function (r, i) { return { month: (i + 1) + '月', rev: r, current: i === 6 }; }),
  monthly_25: [991786, 1905087, 2685469, 2981757, 2553800, 1951963, 4243254, 4630533, 2940865, 4610805, 4706800, 5100000].map(function (r, i) { return { month: (i + 1) + '月', rev: r }; })
};

/* ═════════ 2. 資料層（與 live.html 同來源） ═════════ */
var LS_KEY = 'tzg_flow_D';
var D = null, annualTarget = 0;
var retryDelay = 60e3, retryTimer = null;
var firstRender = true;

function extractD(html) {
  var i = html.indexOf('const D=');
  if (i < 0) throw new Error('no const D');
  var j = html.indexOf('\n', i); if (j < 0) j = html.length;
  return JSON.parse(html.slice(i + 8, j).trim().replace(/;$/, ''));
}
function applyData(newD, fromCache) {
  var changed = !D || !D.meta || D.meta.data_as_of_iso !== newD.meta.data_as_of_iso;
  D = newD;
  if (changed) renderAll();
  $('loadingOverlay').classList.add('hidden');
  $('errorOverlay').classList.add('hidden');
  if (fromCache) $('asOf').textContent = '⚠ 更新失敗 · 顯示 ' + ((D.meta || {}).data_as_of || '快取') + ' 快取資料';
}
function loadData() {
  if (DEMO) { $('demoBadge').style.display = ''; applyData(DEMO_D, false); return; }
  fetch('output/dashboard_latest.html?_flow=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function (html) {
      var d = extractD(html);
      retryDelay = 60e3;
      try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch (e) {}
      applyData(d, false);
    })
    .catch(function () {
      if (!D) {
        var cached = null;
        try { cached = JSON.parse(localStorage.getItem(LS_KEY)); } catch (e) {}
        if (cached && cached.meta) applyData(cached, true);
        else { $('loadingOverlay').classList.add('hidden'); $('errorOverlay').classList.remove('hidden'); }
      }
      clearTimeout(retryTimer);
      retryTimer = setTimeout(loadData, retryDelay);
      retryDelay = Math.min(retryDelay * 2, 300e3);
    });
  setTimeout(loadData, 10 * 60e3);
}
function loadAnnualPlan() {
  if (DEMO) { annualTarget = 54000000; if (D) renderAll(); return; }
  fetch('annual_plan.json?_flow=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (ap) {
      var sum = 0, mo = (ap && ap.monthly) || {}, yr = new Date().getFullYear();
      for (var m = 1; m <= 12; m++) sum += +mo[yr + '-' + String(m).padStart(2, '0')] || +ap._default_monthly || 0;
      if (sum > 0) { annualTarget = sum; if (D) renderAll(); }
    })
    .catch(function () {});
}
function ytdSum() { var s = 0; ((D && D.monthly_26) || []).forEach(function (m) { s += m.rev || 0; }); return s; }

/* ═════════ 3. KPI 列 ═════════ */
function renderKpis() {
  var kpi = D.kpi || {}, meta = D.meta || {};
  var anim = firstRender;
  function setNum(el, v, f) { anim ? countUp(el, v, f) : (el.textContent = f(v)); }

  // 本月營收 + 月目標
  setNum($('kMtd'), kpi.rev_mtd || 0, fmtWan);
  var pct = D.target > 0 ? (kpi.rev_mtd || 0) / D.target : 0;
  $('kMtdTarget').textContent = D.target > 0 ? '月目標 ' + fmtWan(D.target) + ' · 達成 ' + Math.round(pct * 100) + '%' : '';
  requestAnimationFrame(function () { $('mMtd').style.width = clamp(pct, 0, 1) * 100 + '%'; });
  // 進度 vs 時程
  if (meta.days_total > 0 && D.target > 0) {
    var timePct = (meta.days_elapsed || 0) / meta.days_total;
    var diff = Math.round((pct - timePct) * 100);
    var chip = $('kPace'); chip.style.display = '';
    if (diff >= 2) { chip.className = 'chip up'; chip.textContent = '▲ 超前時程 ' + diff + '%'; }
    else if (diff <= -2) { chip.className = 'chip down'; chip.textContent = '▼ 落後時程 ' + (-diff) + '%'; }
    else { chip.className = 'chip flat'; chip.textContent = '— 與時程同步'; }
  }

  // 昨日
  var y = D.yesterday || {};
  setNum($('kYest'), y.rev || 0, fmtWan);
  $('kYestSub').textContent = (y.orders || 0) + ' 筆訂單';
  var dt = (D.last_7_days && D.last_7_days.daily_target) || 0;
  if (dt > 0) {
    var yp = Math.round((y.rev || 0) / dt * 100);
    var yc = $('kYestChip'); yc.style.display = '';
    yc.className = 'chip ' + (yp >= 100 ? 'up' : 'down');
    yc.textContent = (yp >= 100 ? '▲' : '▼') + ' 日標 ' + yp + '%';
  }

  // 訂單
  setNum($('kOrders'), kpi.orders_mtd || 0, function (v) { return Math.round(v).toLocaleString(); });
  $('kOrdersSub').innerHTML = '客單 <b>' + fmt(kpi.avg_order || 0) + '</b>　新客 <b>' + (kpi.new_customers || 0) + '</b> · 回購 <b>' + (kpi.returning || 0) + '</b>';

  // 年度
  var ytd = ytdSum();
  setNum($('kYtd'), ytd, fmtWan);
  if (annualTarget > 0) {
    var ypct = ytd / annualTarget;
    $('kYtdSub').textContent = '年度目標 ' + fmtWan(annualTarget) + ' · ' + Math.round(ypct * 100) + '%';
    requestAnimationFrame(function () { $('mYtd').style.width = clamp(ypct, 0, 1) * 100 + '%'; });
    var mNow = new Date().getMonth() + 1;
    var yDiff = Math.round((ypct - mNow / 12) * 100);
    var yp2 = $('kYtdPace'); yp2.style.display = '';
    if (yDiff >= 2) { yp2.className = 'chip up'; yp2.textContent = '▲ 超前 ' + yDiff + '%'; }
    else if (yDiff <= -2) { yp2.className = 'chip down'; yp2.textContent = '▼ 落後 ' + (-yDiff) + '%'; }
    else { yp2.className = 'chip flat'; yp2.textContent = '— 同步'; }
  } else $('kYtdSub').textContent = '';

  // 頁首
  $('asOf').textContent = '資料截至 ' + (meta.data_as_of || '—') + (meta.data_as_of_iso ? ' ' + String(meta.data_as_of_iso).slice(11, 16) : '');
  if (meta.days_total > 0) {
    $('monthPill').style.display = '';
    $('monthPill').innerHTML = esc(meta.report_month || '本月') + ' · 第 <b>' + (meta.days_elapsed || 0) + '</b> / ' + meta.days_total + ' 天';
  }
}

/* ═════════ 4. 即時金流跑馬燈 ═════════ */
function renderTicker() {
  var rows = (D.customers || []).slice().sort(function (a, b) { return String(b.time).localeCompare(String(a.time)); }).slice(0, 14);
  if (!rows.length) { $('ticker').style.display = 'none'; return; }
  $('ticker').style.display = '';
  var html = rows.map(function (c) {
    var t = String(c.time || '').slice(11, 16);
    var p = String(c.products || ''); if (p.length > 14) p = p.slice(0, 14) + '…';
    return '<span class="tk"><span class="t">' + esc(t) + '</span>' + esc(c.customer || '') +
      '<span class="sep">✦</span>' + esc(p) + '<span class="sep">✦</span><span class="amt">' + fmt(c.amount || 0) + '</span></span>';
  }).join('');
  var track = $('tickerTrack');
  track.innerHTML = html + html;  // 雙份無縫循環
  track.style.setProperty('--tickDur', clamp(rows.length * 7, 40, 130) + 's');
}

/* ═════════ 5. SVG 圖表工具 ═════════ */
var NS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs) {
  var el = document.createElementNS(NS, tag);
  for (var k in attrs) el.setAttribute(k, attrs[k]);
  return el;
}
/* 乾淨刻度：step 取 1/2/2.5/5×10^k，涵蓋 3–5 格 */
function niceTicks(maxData) {
  if (maxData <= 0) return { max: 1, step: 1, n: 1 };
  var cands = [1, 2, 2.5, 5];
  for (var k = Math.floor(Math.log10(maxData)) - 1; k < Math.floor(Math.log10(maxData)) + 2; k++) {
    for (var c = 0; c < cands.length; c++) {
      var step = cands[c] * Math.pow(10, k);
      var n = Math.ceil(maxData / step);
      if (n >= 3 && n <= 5) return { max: n * step, step: step, n: n };
    }
  }
  return { max: maxData, step: maxData / 4, n: 4 };
}
function tickFmt(v) {
  if (v >= 1e4) { var w = v / 1e4; return (w % 1 ? w.toFixed(1) : w) + '萬'; }
  return Math.round(v).toLocaleString();
}

/* ═════════ 6. 近七日面積圖 ═════════ */
function render7() {
  var box = $('box7'), tip = $('tip7');
  Array.prototype.slice.call(box.querySelectorAll('svg')).forEach(function (s) { s.remove(); });
  var days = ((D.last_7_days || {}).data || []).slice(-7);
  var dt = (D.last_7_days && D.last_7_days.daily_target) || 0;
  if (days.length < 2) return;
  $('hint7').textContent = dt > 0 ? '日標 ' + fmtWan(dt) : '';

  var W = box.clientWidth || 1000, H = 240;
  var padL = 46, padR = 20, padT = 18, padB = 26;
  var iw = W - padL - padR, ih = H - padT - padB;
  var tk = niceTicks(Math.max(dt, Math.max.apply(null, days.map(function (d) { return d.rev || 0; }))) * 1.12);
  var maxV = tk.max;
  var X = function (i) { return padL + iw * i / (days.length - 1); };
  var Y = function (v) { return padT + ih * (1 - v / maxV); };

  var svg = svgEl('svg', { viewBox: '0 0 ' + W + ' ' + H, width: W, height: H });

  // 格線 + 刻度（乾淨整數階）
  for (var g = 0; g <= tk.n; g++) {
    var gv = tk.step * g, gy = Y(gv);
    svg.appendChild(svgEl('line', { x1: padL, x2: W - padR, y1: gy, y2: gy, stroke: 'var(--grid)', 'stroke-width': 1 }));
    var tx = svgEl('text', { x: padL - 8, y: gy + 4, 'text-anchor': 'end', 'font-size': 10, fill: 'var(--ink-3)' });
    tx.textContent = tickFmt(gv);
    svg.appendChild(tx);
  }
  // 日標參考線
  if (dt > 0 && dt < maxV) {
    var ty = Y(dt);
    svg.appendChild(svgEl('line', { x1: padL, x2: W - padR, y1: ty, y2: ty, stroke: '#d9c8a0', 'stroke-width': 1 }));
    var tl = svgEl('text', { x: W - padR, y: ty - 5, 'text-anchor': 'end', 'font-size': 10, fill: '#a08b55', 'font-weight': 600 });
    tl.textContent = '日標';
    svg.appendChild(tl);
  }

  // 平滑路徑（單調 catmull-rom → bezier）
  var pts = days.map(function (d, i) { return [X(i), Y(d.rev || 0)]; });
  var lineD = 'M' + pts[0][0] + ',' + pts[0][1];
  for (var i = 1; i < pts.length; i++) {
    var p0 = pts[Math.max(0, i - 2)], p1 = pts[i - 1], p2 = pts[i], p3 = pts[Math.min(pts.length - 1, i + 1)];
    var c1x = p1[0] + (p2[0] - p0[0]) / 6, c1y = p1[1] + (p2[1] - p0[1]) / 6;
    var c2x = p2[0] - (p3[0] - p1[0]) / 6, c2y = p2[1] - (p3[1] - p1[1]) / 6;
    lineD += 'C' + c1x + ',' + c1y + ' ' + c2x + ',' + c2y + ' ' + p2[0] + ',' + p2[1];
  }
  var base = Y(0);
  var defs = svgEl('defs', {});
  defs.innerHTML = '<linearGradient id="a7" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0" stop-color="#e6007e" stop-opacity=".10"/>' +
    '<stop offset="1" stop-color="#e6007e" stop-opacity="0"/></linearGradient>';
  svg.appendChild(defs);
  svg.appendChild(svgEl('path', { d: lineD + ' L' + pts[pts.length - 1][0] + ',' + base + ' L' + pts[0][0] + ',' + base + ' Z', fill: 'url(#a7)' }));
  var line = svgEl('path', { d: lineD, fill: 'none', stroke: 'var(--accent)', 'stroke-width': 2, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
  svg.appendChild(line);

  // 折線描繪動畫 + 沿線流光（金流感）
  if (firstRender) {
    var len = line.getTotalLength();
    line.style.strokeDasharray = len;
    line.style.strokeDashoffset = len;
    line.getBoundingClientRect();
    line.style.transition = 'stroke-dashoffset 1.3s cubic-bezier(.3,.6,.2,1)';
    line.style.strokeDashoffset = '0';
  }
  var glow = svgEl('circle', { r: 4, fill: '#ffb7dd', opacity: .9 });
  var gm = svgEl('animateMotion', { dur: '5.5s', repeatCount: 'indefinite', path: lineD, keyPoints: '0;1', keyTimes: '0;1', calcMode: 'linear' });
  glow.appendChild(gm);
  svg.appendChild(glow);

  // 節點：白圈粉點；今日放大脈動；端點值標
  var narrow7 = W < 560;
  days.forEach(function (d, i) {
    var cx = pts[i][0], cy = pts[i][1];
    svg.appendChild(svgEl('circle', { cx: cx, cy: cy, r: d.is_today ? 6 : 4.5, fill: 'var(--accent)', stroke: '#fff', 'stroke-width': 2 }));
    // 窄螢幕只標 首/中/末，避免日期重疊
    if (narrow7 && i !== 0 && i !== days.length - 1 && i !== Math.floor((days.length - 1) / 2)) return;
    var dl = svgEl('text', { x: cx, y: H - 8, 'text-anchor': i === 0 ? 'start' : i === days.length - 1 ? 'end' : 'middle', 'font-size': 10.5, fill: d.is_today ? 'var(--ink)' : 'var(--ink-3)', 'font-weight': d.is_today ? 700 : 400 });
    dl.textContent = String(d.date || '').slice(-5) + (d.is_today ? ' 今日' : '');
    svg.appendChild(dl);
  });
  // 選擇性直標：最高日 + 最後一點
  var maxI = 0; days.forEach(function (d, i) { if ((d.rev || 0) > (days[maxI].rev || 0)) maxI = i; });
  [maxI, days.length - 1].filter(function (v, i, a) { return a.indexOf(v) === i; }).forEach(function (i) {
    var vl = svgEl('text', { x: pts[i][0], y: pts[i][1] - 11, 'text-anchor': i === days.length - 1 ? 'end' : 'middle', 'font-size': 11, 'font-weight': 700, fill: 'var(--ink)' });
    vl.textContent = fmtWan(days[i].rev || 0);
    svg.appendChild(vl);
  });

  // 十字游標 + 提示框
  var cross = svgEl('line', { y1: padT, y2: padT + ih, stroke: 'var(--deemph)', 'stroke-width': 1, opacity: 0 });
  svg.appendChild(cross);
  svg.addEventListener('mousemove', function (e) {
    var r = svg.getBoundingClientRect();
    var mx = (e.clientX - r.left) * (W / r.width);
    var i = clamp(Math.round((mx - padL) / iw * (days.length - 1)), 0, days.length - 1);
    var d = days[i];
    cross.setAttribute('x1', pts[i][0]); cross.setAttribute('x2', pts[i][0]);
    cross.setAttribute('opacity', .5);
    var pr = dt > 0 ? Math.round((d.rev || 0) / dt * 100) : null;
    tip.innerHTML = '<span class="tt">' + esc(d.date || '') + (d.is_today ? ' · 今日' : '') + '</span><br>營收 <b>' + fmt(d.rev || 0) + '</b><br>' +
      '訂單 <b>' + (d.orders || 0) + '</b> 筆' + (pr !== null ? '<br>日標 <span class="' + (pr >= 100 ? 'up' : 'down') + '">' + pr + '%</span>' : '');
    tip.classList.add('show');
    var bx = box.getBoundingClientRect();
    var tx2 = e.clientX - bx.left + 14;
    if (tx2 > bx.width - 160) tx2 = e.clientX - bx.left - 160;
    tip.style.left = tx2 + 'px';
    tip.style.top = clamp(e.clientY - bx.top - 30, 0, H - 90) + 'px';
  });
  svg.addEventListener('mouseleave', function () { cross.setAttribute('opacity', 0); tip.classList.remove('show'); });
  box.appendChild(svg);
}

/* ═════════ 7. 月營收成組長條 ═════════ */
function renderM() {
  var box = $('boxM'), tip = $('tipM');
  Array.prototype.slice.call(box.querySelectorAll('svg')).forEach(function (s) { s.remove(); });
  var m26 = D.monthly_26 || [], m25 = D.monthly_25 || [];
  if (!m26.length && !m25.length) return;
  var yr = new Date().getFullYear();
  $('lgY1').textContent = yr; $('lgY0').textContent = yr - 1;

  var W = box.clientWidth || 1000, H = 250;
  var padL = 46, padR = 14, padT = 20, padB = 26;
  var iw = W - padL - padR, ih = H - padT - padB;
  var maxV = 1;
  for (var i = 0; i < 12; i++) maxV = Math.max(maxV, (m26[i] || {}).rev || 0, (m25[i] || {}).rev || 0);
  var tkM = niceTicks(maxV * 1.06);
  maxV = tkM.max;
  var Y = function (v) { return padT + ih * (1 - v / maxV); };
  var band = iw / 12;
  var bw = Math.min(24, (band - 14) / 2);  // ≤24px、含 2px 雙條間隙
  var svg = svgEl('svg', { viewBox: '0 0 ' + W + ' ' + H, width: W, height: H });

  for (var g = 0; g <= tkM.n; g++) {
    var gv = tkM.step * g, gy = Y(gv);
    svg.appendChild(svgEl('line', { x1: padL, x2: W - padR, y1: gy, y2: gy, stroke: 'var(--grid)', 'stroke-width': 1 }));
    var tx = svgEl('text', { x: padL - 8, y: gy + 4, 'text-anchor': 'end', 'font-size': 10, fill: 'var(--ink-3)' });
    tx.textContent = tickFmt(gv);
    svg.appendChild(tx);
  }

  var maxI26 = -1, maxR26 = 0, curI = -1;
  m26.forEach(function (m, i) { if ((m.rev || 0) > maxR26) { maxR26 = m.rev || 0; maxI26 = i; } if (m.current) curI = i; });

  function bar(x, v, color, delay) {
    if (v <= 0) return null;
    var h = Math.max(2, Y(0) - Y(v));
    var rr = Math.min(4, h / 2);
    // 頂端 4px 圓角、底部平角
    var d = 'M' + x + ',' + Y(0) + ' L' + x + ',' + (Y(v) + rr) + ' Q' + x + ',' + Y(v) + ' ' + (x + rr) + ',' + Y(v) +
      ' L' + (x + bw - rr) + ',' + Y(v) + ' Q' + (x + bw) + ',' + Y(v) + ' ' + (x + bw) + ',' + (Y(v) + rr) +
      ' L' + (x + bw) + ',' + Y(0) + ' Z';
    var p = svgEl('path', { d: d, fill: color });
    if (firstRender) {
      p.style.transformOrigin = '0 ' + Y(0) + 'px';
      p.style.transform = 'scaleY(0)';
      p.getBoundingClientRect();
      p.style.transition = 'transform .7s cubic-bezier(.2,.7,.2,1) ' + delay + 'ms';
      requestAnimationFrame(function () { p.style.transform = 'scaleY(1)'; });
    }
    return p;
  }

  for (var mi = 0; mi < 12; mi++) {
    var r26 = (m26[mi] || {}).rev || 0, r25 = (m25[mi] || {}).rev || 0;
    var cx0 = padL + band * mi + (band - bw * 2 - 2) / 2;
    var b1 = bar(cx0, r26, 'var(--accent)', mi * 45);
    var b0 = bar(cx0 + bw + 2, r25, 'var(--deemph)', mi * 45 + 60);
    if (b1) svg.appendChild(b1);
    if (b0) svg.appendChild(b0);
    // 月標籤（窄螢幕隔月標示，當前月必標）
    if (band >= 34 || mi % 2 === 0 || mi === curI) {
      var ml = svgEl('text', { x: padL + band * mi + band / 2, y: H - 8, 'text-anchor': 'middle', 'font-size': 10.5, fill: mi === curI ? 'var(--ink)' : 'var(--ink-3)', 'font-weight': mi === curI ? 700 : 400 });
      ml.textContent = (mi + 1) + '月';
      svg.appendChild(ml);
    }
    // 選擇性直標：今年最高月 + 當前月
    if (r26 > 0 && (mi === maxI26 || mi === curI)) {
      var vl = svgEl('text', { x: cx0 + bw / 2, y: Y(r26) - 6, 'text-anchor': 'middle', 'font-size': 10.5, 'font-weight': 700, fill: 'var(--ink)' });
      vl.textContent = fmtWan(r26);
      svg.appendChild(vl);
    }
    // hover 區
    (function (mi, r26, r25) {
      var hot = svgEl('rect', { x: padL + band * mi, y: padT, width: band, height: ih + padB, fill: 'transparent' });
      hot.addEventListener('mousemove', function (e) {
        var yoy = r25 > 0 && r26 > 0 ? Math.round((r26 / r25 - 1) * 100) : null;
        tip.innerHTML = '<span class="tt">' + (mi + 1) + ' 月</span><br>' +
          yr + ' <b>' + (r26 > 0 ? fmt(r26) : '—') + '</b><br>' +
          (yr - 1) + ' ' + (r25 > 0 ? fmt(r25) : '—') +
          (yoy !== null ? '<br>年增 <span class="' + (yoy >= 0 ? 'up' : 'down') + '">' + (yoy >= 0 ? '+' : '') + yoy + '%</span>' : '');
        tip.classList.add('show');
        var bx = box.getBoundingClientRect();
        var tx2 = e.clientX - bx.left + 14;
        if (tx2 > bx.width - 160) tx2 = e.clientX - bx.left - 160;
        tip.style.left = tx2 + 'px';
        tip.style.top = clamp(e.clientY - bx.top - 30, 0, H - 100) + 'px';
      });
      hot.addEventListener('mouseleave', function () { tip.classList.remove('show'); });
      svg.appendChild(hot);
    })(mi, r26, r25);
  }
  // 年增摘要
  var s26 = 0, s25 = 0;
  for (var si = 0; si < 12; si++) {
    if (((m26[si] || {}).rev || 0) > 0) { s26 += m26[si].rev; s25 += (m25[si] || {}).rev || 0; }
  }
  $('hintM').textContent = s25 > 0 ? '同期年增 ' + (s26 >= s25 ? '+' : '') + Math.round((s26 / s25 - 1) * 100) + '%' : '';
  box.appendChild(svg);
}

/* ═════════ 8. 排行清單 ═════════ */
function renderList(elId, items, cls, opt) {
  var host = $(elId);
  host.innerHTML = '';
  var maxV = 1; items.forEach(function (it) { maxV = Math.max(maxV, it.v || 0); });
  items.forEach(function (it, i) {
    var row = document.createElement('div');
    row.className = 'rowi ' + cls;
    row.innerHTML = '<div class="bar"></div><div class="fg">' +
      (opt.rank ? '<span class="rk">' + (i + 1) + '</span>' : '') +
      '<span class="nm" title="' + esc(it.name) + '">' + esc(it.name) + '</span>' +
      (it.pct != null ? '<span class="pct">' + it.pct + '</span>' : '') +
      '<span class="val">' + it.val + '</span></div>';
    host.appendChild(row);
    var w = (it.v || 0) / maxV * 100;
    var barEl = row.querySelector('.bar');
    if (firstRender) setTimeout(function () { barEl.style.width = w + '%'; }, 80 + i * 70);
    else barEl.style.width = w + '%';
  });
}
function renderLists() {
  var srcs = (D.sources || []).slice(0, 5).sort(function (a, b) { return (b.orders || 0) - (a.orders || 0); });
  var totO = 0; srcs.forEach(function (s) { totO += s.orders || 0; });
  renderList('listSrc', srcs.map(function (s) {
    return { name: s.src || '來源', v: s.orders || 0, pct: totO > 0 ? Math.round((s.orders || 0) / totO * 100) + '%' : null, val: fmtWan(s.rev || 0) };
  }), 'pinkish', {});

  var prods = (D.prod_rev || []).slice(0, 6);
  renderList('listProd', prods.map(function (p) {
    return { name: p.name || '商品', v: p.rev || 0, pct: (p.qty || 0) + ' 件', val: fmtWan(p.rev || 0) };
  }), 'goldish', { rank: true });

  var tiers = (D.active_tiers || []).slice(0, 5);
  var totT = 0; tiers.forEach(function (t) { totT += t.count || 0; });
  $('hintTier').textContent = totT > 0 ? '共 ' + totT.toLocaleString() + ' 位' : '';
  renderList('listTier', tiers.map(function (t) {
    return { name: t.name || '—', v: t.count || 0, pct: totT > 0 ? Math.round((t.count || 0) / totT * 100) + '%' : null, val: (t.count || 0).toLocaleString() };
  }), 'indigoish', {});
}

/* ═════════ 9. 總渲染 ═════════ */
function renderAll() {
  if (!D) return;
  renderKpis();
  renderTicker();
  render7();
  renderM();
  renderLists();
  firstRender = false;
}
var rzT = null;
addEventListener('resize', function () {
  clearTimeout(rzT);
  rzT = setTimeout(function () { if (D) { render7(); renderM(); } }, 180);
});

window.__flow = { ok: true, debugState: function () { return { ok: true, mode: 'svg-dashboard' }; } };
loadData();
loadAnnualPlan();
