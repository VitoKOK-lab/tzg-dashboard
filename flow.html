    12 顆行星＝12 個月營收（大小∝營收、沿軌道公轉、最大月有土星環、當月行星有信標+衛星）
    地球＝客戶星球（大氣光暈+5 圈衛星帶＝客戶分層）
    5 座太空站＝訂單來源（貨運飛船持續飛向太陽、班次∝訂單占比、引擎尾流）
    6 顆寶石隕石＝熱銷商品（珠寶水晶，大小∝營收）
    全息面板＝近七日營收　航運日誌＝即時訂單
  ▸ 資料來源與 live.html 相同：output/dashboard_latest.html 的 const D + annual_plan.json。
  ▸ 參數：?demo=1 展示資料　?lite=1 低規格　?debug=1 顯示 draw calls

<style>

#card {

#card.hide { opacity: 0; transform: translateY(8px); }

#ticker {
  position: fixed; z-index: 5; left: 0; right: 0; bottom: 0; height: 30px;

.ticker-track { display: inline-block; animation: tick var(--tickDur, 70s) linear infinite; will-change: transform; }
@keyframes tick { to { transform: translateX(-50%); } }
.tk { display: inline-flex; align-items: center; gap: 7px; padding: 0 24px; font-size: 11px; color: #8b98c4; }
.tk .t { color: #55648f; font-size: 10px; }
.tk .amt { font-weight: 700; color: #ffd98e; }
.tk .sep { color: #2c3a63; }

#hint { position: fixed; z-index: 4; bottom: 36px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 2px; color: #46527c; pointer-events: none; }
#dbg { position: fixed; z-index: 5; top: 118px; left: 20px; font-size: 10px; color: #46527c; display: none; }

  #card { left: 10px; right: auto; bottom: 40px; max-width: 70vw; z-index: 7; }
  #hint { display: none; }

<script type="module">
import * as THREE from 'three';

/* ═════════ 0. 參數與工具 ═════════ */
var Q = new URLSearchParams(location.search);

var LITE = Q.get('lite') === '1' || (Math.min(screen.width, screen.height) < 620 && window.devicePixelRatio > 2);
var DEBUG = Q.get('debug') === '1';
function $(id) { return document.getElementById(id); }
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function fmt(n) { return '$' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmtWan(n) {
  if (Math.abs(n) >= 1e8) return (n / 1e8).toFixed(2) + ' 億';
  if (Math.abs(n) >= 1e6) return Math.round(n / 1e4).toLocaleString() + ' 萬';
  if (Math.abs(n) >= 1e4) return (n / 1e4).toFixed(1).replace(/\.0$/, '') + ' 萬';
  return '$' + Math.round(n).toLocaleString();
}
function ymd(t) { var d = new Date(t); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }

/* ═════════ 1. 展示資料 ═════════ */

  ].map(function (c) { return { time: ymd(Date.now()) + ' ' + c.time + ':00', customer: c.customer, products: c.products, amount: c.amount }; }),
  monthly_26: [3605872, 4360250, 4571268, 5327966, 5713135, 3571133, 2318400, 0, 0, 0, 0, 0].map(function (r, i) { return { month: (i + 1) + '月', rev: r, current: i === 6 }; }),

};

/* ═════════ 2. 資料層 ═════════ */
var LS_KEY = 'tzg_flow_D';
var D = null, annualTarget = 0;
var retryDelay = 60e3, retryTimer = null;

function extractD(html) {
  var i = html.indexOf('const D=');
  if (i < 0) throw new Error('no const D');
  var j = html.indexOf('\n', i); if (j < 0) j = html.length;
  return JSON.parse(html.slice(i + 8, j).trim().replace(/;$/, ''));
}
function applyData(newD, fromCache) {
  var changed = !D || !D.meta || D.meta.data_as_of_iso !== newD.meta.data_as_of_iso;
  D = newD;
  if (changed) { renderHud(); buildSystem(); }
  $('loadingOverlay').classList.add('hidden');

  if (fromCache) $('asOf').textContent = '⚠ 更新失敗 · 顯示 ' + ((D.meta || {}).data_as_of || '快取') + ' 快取資料';
}
function loadData() {
  if (DEMO) { $('demoBadge').style.display = ''; applyData(DEMO_D, false); return; }
  fetch('output/dashboard_latest.html?_flow=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function (html) {
      var d = extractD(html);
      retryDelay = 60e3;
      try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch (e) {}
      applyData(d, false);
    })
    .catch(function () {
      if (!D) {
        var cached = null;
        try { cached = JSON.parse(localStorage.getItem(LS_KEY)); } catch (e) {}
        if (cached && cached.meta) applyData(cached, true);
        else { $('loadingOverlay').classList.add('hidden'); $('errorOverlay').classList.remove('hidden'); }
      }
      clearTimeout(retryTimer);
      retryTimer = setTimeout(loadData, retryDelay);
      retryDelay = Math.min(retryDelay * 2, 300e3);
    });

}
function loadAnnualPlan() {
  if (DEMO) { annualTarget = 54000000; if (D) { renderHud(); } return; }
  fetch('annual_plan.json?_flow=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (ap) {
      var sum = 0, mo = (ap && ap.monthly) || {}, yr = new Date().getFullYear();

}
function ytdSum() { var s = 0; ((D && D.monthly_26) || []).forEach(function (m) { s += m.rev || 0; }); return s; }

/* ═════════ 3. HUD（KPI 晶片 / 全息七日 / 航運日誌） ═════════ */
function renderHud() {
  var kpi = (D && D.kpi) || {}, meta = (D && D.meta) || {};
  $('asOf').textContent = '資料截至 ' + (meta.data_as_of || '—') + (meta.data_as_of_iso ? ' ' + String(meta.data_as_of_iso).slice(11, 16) : '');
  $('chipMtd').textContent = fmtWan(kpi.rev_mtd || 0);
  var pct = D.target > 0 ? Math.round((kpi.rev_mtd || 0) / D.target * 100) : 0;
  $('chipMtdS').innerHTML = D.target > 0 ? '月目標達成 ' + pct + '%' : '';
  var y = D.yesterday || {};
  $('chipYest').textContent = fmtWan(y.rev || 0);
  var dt = (D.last_7_days && D.last_7_days.daily_target) || 0;
  if (dt > 0) {
    var yp = Math.round((y.rev || 0) / dt * 100);
    $('chipYestS').innerHTML = '日標 <span class="' + (yp >= 100 ? 'up' : 'down') + '">' + yp + '%</span>';
  } else $('chipYestS').textContent = (y.orders || 0) + ' 筆';
  var ytd = ytdSum();
  $('chipYtd').textContent = fmtWan(ytd);
  $('chipYtdS').textContent = annualTarget > 0 ? '年度目標 ' + Math.round(ytd / annualTarget * 100) + '%' : '';
  renderHolo();
  renderTicker();
}

/* 全息七日面積圖（小型 SVG） */
function renderHolo() {
  var days = ((D.last_7_days || {}).data || []).slice(-7);
  var dt = (D.last_7_days && D.last_7_days.daily_target) || 0;
  var host = $('holoChart');
  if (days.length < 2) { host.innerHTML = ''; return; }
  $('holoTarget').textContent = dt > 0 ? '日標 ' + fmtWan(dt) : '';
  var W = 302, H = 108, padL = 4, padR = 10, padT = 18, padB = 16;
  var iw = W - padL - padR, ih = H - padT - padB;
  var maxV = 1; days.forEach(function (d) { maxV = Math.max(maxV, d.rev || 0); }); maxV = Math.max(maxV, dt) * 1.15;
  var X = function (i) { return padL + iw * i / (days.length - 1); };
  var Y = function (v) { return padT + ih * (1 - v / maxV); };
  var pts = days.map(function (d, i) { return [X(i), Y(d.rev || 0)]; });
  var lineD = 'M' + pts.map(function (p) { return p[0] + ',' + p[1]; }).join(' L');
  var maxI = 0; days.forEach(function (d, i) { if ((d.rev || 0) > (days[maxI].rev || 0)) maxI = i; });
  var html = '<svg viewBox="0 0 ' + W + ' ' + H + '">' +
    '<defs><linearGradient id="hg" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0" stop-color="#4ff5e8" stop-opacity=".28"/><stop offset="1" stop-color="#4ff5e8" stop-opacity="0"/></linearGradient>' +
    '<filter id="hb" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>';
  if (dt > 0 && dt < maxV) {
    var ty = Y(dt);
    html += '<line x1="' + padL + '" x2="' + (W - padR) + '" y1="' + ty + '" y2="' + ty + '" stroke="#ffd98e" stroke-opacity=".35" stroke-width="1"/>';
  }
  html += '<path d="' + lineD + ' L' + pts[pts.length - 1][0] + ',' + Y(0) + ' L' + pts[0][0] + ',' + Y(0) + ' Z" fill="url(#hg)"/>';
  html += '<path d="' + lineD + '" fill="none" stroke="#4ff5e8" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" filter="url(#hb)"/>';

    var seg = 110, lpts = [];
    for (var li = 0; li <= seg; li++) {
      var la = li / seg * Math.PI * 2;
      lpts.push(new THREE.Vector3(SUN_POS.x + Math.cos(la) * orbitR, SUN_POS.y, SUN_POS.z + Math.sin(la) * orbitR));
    }
    orbitLineGeos.push(new THREE.BufferGeometry().setFromPoints(lpts));
    // 軌道資訊流：光點沿軌道飛馳（數量 ∝ 該月營收，未來月份留微弱訊號）
    orbitPts.push({
      center: SUN_POS, u: FLAT_U, v: FLAT_V,
      r: [orbitR - 0.06, orbitR + 0.06],
      n: r26 > 0 ? Math.max(10, Math.round(64 * K * r26 / maxM)) : Math.round(5 * K) + 2,
      colors: [new THREE.Color(0xffe9b8), new THREE.Color(0x9fe8ff)],
      size: r26 > 0 ? 1.9 : 1.3,
      spd: mi % 2 ? [-0.34, -0.16] : [0.16, 0.34]
    });
    if (r26 <= 0 && !isCur) continue;   // 未來月份只留軌道線與微弱訊號
    var pr = 0.55 + Math.pow(r26 / maxM, 0.7) * 0.85;
    var pmesh = new THREE.Mesh(
      new THREE.SphereGeometry(pr, 26, 18),
      new THREE.MeshLambertMaterial({ map: planetTexture(PLANET_STYLES[mi][0], PLANET_STYLES[mi][1]), emissive: isCur ? 0x332211 : 0x000000 })
    );
    pmesh.userData = { kind: 'month', i: mi, r26: r26, r25: r25 };
    gal.add(pmesh); hitMeshes.push(pmesh);
    // 土星環：今年最大月
    if (mi === maxI && r26 > 0) {
      var ring = new THREE.Mesh(
        new THREE.RingGeometry(pr * 1.5, pr * 2.3, 40),
        new THREE.MeshBasicMaterial({ color: 0xe8cf9a, transparent: true, opacity: 0.55, side: THREE.DoubleSide })
      );
      ring.rotation.x = -Math.PI / 2 + 0.35;
      pmesh.add(ring);
    }
    var lbl = makeLabel([(mi + 1) + '月 ' + fmtWan(r26)], { fs: 20, scale: 0.021, color: isCur ? '#fff3cf' : '#c8d4f4', opacity: isCur ? 1 : 0.85 });
    gal.add(lbl);
    planets.push({
      mesh: pmesh, label: lbl, orbitR: orbitR, radius: pr,
      angle: -Math.PI / 2 + mi * 2.4,
      speed: (0.16 / Math.sqrt(orbitR / 8.6)) * (LITE ? 0.7 : 1),
      isCur: isCur
    });
    if (isCur) {
      beaconSprite = makeGlow(0xfff3cf, pr * 5, 0.7);
      gal.add(beaconSprite);
      // 當月衛星
      var moon = new THREE.Mesh(new THREE.SphereGeometry(pr * 0.26, 12, 8), new THREE.MeshLambertMaterial({ color: 0xd8dce8 }));
      pmesh.add(moon);
      planets[planets.length - 1].moon = moon;
    }
  }
  var mergedOrbit = mergeGeometries(orbitLineGeos.map(function (g2) {
    // LineLoop 合併：轉成 line segments 頂點對
    var pos = g2.getAttribute('position');
    var segPts = [];
    for (var i = 0; i < pos.count - 1; i++) {
      segPts.push(pos.getX(i), pos.getY(i), pos.getZ(i), pos.getX(i + 1), pos.getY(i + 1), pos.getZ(i + 1));
    }
    var sg = new THREE.BufferGeometry();
    sg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(segPts), 3));
    return sg;
  }), false);
  orbitLineGeos.forEach(function (g2) { g2.dispose(); });
  var orbitLines = new THREE.LineSegments(mergedOrbit, new THREE.LineBasicMaterial({ color: 0x3a4a7c, transparent: true, opacity: 0.35 }));
  gal.add(orbitLines);

  /* —— 地球（客戶星球）＋ 衛星帶 —— */
  var EARTH_POS = new THREE.Vector3(-26.5, 3.5, 13);
  earthMesh = new THREE.Mesh(new THREE.SphereGeometry(3.1, 36, 24), new THREE.MeshLambertMaterial({ map: earthTexture() }));
  earthMesh.position.copy(EARTH_POS);
  var tiers = (D.active_tiers || []).slice(0, 5);
  var totT = 0; tiers.forEach(function (t) { totT += t.count || 0; });
  earthMesh.userData = { kind: 'earth', tiers: tiers, total: totT };
  gal.add(earthMesh); hitMeshes.push(earthMesh);
  var atmo = makeGlow(0x6fc4ff, 9, 0.38); atmo.position.copy(EARTH_POS); gal.add(atmo);
  var TIER_COLS = [0xffd98e, 0xff9e6b, 0xff6fb8, 0x8b7bff, 0x51649c];
  tiers.forEach(function (t, ti) {
    var tilt = 0.5 + ti * 0.12;
    var u = new THREE.Vector3(1, 0, 0);
    var v = new THREE.Vector3(0, Math.sin(tilt), Math.cos(tilt));
    orbitPts.push({
      center: EARTH_POS, u: u, v: v,
      r: [4.1 + ti * 0.85, 4.5 + ti * 0.85],
      n: Math.max(60, Math.round(2100 * K * (t.count || 0) / Math.max(1, totT))),
      colors: [new THREE.Color(TIER_COLS[ti])],
      size: 1.9 - ti * 0.14,
      spd: ti % 2 ? [-0.6, -0.35] : [0.35, 0.6]
    });
    // 每層再加一批較大的「衛星」亮點
    orbitPts.push({
      center: EARTH_POS, u: u, v: v,
      r: [4.2 + ti * 0.85, 4.4 + ti * 0.85],
      n: Math.round(14 * K) + 4,
      colors: [new THREE.Color(0xeaf4ff), new THREE.Color(TIER_COLS[ti])],
      size: 3.2,
      spd: ti % 2 ? [-0.8, -0.5] : [0.5, 0.8]
    });
  });
  var eLbl = makeLabel(['客戶星球', '共 ' + totT.toLocaleString() + ' 位 · 5 層衛星帶'], { fs: 24, sub: 17, scale: 0.024, color: '#a8d8ff' });
  eLbl.position.copy(EARTH_POS).add(new THREE.Vector3(0, 8.2, 0));
  gal.add(eLbl);

  /* —— 5 座太空站（訂單來源）＋ 貨運航線 —— */
  var srcs = (D.sources || []).slice(0, 5);
  var totO = 1; srcs.forEach(function (s2) { totO += s2.orders || 0; });
  var shipGeo = (function () {
    var body = new THREE.CylinderGeometry(0.13, 0.2, 0.62, 8);
    body.rotateX(Math.PI / 2);
    var nose = new THREE.ConeGeometry(0.13, 0.34, 8);
    nose.rotateX(Math.PI / 2); nose.translate(0, 0, 0.48);
    var wing = new THREE.BoxGeometry(0.72, 0.05, 0.24);
    wing.translate(0, 0, -0.1);
    var fin = new THREE.BoxGeometry(0.05, 0.3, 0.2);
    fin.translate(0, 0.14, -0.2);
    return mergeGeometries([body, nose, wing, fin], false);
  })();
  var totalShips = 0;
  var routes = [];
  srcs.forEach(function (s2, i) {
    var a = (140 + i * 24) * Math.PI / 180;
    var pos = new THREE.Vector3(Math.cos(a) * 34.5, 15 - i * 2.4, Math.sin(a) * 24 - 8);
    var col = new THREE.Color(SRC_COLS[i % SRC_COLS.length]);
    // 太空站：環 + 核心
    var st = new THREE.Group();
    var torus = new THREE.Mesh(new THREE.TorusGeometry(1.15, 0.16, 10, 26), new THREE.MeshLambertMaterial({ color: 0x9aa8c8 }));
    var core = new THREE.Mesh(new THREE.SphereGeometry(0.62, 14, 10), new THREE.MeshLambertMaterial({ color: col, emissive: col, emissiveIntensity: 0.35 }));
    var spoke = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 2.3, 6), new THREE.MeshLambertMaterial({ color: 0x707c9c }));
    st.add(torus); st.add(core); st.add(spoke);
    st.position.copy(pos);
    st.rotation.set(0.6, 0.4 + i, 0);
    core.userData = { kind: 'src', d: s2, share: (s2.orders || 0) / totO };
    gal.add(st); hitMeshes.push(core);
    var glow = makeGlow(col.getHex(), 3.6, 0.5); glow.position.copy(pos); gal.add(glow);
    var share = (s2.orders || 0) / totO;
    var lbl = makeLabel([s2.src || '來源', Math.round(share * 100) + '% · ' + fmtWan(s2.rev || 0)], { fs: 21, sub: 16, scale: 0.024, color: '#' + col.getHexString() });
    lbl.position.copy(pos).add(new THREE.Vector3(0, 2.5 + (i % 2) * 1.4, 0));
    gal.add(lbl);
    // 航線（貝茲）＋ 引擎尾流：每條來源航線多艘艦隊魚貫飛行
    var mid = pos.clone().lerp(SUN_POS, 0.5).add(new THREE.Vector3(pos.x * 0.08, 5, 3));
    var mid2 = pos.clone().lerp(SUN_POS, 0.45).add(new THREE.Vector3(pos.x * 0.04, 8.5, -2));
    var nShips = Math.max(4, Math.round(share * 46 * (LITE ? 0.5 : 1)));
    var dock = SUN_POS.clone().add(pos.clone().sub(SUN_POS).normalize().multiplyScalar(sunR + 1.6));
    routes.push({ p0: pos.clone(), p1: mid, p2: dock.clone().add(new THREE.Vector3(0, 0.6, 0)), n: Math.ceil(nShips * 0.6), col: col, speed: 0.045 + share * 0.025, sc: 1.05 });
    routes.push({ p0: pos.clone(), p1: mid2, p2: dock.clone().add(new THREE.Vector3(0, 1.6, 0)), n: Math.floor(nShips * 0.4), col: col, speed: 0.04 + share * 0.02, sc: 0.85 });
    streams.push({ p0: pos.clone(), p1: mid, p2: SUN_POS.clone(), n: Math.round(520 * K * Math.max(share, 0.12)), colors: [col, new THREE.Color(0xffffff)], size: 1.8, speed: [0.045, 0.1] });
  });

  /* —— 客流接駁：地球 ↔ 太陽 雙向航班（青白色） —— */
  var CYAN = new THREE.Color(0x9feaff), WHITE = new THREE.Color(0xf2f8ff);
  [
    { p1: EARTH_POS.clone().lerp(SUN_POS, 0.5).add(new THREE.Vector3(0, 8, 4)), n: 6 },
    { p1: EARTH_POS.clone().lerp(SUN_POS, 0.45).add(new THREE.Vector3(2, 12, -3)), n: 5 },
    { p1: EARTH_POS.clone().lerp(SUN_POS, 0.55).add(new THREE.Vector3(-2, 5, 9)), n: 5 }
  ].forEach(function (rc) {
    routes.push({ p0: EARTH_POS.clone().add(new THREE.Vector3(0, 1.5, 0)), p1: rc.p1, p2: SUN_POS.clone().add(EARTH_POS.clone().sub(SUN_POS).normalize().multiplyScalar(sunR + 1.4)), n: rc.n, col: CYAN, speed: 0.05, sc: 0.8 });
    streams.push({ p0: EARTH_POS.clone(), p1: rc.p1, p2: SUN_POS.clone(), n: Math.round(200 * K), colors: [CYAN, WHITE], size: 1.6, speed: [0.05, 0.11] });
  });
  [
    { p1: SUN_POS.clone().lerp(EARTH_POS, 0.5).add(new THREE.Vector3(0, 11, -5)), n: 4 },
    { p1: SUN_POS.clone().lerp(EARTH_POS, 0.55).add(new THREE.Vector3(3, 6, 7)), n: 4 }
  ].forEach(function (rc) {
    routes.push({ p0: SUN_POS.clone().add(EARTH_POS.clone().sub(SUN_POS).normalize().multiplyScalar(sunR + 1.4)), p1: rc.p1, p2: EARTH_POS.clone().add(new THREE.Vector3(0, 2, 0)), n: rc.n, col: WHITE, speed: 0.048, sc: 0.75 });
    streams.push({ p0: SUN_POS.clone(), p1: rc.p1, p2: EARTH_POS.clone(), n: Math.round(150 * K), colors: [WHITE, CYAN], size: 1.5, speed: [0.05, 0.1] });
  });

  /* —— 6 顆寶石隕石（熱銷商品） —— */
  var prods = (D.prod_rev || []).slice(0, 6);
  var maxP = 1; prods.forEach(function (p) { maxP = Math.max(maxP, p.rev || 0); });
  prods.forEach(function (p, i) {
    var a = (56 - i * 20) * Math.PI / 180;
    var pos = new THREE.Vector3(Math.cos(a) * 35, 17 - i * 3.0, Math.sin(a) * 25 - 6);
    var col = new THREE.Color(GEM_COLS[i % GEM_COLS.length]);
    var gr = 0.55 + (p.rev || 0) / maxP * 0.7;
    var gem = new THREE.Mesh(
      new THREE.OctahedronGeometry(gr, 0),
      new THREE.MeshPhongMaterial({ color: col, emissive: col, emissiveIntensity: 0.25, shininess: 90, flatShading: true })
    );
    gem.position.copy(pos);
    gem.userData = { kind: 'prod', d: p, rank: i + 1 };
    gal.add(gem); hitMeshes.push(gem);
    var glow = makeGlow(col.getHex(), gr * 4.5, 0.45); glow.position.copy(pos); gal.add(glow);
    var nm = String(p.name || '商品');
    if (nm.length > 8) nm = nm.slice(0, 8) + '…';
    var lbl = makeLabel([nm, fmtWan(p.rev || 0) + ' · ' + (p.qty || 0) + ' 件'], { fs: 20, sub: 15, scale: 0.023, color: '#' + col.getHexString() });
    lbl.position.copy(pos).add(new THREE.Vector3(pos.x > 26 ? -3.5 : 0, gr + 1.5 + (i % 2) * 0.9, 0));
    gal.add(lbl);
    gems.push({ mesh: gem, glow: glow, label: lbl, base: pos.clone(), seed: i * 1.7 });
    // 出貨航線：太陽 → 寶石（金色貨運，班次前段商品較密）
    var gmid = SUN_POS.clone().lerp(pos, 0.5).add(new THREE.Vector3(0, 6 - i, 2));
    routes.push({ p0: SUN_POS.clone().add(pos.clone().sub(SUN_POS).normalize().multiplyScalar(sunR + 1.4)), p1: gmid, p2: pos.clone(), n: Math.max(2, 4 - (i >> 1)), col: new THREE.Color(0xffd98e), speed: 0.052, sc: 0.75 });
    streams.push({ p0: SUN_POS.clone(), p1: gmid, p2: pos.clone(), n: Math.round(110 * K), colors: [new THREE.Color(0xffd98e), col], size: 1.5, speed: [0.05, 0.11] });
  });

  /* —— 貨運/客運艦隊（單一 InstancedMesh，顏色區分航線） —— */
  routes.forEach(function (rt) { totalShips += rt.n; });
  ships = new THREE.InstancedMesh(shipGeo, new THREE.MeshLambertMaterial({ color: 0xe8ecf8 }), Math.max(1, totalShips));
  ships.frustumCulled = false;
  var si = 0;
  routes.forEach(function (rt) {
    for (var k2 = 0; k2 < rt.n; k2++) {
      shipData.push({ route: rt, off: k2 / rt.n + Math.random() * 0.04, idx: si });
      ships.setColorAt(si, rt.col);
      si++;
    }
  });
  if (ships.instanceColor) ships.instanceColor.needsUpdate = true;
  gal.add(ships);

  /* —— 流星群：多道流星劃過天際 —— */
  for (var me = 0; me < (LITE ? 4 : 9); me++) {
    var sx = -80 + Math.random() * 160, sy = 30 + Math.random() * 26, sz = -70 + Math.random() * 26;
    var ex = sx + (Math.random() < 0.5 ? -1 : 1) * (50 + Math.random() * 50);
    var ey = sy - 16 - Math.random() * 18, ez = sz + 10 + Math.random() * 16;
    streams.push({
      p0: new THREE.Vector3(sx, sy, sz),
      p1: new THREE.Vector3((sx + ex) / 2, (sy + ey) / 2 + 3, (sz + ez) / 2),
      p2: new THREE.Vector3(ex, ey, ez),
      n: Math.round((30 + Math.random() * 30) * K) + 8,
      colors: [new THREE.Color(0xeaf4ff), new THREE.Color(0x9fc8ff), new THREE.Color(0xfff2d8)],
      size: 2.4, speed: [0.10, 0.22]
    });
  }

  /* —— 背景彗星 —— */
  streams.push({
    p0: new THREE.Vector3(-70, 42, -55), p1: new THREE.Vector3(0, 30, -62), p2: new THREE.Vector3(66, 22, -48),
    n: Math.round(150 * K), colors: [new THREE.Color(0xcfe6ff), new THREE.Color(0x8fb8ff)], size: 2.2, speed: [0.014, 0.03]
  });

  gal.add(buildStreamPoints(streams));
  gal.add(buildOrbitPoints(orbitPts));
}

/* ═════════ 8. 點擊互動 ═════════ */
var raycaster = new THREE.Raycaster();
var pointerV = new THREE.Vector2();
var downXY = null;
function showCard(tag, name, rowsHtml) {
  $('cardTag').textContent = tag;
  $('cardName').textContent = name;
  $('cardRows').innerHTML = rowsHtml;
  $('card').classList.remove('hide');
}
$('c').addEventListener('pointerdown', function (e) { downXY = [e.clientX, e.clientY]; });
$('c').addEventListener('pointerup', function (e) {
  if (!downXY || Math.abs(e.clientX - downXY[0]) + Math.abs(e.clientY - downXY[1]) > 6) return; // 拖曳不算點擊
  if (!gal) return;
  pointerV.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(pointerV, camera);
  var hits = raycaster.intersectObjects(hitMeshes, false);
  if (!hits.length) { $('card').classList.add('hide'); return; }
  var info = hits[0].object.userData, kpi = (D && D.kpi) || {};
  if (info.kind === 'sun') {
    var pct = D.target > 0 ? Math.round((kpi.rev_mtd || 0) / D.target * 100) : 0;
    showCard('太 陽 · 品 牌 恆 星', (D.meta && D.meta.report_month || '本月') + ' 營收',
      '本月營收 <b>' + fmt(kpi.rev_mtd || 0) + '</b><br>月目標 ' + fmtWan(D.target || 0) + ' · 達成 <b>' + pct + '%</b><br>' +
      '訂單 <b>' + (kpi.orders_mtd || 0) + '</b> 筆 · 客單 <b>' + fmt(kpi.avg_order || 0) + '</b><br>' +
      '新客 <b>' + (kpi.new_customers || 0) + '</b> · 回購 <b>' + (kpi.returning || 0) + '</b>');
  } else if (info.kind === 'month') {
    var yoy = info.r25 > 0 && info.r26 > 0 ? Math.round((info.r26 / info.r25 - 1) * 100) : null;
    showCard('行 星 · 月 營 收', (info.i + 1) + ' 月',
      '今年 <b>' + (info.r26 > 0 ? fmt(info.r26) : '—') + '</b><br>去年 ' + (info.r25 > 0 ? fmt(info.r25) : '—') +
      (yoy !== null ? '<br>年增 <span class="' + (yoy >= 0 ? 'up' : 'down') + '">' + (yoy >= 0 ? '+' : '') + yoy + '%</span>' : ''));
  } else if (info.kind === 'earth') {
    showCard('地 球 · 客 戶 星 球', '共 ' + info.total.toLocaleString() + ' 位客戶',
      info.tiers.map(function (t) { return t.name + ' <b>' + (t.count || 0).toLocaleString() + '</b>'; }).join('<br>'));
  } else if (info.kind === 'src') {
    showCard('太 空 站 · 訂 單 來 源', info.d.src || '來源',
      '訂單占比 <b>' + Math.round(info.share * 100) + '%</b>（' + (info.d.orders || 0) + ' 筆）<br>營收貢獻 <b>' + fmt(info.d.rev || 0) + '</b>');
  } else if (info.kind === 'prod') {
    showCard('寶 石 · 熱 銷 TOP ' + info.rank, info.d.name || '商品',
      '營收 <b>' + fmt(info.d.rev || 0) + '</b><br>銷量 <b>' + (info.d.qty || 0) + '</b> 件 · 單價 <b>' + fmt(info.d.price || 0) + '</b>');
  }
});

/* ═════════ 9. 主迴圈 ═════════ */
var _v = new THREE.Vector3(), _v2 = new THREE.Vector3(), _dummy = new THREE.Object3D();
function animate() {
  requestAnimationFrame(animate);
  var dt = Math.min(clock.getDelta(), 0.05);
  var t = clock.getElapsedTime();
  uTime.value = t;

  // 相機
  camYaw += (camYawTarget - camYaw) * 0.08;
  var auto = Math.sin(t * 0.05) * 0.2;   // 緩慢擺動；拖曳可自由旋轉
  var yaw = auto + camYaw;
  var camK = clamp(1.5 / camera.aspect, 1, 2.4);
  var dist = 52 * camK;
  camera.position.set(
    Math.sin(yaw) * dist + mouseNX * 3,
    (27 + Math.sin(t * 0.07) * 2 - mouseNY * 3) * (1 + (camK - 1) * 0.35),
    Math.cos(yaw) * dist
  );
  camera.lookAt(CAM_LOOK);

  if (gal) {
    // 太陽
    if (sunMesh) {
      sunMesh.rotation.y = t * 0.06;
      var pulse = 1 + Math.sin(t * 1.4) * 0.04;
      sunMesh.scale.set(pulse, pulse, pulse);
      coronaSprites.forEach(function (sp, i) {
        var b = sp.userData.baseS || (sp.userData.baseS = sp.scale.x);
        var p2 = 1 + Math.sin(t * (0.9 + i * 0.4) + i) * 0.08;
        sp.scale.set(b * p2, b * p2, 1);
      });
    }
    // 行星公轉 + 標籤跟隨
    planets.forEach(function (pl) {
      pl.angle += pl.speed * dt;
      var px = SUN_POS.x + Math.cos(pl.angle) * pl.orbitR;
      var pz = SUN_POS.z + Math.sin(pl.angle) * pl.orbitR;
      pl.mesh.position.set(px, SUN_POS.y, pz);
      pl.mesh.rotation.y += dt * 0.5;
      pl.label.position.set(px, SUN_POS.y + pl.radius + 1.25, pz);
      // 行星繞到太陽正後方時淡出標籤，避免壓在太陽數字上
      _v.set(px - SUN_POS.x, 0, pz - SUN_POS.z).normalize();
      _v2.copy(camera.position).sub(SUN_POS).setY(0).normalize();
      var behind = _v.dot(_v2);
      pl.label.material.opacity = behind < -0.82 ? Math.max(0, (behind + 0.92) * 10) * (pl.isCur ? 1 : 0.85) : (pl.isCur ? 1 : 0.85);
      if (pl.isCur && beaconSprite) {
        beaconSprite.position.set(px, SUN_POS.y, pz);
        var bp = 1 + Math.sin(t * 2.6) * 0.25;
        var bb = beaconSprite.userData.baseS || (beaconSprite.userData.baseS = beaconSprite.scale.x);
        beaconSprite.scale.set(bb * bp, bb * bp, 1);
      }
      if (pl.moon) {
        pl.moon.position.set(Math.cos(t * 1.6) * pl.radius * 2.1, Math.sin(t * 0.8) * 0.3, Math.sin(t * 1.6) * pl.radius * 2.1);
      }
    });
    // 地球自轉
    if (earthMesh) earthMesh.rotation.y = t * 0.12;
    // 貨運飛船
    if (ships && shipData.length) {
      shipData.forEach(function (sd) {
        var tt = (t * sd.route.speed + sd.off) % 1;
        qb(sd.route.p0, sd.route.p1, sd.route.p2, tt, _v);
        qb(sd.route.p0, sd.route.p1, sd.route.p2, Math.min(1, tt + 0.02), _v2);
        _dummy.position.copy(_v);
        _dummy.lookAt(_v2);
        // 出發淡入、抵達淡出（縮小），避免直接壓在星體表面
        var edge = Math.min(1, tt / 0.07, (1 - tt) / 0.1);
        var sc = Math.max(0.001, (sd.route.sc || 1) * (0.85 + 0.45 * (1 - tt)) * edge);
        _dummy.scale.set(sc, sc, sc);
        _dummy.updateMatrix();
        ships.setMatrixAt(sd.idx, _dummy.matrix);
      });
      ships.instanceMatrix.needsUpdate = true;
    }
    // 寶石浮動 + 自轉
    gems.forEach(function (gm) {
      var by = Math.sin(t * 0.7 + gm.seed) * 0.5;
      gm.mesh.position.set(gm.base.x, gm.base.y + by, gm.base.z);
      gm.glow.position.copy(gm.mesh.position);
      gm.mesh.rotation.y += dt * 0.7;
      gm.mesh.rotation.x = Math.sin(t * 0.4 + gm.seed) * 0.3;
    });
  }
  renderer.render(scene, camera);
  if (DEBUG) { $('dbg').style.display = 'block'; $('dbg').textContent = 'calls ' + renderer.info.render.calls + ' · tris ' + renderer.info.render.triangles; }
}

/* ═════════ 10. 啟動 ═════════ */
window.__flowBooted = true;
window.__flow = {
  debugState: function () {
    return { calls: renderer.info.render.calls, tris: renderer.info.render.triangles, points: renderer.info.render.points, lite: LITE };
  }
};
loadData();
loadAnnualPlan();
animate();
</script>
</body>
