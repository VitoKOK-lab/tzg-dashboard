<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TZG 金流星河</title>
<!--
  TZG 金流星河 — MONEY FLOW GALAXY
  ▸ 與 live.html（沙漠水晶島）完全不同的視覺模組：純 GPU 粒子流。
  ▸ 隱喻：流量來源化為光流匯入品牌核心，再流向熱銷商品；
    七日營收是一條起伏的光河；12 個月是環繞的雙光環（亮=今年、暗=去年）；
    客戶分層是腳下的星系盤；年度目標是核心的進度光環。
  ▸ 所有粒子動畫在 vertex shader 內計算（貝茲曲線/軌道參數式），CPU 每幀零更新。
  ▸ 資料來源與 live.html 相同：output/dashboard_latest.html 的 const D + annual_plan.json。
  ▸ 參數：?demo=1 展示資料　?lite=1 低規格　?debug=1 顯示 draw calls
-->
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #04060f; }
body {
  font-family: 'Montserrat', 'PingFang TC', 'Microsoft JhengHei', sans-serif;
  color: #dfe6ff;
  background: radial-gradient(120% 90% at 50% 30%, #0b1030 0%, #070a1c 45%, #04060f 100%);
}
#c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; touch-action: none; }

/* ── HUD ── */
.hud { position: fixed; z-index: 5; pointer-events: none; }
#hudTitle { top: 18px; left: 22px; }
#hudTitle h1 {
  font-size: 20px; font-weight: 600; letter-spacing: 6px; color: #f3e9c8;
  text-shadow: 0 0 18px rgba(246,196,83,.45);
}
#hudTitle .sub {
  margin-top: 4px; font-size: 10px; letter-spacing: 4px; color: #8a93c0;
}
#hudTitle .asof { margin-top: 8px; font-size: 10px; color: #5d668f; letter-spacing: 1px; }

#hudStats { top: 18px; right: 22px; display: flex; gap: 10px; }
.chip {
  background: rgba(10,14,34,.55); border: 1px solid rgba(140,150,210,.22);
  border-radius: 10px; padding: 8px 14px; text-align: right;
  backdrop-filter: blur(6px);
}
.chip .k { font-size: 9px; letter-spacing: 2px; color: #8a93c0; }
.chip .v { margin-top: 3px; font-size: 16px; font-weight: 600; color: #ffe1a0; text-shadow: 0 0 12px rgba(246,196,83,.35); }
.chip .v.pink { color: #ff8fd8; text-shadow: 0 0 12px rgba(255,79,195,.35); }

#hudLegend { bottom: 16px; right: 22px; text-align: right; font-size: 10px; line-height: 1.9; color: #6a7398; letter-spacing: 1px; }
#hudLegend b { color: #aeb8e8; font-weight: 600; }

/* 詳情卡（點擊節點） */
#card {
  position: fixed; z-index: 6; left: 22px; bottom: 16px; min-width: 230px; max-width: 320px;
  background: rgba(9,12,30,.72); border: 1px solid rgba(150,160,220,.25); border-radius: 14px;
  padding: 14px 16px; backdrop-filter: blur(10px);
  transition: opacity .25s, transform .25s; pointer-events: none;
}
#card.hide { opacity: 0; transform: translateY(8px); }
#card .tag { font-size: 9px; letter-spacing: 3px; color: #8a93c0; }
#card .name { margin-top: 4px; font-size: 15px; font-weight: 600; color: #f3e9c8; }
#card .rows { margin-top: 8px; font-size: 12px; line-height: 2; color: #b9c2ea; }
#card .rows b { color: #ffe1a0; font-weight: 600; }
#card .rows .up { color: #7dffc8; }
#card .rows .down { color: #ff7d9e; }

#hint { bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 10px; letter-spacing: 2px; color: #565f86; }

#dbg { top: 60px; left: 22px; font-size: 10px; color: #4a5378; display: none; }

/* 載入 / 錯誤 */
.overlay {
  position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  background: radial-gradient(120% 90% at 50% 30%, #0b1030 0%, #04060f 100%);
  transition: opacity .5s; text-align: center; padding: 0 30px;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.overlay .ttl { font-size: 15px; letter-spacing: 5px; color: #cfd6ff; }
.overlay p { font-size: 11px; color: #6a7398; letter-spacing: 1px; line-height: 1.8; }
.orb {
  width: 34px; height: 34px; border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, #fff6d8, #f6c453 45%, rgba(246,196,83,0) 72%);
  animation: breathe 1.6s ease-in-out infinite;
}
@keyframes breathe { 0%,100% { transform: scale(.82); opacity: .7; } 50% { transform: scale(1.08); opacity: 1; } }

@media (max-width: 700px) {
  #hudTitle h1 { font-size: 15px; letter-spacing: 4px; }
  #hudStats { top: auto; bottom: 118px; right: 12px; flex-direction: column; gap: 6px; }
  .chip { padding: 6px 10px; } .chip .v { font-size: 13px; }
  #hudLegend { display: none; }
  #card { left: 12px; bottom: 12px; min-width: 0; max-width: 62vw; padding: 10px 12px; }
  #hint { display: none; }
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div class="hud" id="hudTitle">
  <h1>金流星河</h1>
  <div class="sub">TZG&ensp;MONEY&ensp;FLOW&ensp;GALAXY</div>
  <div class="asof" id="asOf"></div>
</div>

<div class="hud" id="hudStats">
  <div class="chip"><div class="k">本月營收</div><div class="v" id="chipMtd">—</div></div>
  <div class="chip"><div class="k">年度累計</div><div class="v pink" id="chipYtd">—</div></div>
</div>

<div class="hud" id="hudLegend">
  <b>左岸</b> 流量來源 → <b>核心</b> → <b>右岸</b> 熱銷商品<br>
  外環雙軌 <b>月營收</b>（亮金=今年 · 暗銀=去年）<br>
  腳下星盤 <b>客戶分層</b> · 前景 <b>七日光河</b> · 核心光環 <b>年度進度</b>
</div>

<div id="card" class="hide">
  <div class="tag" id="cardTag"></div>
  <div class="name" id="cardName"></div>
  <div class="rows" id="cardRows"></div>
</div>

<div class="hud" id="hint">點 擊 發 光 節 點 查 看 數 據</div>
<div class="hud" id="dbg"></div>

<div class="overlay" id="loadingOverlay"><div class="orb"></div><div class="ttl">金 流 匯 聚 中</div><p>正在載入營運資料…</p></div>
<div class="overlay hidden" id="errorOverlay"><div class="ttl">星 河 暫 時 失 聯</div><p id="errText">無法載入資料或 3D 引擎（需可連線 cdn.jsdelivr.net）。<br>兩分鐘後自動重試，或重新整理頁面。</p></div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
</script>

<script>
/* 模組載入逾時保險：9 秒內未啟動則顯示錯誤層 */
window.__flowBooted = false;
setTimeout(function () {
  if (!window.__flowBooted) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('errorOverlay').classList.remove('hidden');
  }
}, 9000);
</script>

<script type="module">
import * as THREE from 'three';

/* ═════════ 0. 參數與小工具 ═════════ */
var Q = new URLSearchParams(location.search);
var DEMO = Q.get('demo') === '1';
var LITE = Q.get('lite') === '1' || (Math.min(screen.width, screen.height) < 620 && window.devicePixelRatio > 2);
var DEBUG = Q.get('debug') === '1';
function $(id) { return document.getElementById(id); }
function clamp(v, a, b) { return v < a ? a : v > b ? b : v; }
function fmt(n) { return '$' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function fmtCompact(n) {
  if (n >= 1e8) return (n / 1e8).toFixed(2) + ' 億';
  if (n >= 1e4) return Math.round(n / 1e4).toLocaleString() + ' 萬';
  return '$' + Math.round(n).toLocaleString();
}
function ymd(t) { var d = new Date(t); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

/* ═════════ 1. 展示資料（與 live.html DEMO_D 同構，精簡到本頁所需欄位） ═════════ */
var DEMO_D = {
  target: 4500000,
  meta: { report_month: '示範月份', data_as_of: '（展示模式）', data_as_of_iso: ymd(Date.now() - 864e5) + 'T23:30:00', days_elapsed: 16, days_total: 31 },
  kpi: { rev_mtd: 2318400, orders_mtd: 497, avg_order: 4665, new_customers: 213, returning: 96 },
  last_7_days: { daily_target: 150000, data: [
    { date: '07/10', rev: 142000, orders: 30 }, { date: '07/11', rev: 168000, orders: 36 },
    { date: '07/12', rev: 131000, orders: 27 }, { date: '07/13', rev: 176500, orders: 39 },
    { date: '07/14', rev: 149800, orders: 33 }, { date: '07/15', rev: 152300, orders: 31 },
    { date: '07/16', rev: 96800, orders: 21, is_today: true }
  ]},
  prod_rev: [
    { name: '定制鉑金戒指', qty: 3, price: 46000, rev: 138000 },
    { name: '925銀戒指 鴿子蛋粉水晶', qty: 6, price: 15000, rev: 90000 },
    { name: '坦桑石手鍊', qty: 8, price: 9000, rev: 72000 },
    { name: '柏捷頓蝴蝶系列', qty: 5, price: 9900, rev: 49500 },
    { name: '招財之石｜金運石', qty: 20, price: 1600, rev: 32000 },
    { name: '愛情的味道｜手鍊', qty: 40, price: 500, rev: 20000 }
  ],
  sources: [
    { src: '業務推薦', orders: 120, rev: 980000 }, { src: 'LINE 來源', orders: 150, rev: 620000 },
    { src: 'Facebook 來源', orders: 110, rev: 450000 }, { src: '內容導流', orders: 90, rev: 210000 },
    { src: '直接/官網', orders: 27, rev: 58400 }
  ],
  active_tiers: [
    { name: '活躍', count: 554 }, { name: '溫層', count: 978 }, { name: '冷卻', count: 1567 },
    { name: '沉睡', count: 1515 }, { name: '流失', count: 612 }
  ],
  monthly_26: [3605872, 4360250, 4571268, 5327966, 5713135, 3571133, 2318400, 0, 0, 0, 0, 0].map(function (r, i) { return { month: (i + 1) + '月', rev: r, current: i === 6 }; }),
  monthly_25: [991786, 1905087, 2685469, 2981757, 2553800, 1951963, 4243254, 4630533, 2940865, 4610805, 4706800, 5100000].map(function (r, i) { return { month: (i + 1) + '月', rev: r }; })
};

/* ═════════ 2. 資料層（同 live.html：解析 dashboard_latest.html 的 const D） ═════════ */
var LS_KEY = 'tzg_flow_D';
var D = null, annualTarget = 0;
var retryDelay = 60e3, retryTimer = null;

function extractD(html) {
  var i = html.indexOf('const D=');
  if (i < 0) throw new Error('no const D');
  var j = html.indexOf('\n', i); if (j < 0) j = html.length;
  return JSON.parse(html.slice(i + 8, j).trim().replace(/;$/, ''));
}
function applyData(newD, fromCache) {
  var changed = !D || !D.meta || D.meta.data_as_of_iso !== newD.meta.data_as_of_iso;
  D = newD;
  if (changed) { renderHud(); buildGalaxy(); }
  $('loadingOverlay').classList.add('hidden');
  $('errorOverlay').classList.add('hidden');
  if (fromCache) $('asOf').textContent = '⚠ 更新失敗 · 顯示 ' + ((D.meta || {}).data_as_of || '快取') + ' 快取資料';
}
function loadData() {
  if (DEMO) { applyData(DEMO_D, false); return; }
  fetch('output/dashboard_latest.html?_flow=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function (html) {
      var d = extractD(html);
      retryDelay = 60e3;
      try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch (e) {}
      applyData(d, false);
    })
    .catch(function () {
      if (!D) {
        var cached = null;
        try { cached = JSON.parse(localStorage.getItem(LS_KEY)); } catch (e) {}
        if (cached && cached.meta) applyData(cached, true);
        else { $('loadingOverlay').classList.add('hidden'); $('errorOverlay').classList.remove('hidden'); }
      }
      clearTimeout(retryTimer);
      retryTimer = setTimeout(loadData, retryDelay);
      retryDelay = Math.min(retryDelay * 2, 300e3);
    });
  setTimeout(loadData, 10 * 60e3); // 每 10 分鐘靜默更新
}
function loadAnnualPlan() {
  if (DEMO) { annualTarget = 54000000; if (D) { renderHud(); buildGalaxy(); } return; }
  fetch('annual_plan.json?_flow=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (ap) {
      var sum = 0, mo = (ap && ap.monthly) || {}, yr = new Date().getFullYear();
      for (var m = 1; m <= 12; m++) sum += +mo[yr + '-' + String(m).padStart(2, '0')] || +ap._default_monthly || 0;
      if (sum > 0) { annualTarget = sum; if (D) { renderHud(); buildGalaxy(); } }
    })
    .catch(function () {});
}
function ytdSum() { var s = 0; ((D && D.monthly_26) || []).forEach(function (m) { s += m.rev || 0; }); return s; }
function renderHud() {
  var m = (D && D.meta) || {};
  $('asOf').textContent = '資料截至 ' + (m.data_as_of || '—') + (m.data_as_of_iso ? ' ' + String(m.data_as_of_iso).slice(11, 16) : '');
  $('chipMtd').textContent = fmtCompact(((D && D.kpi) || {}).rev_mtd || 0);
  var ytd = ytdSum();
  $('chipYtd').textContent = fmtCompact(ytd) + (annualTarget > 0 ? ' · ' + Math.round(ytd / annualTarget * 100) + '%' : '');
}

/* ═════════ 3. Three.js 場景基礎 ═════════ */
var renderer, scene, camera, clock;
var uTime = { value: 0 };
var CAM_BASE = new THREE.Vector3(0, 15, 47);
var CAM_LOOK = new THREE.Vector3(0, 7.5, 0);
var mouseNX = 0, mouseNY = 0;

renderer = new THREE.WebGLRenderer({ canvas: $('c'), antialias: !LITE, alpha: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, LITE ? 1 : 2));
renderer.setSize(innerWidth, innerHeight);
scene = new THREE.Scene();
camera = new THREE.PerspectiveCamera(46, innerWidth / innerHeight, 0.1, 300);
camera.position.copy(CAM_BASE);
clock = new THREE.Clock();

addEventListener('resize', function () {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
addEventListener('pointermove', function (e) {
  if (e.pointerType === 'mouse') {
    mouseNX = (e.clientX / innerWidth) * 2 - 1;
    mouseNY = (e.clientY / innerHeight) * 2 - 1;
  }
});

/* ═════════ 4. 貼圖工廠（光暈 / 文字，全部 canvas 產生，零外部資源） ═════════ */
function glowTexture(inner, outer) {
  var cv = document.createElement('canvas'); cv.width = cv.height = 128;
  var g = cv.getContext('2d');
  var gr = g.createRadialGradient(64, 64, 2, 64, 64, 62);
  gr.addColorStop(0, inner); gr.addColorStop(0.35, outer); gr.addColorStop(1, 'rgba(0,0,0,0)');
  g.fillStyle = gr; g.fillRect(0, 0, 128, 128);
  var t = new THREE.CanvasTexture(cv); t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
var TEX_SOFT = glowTexture('rgba(255,255,255,1)', 'rgba(255,255,255,.28)');

function makeGlow(colorHex, size, opacity) {
  var m = new THREE.SpriteMaterial({ map: TEX_SOFT, color: colorHex, transparent: true, opacity: opacity == null ? 0.9 : opacity, blending: THREE.AdditiveBlending, depthWrite: false });
  var s = new THREE.Sprite(m); s.scale.set(size, size, 1);
  return s;
}
function makeLabel(lines, opt) {
  opt = opt || {};
  var fs = opt.fs || 26, sub = opt.sub || 20, pad = 14;
  var cv = document.createElement('canvas'), g = cv.getContext('2d');
  g.font = '600 ' + fs + 'px Montserrat, "PingFang TC", sans-serif';
  var w = 10;
  lines.forEach(function (ln, i) {
    g.font = (i === 0 ? '600 ' + fs : '400 ' + sub) + 'px Montserrat, "PingFang TC", sans-serif';
    w = Math.max(w, g.measureText(ln).width);
  });
  var lh = fs + 8, lhs = sub + 6;
  var H = pad * 2 + lh + (lines.length - 1) * lhs;
  cv.width = Math.ceil(w + pad * 2); cv.height = Math.ceil(H);
  g = cv.getContext('2d');
  g.textAlign = 'center'; g.textBaseline = 'middle';
  var y = pad + lh / 2;
  lines.forEach(function (ln, i) {
    g.font = (i === 0 ? '600 ' + fs : '400 ' + sub) + 'px Montserrat, "PingFang TC", sans-serif';
    g.shadowColor = opt.glow || 'rgba(120,140,255,.9)'; g.shadowBlur = 12;
    g.fillStyle = i === 0 ? (opt.color || '#f3e9c8') : (opt.subColor || '#9aa4d6');
    g.fillText(ln, cv.width / 2, y);
    y += lhs;
  });
  var t = new THREE.CanvasTexture(cv); t.colorSpace = THREE.SRGBColorSpace;
  var m = new THREE.SpriteMaterial({ map: t, transparent: true, opacity: opt.opacity == null ? 0.95 : opt.opacity, depthWrite: false });
  var s = new THREE.Sprite(m);
  var k = opt.scale || 0.028;
  s.scale.set(cv.width * k, cv.height * k, 1);
  return s;
}

/* ═════════ 5. 粒子 Shader（流線=貝茲曲線 / 軌道=圓周參數式，動畫全在 GPU） ═════════ */
var STREAM_VERT = `
attribute vec3 aP0; attribute vec3 aP1; attribute vec3 aP2;
attribute float aDelay; attribute float aSpeed; attribute float aSize; attribute float aSeed;
attribute vec3 aColor;
uniform float uTime; uniform float uPx;
varying vec3 vColor; varying float vFade;
void main() {
  float t = fract(aDelay + uTime * aSpeed);
  vec3 p01 = mix(aP0, aP1, t);
  vec3 p12 = mix(aP1, aP2, t);
  vec3 pos = mix(p01, p12, t);
  vec3 tang = normalize(p12 - p01 + vec3(1e-4));
  vec3 side = normalize(cross(tang, vec3(0.0, 1.0, 0.0)) + vec3(1e-4));
  float wob = sin(uTime * (1.2 + aSeed * 2.4) + aSeed * 43.0) * (0.12 + aSeed * 0.3);
  pos += side * wob;
  pos.y += cos(uTime * (0.9 + aSeed * 1.7) + aSeed * 29.0) * 0.14;
  vFade = smoothstep(0.0, 0.10, t) * (1.0 - smoothstep(0.82, 1.0, t));
  vColor = aColor;
  vec4 mv = modelViewMatrix * vec4(pos, 1.0);
  float tw = 0.8 + 0.35 * sin(uTime * (2.0 + aSeed * 3.0) + aSeed * 91.0);
  gl_PointSize = aSize * tw * uPx * (34.0 / max(1.0, -mv.z));
  gl_Position = projectionMatrix * mv;
}`;
var ORBIT_VERT = `
attribute vec3 aCenter; attribute vec3 aU; attribute vec3 aV;
attribute float aRadius; attribute float aAngle0; attribute float aAngSpeed;
attribute float aSize; attribute float aSeed;
attribute vec3 aColor;
uniform float uTime; uniform float uPx;
varying vec3 vColor; varying float vFade;
void main() {
  float a = aAngle0 + uTime * aAngSpeed;
  float r = aRadius * (1.0 + 0.02 * sin(uTime * 0.7 + aSeed * 37.0));
  vec3 pos = aCenter + (cos(a) * aU + sin(a) * aV) * r;
  pos.y += sin(uTime * (0.5 + aSeed) + aSeed * 53.0) * 0.18;
  vFade = 1.0;
  vColor = aColor;
  vec4 mv = modelViewMatrix * vec4(pos, 1.0);
  float tw = 0.75 + 0.4 * sin(uTime * (1.4 + aSeed * 2.2) + aSeed * 71.0);
  gl_PointSize = aSize * tw * uPx * (34.0 / max(1.0, -mv.z));
  gl_Position = projectionMatrix * mv;
}`;
var POINT_FRAG = `
precision mediump float;
varying vec3 vColor; varying float vFade;
void main() {
  vec2 c = gl_PointCoord - 0.5;
  float d = length(c) * 2.0;
  float a = smoothstep(1.0, 0.0, d);
  a *= a;
  gl_FragColor = vec4(vColor, a * vFade);
}`;
function pointsMaterial(vert) {
  return new THREE.ShaderMaterial({
    vertexShader: vert, fragmentShader: POINT_FRAG,
    uniforms: { uTime: uTime, uPx: { value: renderer.getPixelRatio() } },
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
}

/* 建立流線粒子集（多條貝茲流共用一個 Points = 1 draw call） */
function buildStreamPoints(specs) {
  // specs: [{p0,p1,p2, n, color:[THREE.Color,...], size, speed:[min,max]}]
  var total = 0; specs.forEach(function (s) { total += s.n; });
  var P0 = new Float32Array(total * 3), P1 = new Float32Array(total * 3), P2 = new Float32Array(total * 3);
  var DL = new Float32Array(total), SP = new Float32Array(total), SZ = new Float32Array(total), SD = new Float32Array(total);
  var CL = new Float32Array(total * 3);
  var k = 0;
  specs.forEach(function (s) {
    for (var i = 0; i < s.n; i++, k++) {
      P0.set([s.p0.x, s.p0.y, s.p0.z], k * 3);

/* 建立軌道粒子集（所有環/盤/星空共用一個 Points = 1 draw call） */
function buildOrbitPoints(specs) {
  // specs: [{center,u,v, r:[min,max], n, colors, size, spd:[min,max], arc:[a0,a1]}]
  var total = 0; specs.forEach(function (s) { total += s.n; });
  var CT = new Float32Array(total * 3), U = new Float32Array(total * 3), V = new Float32Array(total * 3);
  var R = new Float32Array(total), A0 = new Float32Array(total), AS = new Float32Array(total);
  var SZ = new Float32Array(total), SD = new Float32Array(total), CL = new Float32Array(total * 3);
  var k = 0;
  specs.forEach(function (s) {
    var arc = s.arc || [0, Math.PI * 2];
    for (var i = 0; i < s.n; i++, k++) {
      CT.set([s.center.x, s.center.y, s.center.z], k * 3);
      U.set([s.u.x, s.u.y, s.u.z], k * 3);
      V.set([s.v.x, s.v.y, s.v.z], k * 3);
      R[k] = s.r[0] + Math.random() * (s.r[1] - s.r[0]);
      A0[k] = arc[0] + Math.random() * (arc[1] - arc[0]);
      AS[k] = s.spd[0] + Math.random() * (s.spd[1] - s.spd[0]);
      SZ[k] = s.size * (0.6 + Math.random() * 0.8);
      SD[k] = Math.random();
      var c = s.colors[(Math.random() * s.colors.length) | 0];
      CL.set([c.r, c.g, c.b], k * 3);
    }
  });
  var g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(new Float32Array(total * 3), 3));
  g.setAttribute('aCenter', new THREE.BufferAttribute(CT, 3));
  g.setAttribute('aU', new THREE.BufferAttribute(U, 3));
  g.setAttribute('aV', new THREE.BufferAttribute(V, 3));
  g.setAttribute('aRadius', new THREE.BufferAttribute(R, 1));
  g.setAttribute('aAngle0', new THREE.BufferAttribute(A0, 1));
  g.setAttribute('aAngSpeed', new THREE.BufferAttribute(AS, 1));
  g.setAttribute('aSize', new THREE.BufferAttribute(SZ, 1));
  g.setAttribute('aSeed', new THREE.BufferAttribute(SD, 1));
  g.setAttribute('aColor', new THREE.BufferAttribute(CL, 3));
  g.boundingSphere = new THREE.Sphere(new THREE.Vector3(0, 8, 0), 120);

      var p0s = si === 0 ? pts7[0].clone() : pts7[si - 1].clone().lerp(pts7[si], 0.5);
      var p2s = si === days.length - 2 ? pts7[days.length - 1].clone() : pts7[si].clone().lerp(pts7[si + 1], 0.5);
      streams.push({ p0: p0s.add(new THREE.Vector3(0, 0.2, 0)), p1: pts7[si].clone().lerp(pts7[si + 1], 0.5).add(new THREE.Vector3(0, 0.7, 0)), p2: p2s.add(new THREE.Vector3(0, 0.2, 0)), n: Math.round(130 * K), colors: [COL.goldHi, COL.cyan], size: 1.7, speed: [0.10, 0.22] });
    }
    // 日標籤 + 點擊節點
    days.forEach(function (d, i) {
      var pos = pts7[i];
      var ok = (d.rev || 0) >= dt7;
      var lbl = makeLabel([String(d.date || '').slice(-5), fmtCompact(d.rev || 0)], { fs: 17, sub: 15, color: d.is_today ? '#fff3cf' : ok ? '#ffe1a0' : '#8fa3d8', scale: 0.019, opacity: 0.85, glow: 'rgba(30,40,90,.95)' });
      lbl.position.copy(pos).add(new THREE.Vector3(0, 1.3, 0));
      gal.add(lbl);
      if (d.is_today) { var tg = makeGlow(0xfff3cf, 2.4, 0.95); tg.position.copy(pos); gal.add(tg); coreSprites.push(tg); }
      addHit(pos, 1.7, { kind: 'day', d: d, target: dt7 });
    });
  }

  /* —— 合併輸出：所有流線 1 個 Points、所有軌道 1 個 Points —— */
  gal.add(buildStreamPoints(streams));
  gal.add(buildOrbitPoints(orbits));

  /* —— 幽微星雲底色（兩片大光暈，增加空間層次） —— */
  var neb1 = makeGlow(0x2a1b5e, 90, 0.16); neb1.position.set(-24, 18, -30); gal.add(neb1);
  var neb2 = makeGlow(0x0e3a4a, 80, 0.14); neb2.position.set(26, 10, -34); gal.add(neb2);
}

/* ═════════ 8. 點擊互動 → 詳情卡 ═════════ */
var raycaster = new THREE.Raycaster();
var pointerV = new THREE.Vector2();
function showCard(tag, name, rowsHtml) {
  $('cardTag').textContent = tag;
  $('cardName').textContent = name;
  $('cardRows').innerHTML = rowsHtml;
  $('card').classList.remove('hide');
}
function onTap(e) {
  if (!gal) return;
  pointerV.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycaster.setFromCamera(pointerV, camera);
  var hits = raycaster.intersectObjects(hitNodes, false);
  if (!hits.length) { $('card').classList.add('hide'); return; }
  var info = hits[0].object.userData, kpi = (D && D.kpi) || {};
  if (info.kind === 'core') {
    var pct = D.target > 0 ? Math.round((kpi.rev_mtd || 0) / D.target * 100) : 0;
    showCard('品 牌 核 心', (D.meta && D.meta.report_month || '本月'),
      '本月營收 <b>' + fmt(kpi.rev_mtd || 0) + '</b><br>月目標達成 <b>' + pct + '%</b>（' + fmtCompact(D.target || 0) + '）<br>' +
      '訂單 <b>' + (kpi.orders_mtd || 0) + '</b> 筆 · 客單 <b>' + fmt(kpi.avg_order || 0) + '</b><br>' +
      '新客 <b>' + (kpi.new_customers || 0) + '</b> · 回購 <b>' + (kpi.returning || 0) + '</b>');
  } else if (info.kind === 'src') {
    showCard('流 量 來 源', info.d.src || '來源',
      '訂單占比 <b>' + Math.round(info.share * 100) + '%</b>（' + (info.d.orders || 0) + ' 筆）<br>營收貢獻 <b>' + fmt(info.d.rev || 0) + '</b>');
  } else if (info.kind === 'prod') {
    showCard('熱 銷 商 品 · TOP ' + info.rank, info.d.name || '商品',
      '營收 <b>' + fmt(info.d.rev || 0) + '</b><br>銷量 <b>' + (info.d.qty || 0) + '</b> 件 · 單價 <b>' + fmt(info.d.price || 0) + '</b>');
  } else if (info.kind === 'month') {
    var yoy = info.r25 > 0 ? Math.round((info.r26 / info.r25 - 1) * 100) : null;
    showCard('月 營 收', (info.i + 1) + ' 月',
      '今年 <b>' + (info.r26 > 0 ? fmt(info.r26) : '—') + '</b><br>去年 ' + (info.r25 > 0 ? fmt(info.r25) : '—') +
      (yoy !== null && info.r26 > 0 ? '<br>年增 <span class="' + (yoy >= 0 ? 'up' : 'down') + '">' + (yoy >= 0 ? '+' : '') + yoy + '%</span>' : ''));
  } else if (info.kind === 'day') {
    var r = Math.round((info.d.rev || 0) / info.target * 100);
    showCard('七 日 光 河', String(info.d.date || '') + (info.d.is_today ? ' · 今日' : ''),
      '營收 <b>' + fmt(info.d.rev || 0) + '</b>（日標 ' + r + '%）<br>訂單 <b>' + (info.d.orders || 0) + '</b> 筆');
  }
}
addEventListener('pointerdown', function (e) {
  if (e.target === $('c')) onTap(e);
});

/* ═════════ 9. 主迴圈（相機漂移 + 核心脈動；粒子動畫全在 GPU） ═════════ */
var camAng = 0;
function animate() {
  requestAnimationFrame(animate);
  var t = clock.getElapsedTime();
  uTime.value = t;
  // 相機：極慢環繞漂移 + 滑鼠視差
  camAng = Math.sin(t * 0.05) * 0.16;
  var camK = clamp(1.5 / camera.aspect, 1, 2.3);  // 窄螢幕自動拉遠，讓兩岸節點入鏡
  var cx = CAM_BASE.x + Math.sin(camAng) * 40 + mouseNX * 3.2;
  var cz = CAM_BASE.z * Math.cos(camAng);
  var cy = CAM_BASE.y + Math.sin(t * 0.08) * 1.2 - mouseNY * 2.2;
  camera.position.set(cx * camK, cy * (1 + (camK - 1) * 0.5), cz * camK);
  camera.lookAt(CAM_LOOK);
  // 核心呼吸
  var pulse = 1 + Math.sin(t * 1.7) * 0.07;
  coreSprites.forEach(function (sp, i) {
    var base = sp.userData.baseS || (sp.userData.baseS = sp.scale.x);
    sp.scale.set(base * pulse, base * pulse, 1);
  });
  if (currentMonthSprite) {
    var mp = 1 + Math.sin(t * 2.6) * 0.28;
    var mb = currentMonthSprite.userData.baseS || (currentMonthSprite.userData.baseS = currentMonthSprite.scale.x);
    currentMonthSprite.scale.set(mb * mp, mb * mp, 1);
  }
  renderer.render(scene, camera);
  if (DEBUG) { $('dbg').style.display = 'block'; $('dbg').textContent = 'calls ' + renderer.info.render.calls + ' · pts ' + renderer.info.render.points; }
}

/* ═════════ 10. 啟動 ═════════ */
window.__flowBooted = true;
window.__flow = {
  debugState: function () {
    return { calls: renderer.info.render.calls, points: renderer.info.render.points, tris: renderer.info.render.triangles, lite: LITE };
  }
};
loadData();
loadAnnualPlan();
animate();
</script>
