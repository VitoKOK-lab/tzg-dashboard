<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Social Profile" name="UI Kit · Social Profile" subtitle="Brand applied in context: avatar, bio, highlights, editorial feed" viewport="910x600" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TAHIR ZAINAB · Social Profile</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper-warm);color:var(--ink);font-family:var(--font-sans-tc)}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px 70px;box-sizing:border-box}
  .head{text-align:center;margin-bottom:30px}
  .eyebrow{font-family:var(--font-sans);font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-deep)}
  h1{font-family:var(--font-sans-tc);font-weight:700;font-size:30px;margin:6px 0 0}
  .sub{font-family:var(--font-serif-tc);color:var(--ink-soft);font-size:15px;margin-top:6px}
  .phone{width:390px;background:#fff;border-radius:46px;padding:10px;box-shadow:0 40px 90px rgba(43,24,34,.22);border:1px solid var(--line)}
  .screen{background:#fff;border-radius:38px;overflow:hidden;position:relative}
  .notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:120px;height:28px;background:var(--ink);border-radius:16px;z-index:20}
  .scroll{max-height:740px;overflow-y:auto}
  .scroll::-webkit-scrollbar{width:0}
</style></head>
<body>
<div class="wrap">
  <div class="head">
    <div class="eyebrow">In Context</div>
    <h1>社群主頁</h1>
    <div class="sub">品牌套用於社群主頁：大頭貼、精選封面、品牌化貼文牆。</div>
  </div>
  <div class="phone"><div class="screen"><div class="notch"></div><div id="root"></div></div></div>
</div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js"></script>
<script src="image-slot.js"></script>
<script type="text/babel" src="Profile.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;
function App(){
  const [following,setFollowing]=useState(false);
  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  return (
    <div className="scroll">
      <StatusBar/>
      <TopBar/>
      <Header/>
      <Actions following={following} onToggle={()=>setFollowing(f=>!f)} />
      <HighlightTray/>
      <Tabs/>
      <FeedGrid/>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body></html>
