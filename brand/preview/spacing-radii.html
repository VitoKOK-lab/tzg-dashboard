<!DOCTYPE html><!-- @dsCard group="Spacing" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:26px 30px;color:var(--ink)}
  .row{display:flex;gap:18px;align-items:flex-end}
  .item{display:flex;flex-direction:column;align-items:center;gap:9px}
  .box{width:84px;height:64px;background:var(--pink-050);border:1.5px solid var(--zana-pink)}
  .nm{font-family:var(--font-sans);font-size:11px;color:var(--ink)}
  .vl{font-family:var(--font-sans);font-size:10px;color:var(--ink-faint)}
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="nm">xs</div><div class="vl">4px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="nm">sm</div><div class="vl">8px</div></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><div class="nm">md</div><div class="vl">14px</div></div>
    <div class="item"><div class="box" style="border-radius:22px"></div><div class="nm">lg</div><div class="vl">22px</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:120px"></div><div class="nm">pill</div><div class="vl">999px</div></div>
  </div>
</body></html>
