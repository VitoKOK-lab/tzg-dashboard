<!DOCTYPE html><!-- @dsCard group="Brand" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:24px 30px;color:var(--ink);display:flex;gap:16px}
  .tile{flex:1;border-radius:var(--r-md);height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border:1px solid var(--line)}
  .tile img{height:62px;width:auto;object-fit:contain}
  .nm{font-family:var(--font-sans);font-size:10px;letter-spacing:.14em;text-transform:uppercase}
</style></head>
<body>
  <div class="tile" style="background:#fff"><img src="../assets/logo-gold.png"><div class="nm" style="color:var(--gold-deep)">Gold / white</div></div>
  <div class="tile" style="background:#fff"><img src="../assets/logo-pink.png"><div class="nm" style="color:var(--zana-pink)">Pink / white</div></div>
  <div class="tile" style="background:#fff"><img src="../assets/logo-black.png"><div class="nm" style="color:var(--ink-soft)">Ink / white</div></div>
  <div class="tile" style="background:var(--zana-pink);border:none"><img src="../assets/logo-white.png"><div class="nm" style="color:#fff">White / pink</div></div>
  <div class="tile" style="background:var(--ink);border:none"><img src="../assets/logo-gold.png"><div class="nm" style="color:var(--gold-300)">Gold / ink</div></div>
</body></html>
