<!DOCTYPE html><!-- @dsCard group="Type" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:22px 26px;color:var(--ink);display:flex;flex-direction:column;gap:16px}
  .block{background:var(--paper-warm);border:1px solid var(--line);border-radius:var(--r-md);padding:16px 20px}
  .role{font-family:var(--font-sans-tc);font-weight:500;font-size:13px;color:var(--zana-pink);margin-bottom:4px}
  .name{line-height:1.1}
  .use{font-family:var(--font-sans-tc);font-size:13px;color:var(--ink-soft);margin-top:7px}
  .glyph{font-size:18px;color:var(--ink);margin-top:6px;letter-spacing:.01em}
  .glyph small{color:var(--ink-faint)}
</style></head>
<body>
  <div class="block">
    <div class="role">中文主字體</div>
    <div class="name" style="font-family:var(--font-sans-tc);font-weight:700;font-size:30px">思源黑體 / 微軟正黑體</div>
    <div class="use">適用：標題、內文、說明文字</div>
    <div class="glyph" style="font-family:var(--font-sans-tc)">天地玄黃 宇宙洪荒 <small>Aa Bb Cc 1234567890</small></div>
  </div>
  <div class="block">
    <div class="role">中文輔字體</div>
    <div class="name" style="font-family:var(--font-serif-tc);font-weight:600;font-size:30px">思源宋體</div>
    <div class="use">適用：品牌故事、情境文字</div>
    <div class="glyph" style="font-family:var(--font-serif-tc)">天地玄黃 宇宙洪荒 <small>Aa Bb Cc 1234567890</small></div>
  </div>
</body></html>
