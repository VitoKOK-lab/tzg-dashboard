<!DOCTYPE html><!-- @dsCard group="Colors" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:28px 30px;color:var(--ink)}
  .row{display:flex;gap:14px}
  .sw{flex:1;display:flex;flex-direction:column}
  .chip{height:96px;border-radius:var(--r-sm);box-shadow:var(--shadow-xs);border:1px solid rgba(43,24,34,.05)}
  .role{font-family:var(--font-sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold-deep);margin-top:12px}
  .name{font-family:var(--font-serif-tc);font-weight:600;font-size:16px;margin-top:3px}
  .meta{font-family:var(--font-sans);font-size:11px;color:var(--ink-faint);margin-top:4px;line-height:1.5}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#E6007E"></div><div class="role">主色 Primary</div><div class="name">札娜紅 · 桃紅</div><div class="meta">#E6007E<br>230·0·126 · PMS 213C</div></div>
    <div class="sw"><div class="chip" style="background:var(--foil-gold)"></div><div class="role">燙金 Gold</div><div class="name">Gold 金</div><div class="meta">#C5B382<br>197·179·130 · PMS 8640C</div></div>
    <div class="sw"><div class="chip" style="background:#50C8BE"></div><div class="role">亮點 Highlight</div><div class="name">泰熙爾藍</div><div class="meta">#50C8BE<br>80·200·190 · PMS 3258C</div></div>
    <div class="sw"><div class="chip" style="background:#B12468"></div><div class="role">輔助 Secondary</div><div class="name">暗桃紅</div><div class="meta">#B12468<br>177·36·104 · PMS 215C</div></div>
    <div class="sw"><div class="chip" style="background:#fff;border:1px solid var(--line)"></div><div class="role">背景 Base</div><div class="name">純白</div><div class="meta">#FFFFFF<br>255·255·255 · Bright White</div></div>
  </div>
</body></html>
