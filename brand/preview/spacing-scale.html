<!DOCTYPE html><!-- @dsCard group="Spacing" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:26px 30px;color:var(--ink)}
  .lbl{font-family:var(--font-sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:14px}
  .row{display:flex;align-items:flex-end;gap:12px}
  .item{display:flex;flex-direction:column;align-items:center;gap:7px}
  .bar{background:var(--foil-gold-soft);border-radius:3px;width:26px}
  .vl{font-family:var(--font-sans);font-size:10px;color:var(--ink-faint)}
</style></head>
<body>
  <div class="lbl">Spacing scale · 8pt base</div>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><div class="vl">1·4</div></div>
    <div class="item"><div class="bar" style="height:8px"></div><div class="vl">2·8</div></div>
    <div class="item"><div class="bar" style="height:12px"></div><div class="vl">3·12</div></div>
    <div class="item"><div class="bar" style="height:16px"></div><div class="vl">4·16</div></div>
    <div class="item"><div class="bar" style="height:24px"></div><div class="vl">5·24</div></div>
    <div class="item"><div class="bar" style="height:32px"></div><div class="vl">6·32</div></div>
    <div class="item"><div class="bar" style="height:48px"></div><div class="vl">7·48</div></div>
    <div class="item"><div class="bar" style="height:64px"></div><div class="vl">8·64</div></div>
    <div class="item"><div class="bar" style="height:88px"></div><div class="vl">9·96</div></div>
  </div>
</body></html>
