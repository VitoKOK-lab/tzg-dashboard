<!DOCTYPE html><!-- @dsCard group="Colors" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:26px 30px;color:var(--ink)}
  .lbl{font-family:var(--font-sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:12px}
  .bar{display:flex;height:64px;border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--shadow-xs);border:1px solid var(--line)}
  .seg{display:flex;align-items:flex-end;padding:8px 10px;font-family:var(--font-sans);font-size:11px;letter-spacing:.04em}
  .legend{display:flex;gap:22px;margin-top:16px;flex-wrap:wrap}
  .li{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft)}
  .dot{width:13px;height:13px;border-radius:3px;flex:none}
</style></head>
<body>
  <div class="lbl">社群配色比例 · Social color ratio</div>
  <div class="bar">
    <div class="seg" style="flex:68;background:#fff;color:var(--ink-faint)">白底為主 White</div>
    <div class="seg" style="flex:20;background:#E6007E;color:#fff">桃紅重點 Pink</div>
    <div class="seg" style="flex:8;background:var(--foil-gold);color:#5e4f2b">金點綴</div>
    <div class="seg" style="flex:4;background:#50C8BE;color:#0c4a45">藍</div>
  </div>
  <div class="legend">
    <div class="li"><span class="dot" style="background:#fff;border:1px solid var(--line)"></span>純白為主畫面</div>
    <div class="li"><span class="dot" style="background:#E6007E"></span>桃紅作重點引導</div>
    <div class="li"><span class="dot" style="background:var(--foil-gold)"></span>金色點綴精緻元素</div>
    <div class="li"><span class="dot" style="background:#50C8BE"></span>藍綠：緞帶／封條靈魂點綴</div>
  </div>
</body></html>
