<!DOCTYPE html><!-- @dsCard group="Components" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--paper-warm);padding:26px 30px;color:var(--ink);display:flex;gap:18px}
  .card{flex:1;background:#fff;border-radius:var(--r-md);box-shadow:var(--shadow-sm);overflow:hidden;border:1px solid rgba(43,24,34,.04)}
  .ph{height:90px;background:linear-gradient(135deg,#FBD9EC,#F4A9D2);position:relative}
  .ph .tag{position:absolute;top:10px;left:10px;font-family:var(--font-sans);font-size:9px;letter-spacing:.16em;text-transform:uppercase;background:#fff;color:var(--dark-pink);padding:4px 9px;border-radius:4px;font-weight:600}
  .bd{padding:14px 16px}
  .ttl{font-family:var(--font-serif-tc);font-weight:500;font-size:17px;letter-spacing:.01em}
  .pr{font-family:var(--font-sans);font-weight:600;font-size:21px;color:var(--zana-pink);margin-top:6px;display:flex;align-items:baseline;gap:6px;font-feature-settings:"lnum" 1,"tnum" 1;letter-spacing:.01em}
  .pr small{font-family:var(--font-sans);font-size:11px;color:var(--ink-faint);text-decoration:line-through}
  .rule{height:1px;background:var(--line);margin:12px 0}
  .meta{font-family:var(--font-sans);font-size:11px;color:var(--ink-faint)}
</style></head>
<body>
  <div class="card">
    <div class="ph"><span class="tag">New</span></div>
    <div class="bd">
      <div class="ttl">札娜緞光唇釉</div>
      <div class="pr">$880 <small>$1,080</small></div>
      <div class="rule"></div>
      <div class="meta">★ 4.9 · 1,204 則評論</div>
    </div>
  </div>
  <div class="card">
    <div class="ph" style="background:linear-gradient(135deg,#F0E9D7,#DBCFA8)"><span class="tag" style="color:var(--gold-deep)">Limited</span></div>
    <div class="bd">
      <div class="ttl">燙金禮盒組</div>
      <div class="pr">$2,480</div>
      <div class="rule"></div>
      <div class="meta">附泰熙爾藍緞帶封條</div>
    </div>
  </div>
</body></html>
