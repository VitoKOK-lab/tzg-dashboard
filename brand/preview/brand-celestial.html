<!DOCTYPE html><!-- @dsCard group="Brand" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--paper-warm);padding:22px 26px;color:var(--ink);display:flex;gap:22px;align-items:center}
  .art{flex:none;width:230px;border-radius:var(--r-sm);border:1px solid var(--line);overflow:hidden;background:#fff}
  .art img{width:100%;display:block}
  .body{flex:1}
  .role{font-family:var(--font-sans-tc);font-weight:500;font-size:13px;color:var(--zana-pink);margin-bottom:6px}
  .ttl{font-family:var(--font-sans-tc);font-weight:700;font-size:20px}
  .desc{font-family:var(--font-serif-tc);font-size:14px;color:var(--ink-soft);line-height:1.7;margin-top:8px}
  .tags{display:flex;flex-wrap:wrap;gap:7px;margin-top:14px}
  .t{font-family:var(--font-sans-tc);font-size:11.5px;color:var(--gold-deep);border:1px solid var(--gold-300);border-radius:999px;padding:4px 11px}
</style></head>
<body>
  <div class="art"><img src="../assets/celestial-astrolabe.png"></div>
  <div class="body">
    <div class="role">包裝紋樣 · Celestial talisman</div>
    <div class="ttl">星月 × 日 · 跨越座標的相遇</div>
    <div class="desc">以品牌故事為圖騰：巴基斯坦的星與月、台灣的日，化為羅盤、星宿與經緯座標。燙金線描於桃紅之上。</div>
    <div class="tags">
      <span class="t">#巴基斯坦 星月</span><span class="t">#台灣 日</span><span class="t">#星宿</span>
      <span class="t">#羅盤座標</span><span class="t">#座標經緯</span><span class="t">#寶石</span><span class="t">#星空</span><span class="t">#沙子</span><span class="t">#花印</span>
    </div>
  </div>
</body></html>
