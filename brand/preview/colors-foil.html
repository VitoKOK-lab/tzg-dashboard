<!DOCTYPE html><!-- @dsCard group="Colors" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:26px 30px;color:var(--ink);display:flex;gap:22px;align-items:stretch}
  .panel{flex:1;border-radius:var(--r-md);padding:20px 22px;display:flex;flex-direction:column;justify-content:space-between;min-height:150px}
  .lbl{font-family:var(--font-sans);font-size:10px;letter-spacing:.2em;text-transform:uppercase;margin-bottom:10px}
  .big{font-family:var(--font-display);font-size:34px;line-height:1.05;font-weight:600;letter-spacing:.16em}
  .big.han{font-size:46px;letter-spacing:.1em}
  .rule{height:2px;border-radius:2px;margin-top:14px}
  .note{font-family:var(--font-sans);font-size:11px;margin-top:6px}
</style></head>
<body>
  <div class="panel" style="background:#fff;border:1px solid var(--line-gold)">
    <div class="lbl" style="color:var(--gold-deep)">Foil on white</div>
    <div class="big tz-foil">TAHIR ZAINAB</div>
    <div class="rule" style="background:var(--foil-gold)"></div>
    <div class="note" style="color:var(--ink-faint)">燙金細節：髮絲線、封條、字標</div>
  </div>
  <div class="panel" style="background:#2B1822">
    <div class="lbl" style="color:var(--gold-300)">Foil on ink</div>
    <div class="big han tz-foil">札娜</div>
    <div class="rule" style="background:var(--foil-gold)"></div>
    <div class="note" style="color:#bda9b4">金在深色上最顯精緻光澤</div>
  </div>
</body></html>
