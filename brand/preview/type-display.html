<!DOCTYPE html><!-- @dsCard group="Type" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:22px 26px;color:var(--ink);display:flex;flex-direction:column;gap:16px}
  .block{background:var(--paper-warm);border:1px solid var(--line);border-radius:var(--r-md);padding:16px 20px}
  .role{font-family:var(--font-sans-tc);font-weight:500;font-size:13px;color:var(--zana-pink);margin-bottom:4px}
  .use{font-family:var(--font-sans-tc);font-size:13px;color:var(--ink-soft);margin-top:7px}
  .glyph{font-size:18px;color:var(--ink);margin-top:6px}
  .glyph small{color:var(--ink-faint)}
</style></head>
<body>
  <div class="block">
    <div class="role">英文主字體</div>
    <div style="font-family:var(--font-sans);font-weight:700;font-size:34px;line-height:1">Helvetica</div>
    <div class="use">適用：英文標題、品牌名稱、數字</div>
    <div class="glyph" style="font-family:var(--font-sans)">Aa Bb Cc Dd <small>1234567890</small></div>
  </div>
  <div class="block">
    <div class="role">英文輔字體</div>
    <div style="font-family:var(--font-serif);font-size:34px;line-height:1">Georgia / Serif</div>
    <div class="use">適用：英文長文、報價單</div>
    <div class="glyph" style="font-family:var(--font-serif)">Aa Bb Cc Dd <small>1234567890</small></div>
  </div>
</body></html>
