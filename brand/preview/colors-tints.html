<!DOCTYPE html><!-- @dsCard group="Colors" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:26px 30px;color:var(--ink)}
  .grp{margin-bottom:18px}
  .lbl{font-family:var(--font-sans);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:9px}
  .scale{display:flex;gap:0;border-radius:var(--r-sm);overflow:hidden;box-shadow:var(--shadow-xs)}
  .s{flex:1;height:52px;display:flex;align-items:flex-end;padding:6px 8px;font-family:var(--font-sans);font-size:10px;color:var(--ink-soft)}
  .s.dk{color:#fff}
</style></head>
<body>
  <div class="grp"><div class="lbl">桃紅 Pink tints — white-dominant accents</div>
    <div class="scale">
      <div class="s" style="background:#FDF0F7">050</div>
      <div class="s" style="background:#FBD9EC">100</div>
      <div class="s" style="background:#F4A9D2">200</div>
      <div class="s dk" style="background:#E6007E">500</div>
      <div class="s dk" style="background:#B12468">700</div>
      <div class="s dk" style="background:#8E1A52">800</div>
    </div>
  </div>
  <div class="grp"><div class="lbl">金 Gold tints — foil & refined detail</div>
    <div class="scale">
      <div class="s" style="background:#FAF7EF">050</div>
      <div class="s" style="background:#F0E9D7">100</div>
      <div class="s" style="background:#DBCFA8">300</div>
      <div class="s dk" style="background:#C5B382">500</div>
      <div class="s dk" style="background:#A8945F">deep</div>
      <div class="s dk" style="background:var(--foil-gold)">foil</div>
    </div>
  </div>
  <div class="grp"><div class="lbl">泰熙爾藍 Teal — ribbon / seal accents only</div>
    <div class="scale">
      <div class="s" style="background:#EAF8F6">050</div>
      <div class="s" style="background:#CFEEEA">100</div>
      <div class="s dk" style="background:#50C8BE">500</div>
    </div>
  </div>
</body></html>
