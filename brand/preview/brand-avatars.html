<!DOCTYPE html><!-- @dsCard group="Brand" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--paper-warm);padding:24px 30px;color:var(--ink);display:flex;gap:26px;align-items:center;justify-content:center}
  .av{display:flex;flex-direction:column;align-items:center;gap:11px}
  .ring{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:3px;background:#fff}
  .story{background:linear-gradient(135deg,var(--zana-pink),var(--gold))}
  .disc{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid #fff;overflow:hidden}
  .disc img{width:78%;height:78%;object-fit:contain;display:block}
  .nm{font-family:var(--font-sans);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
</style></head>
<body>
  <div class="av"><div class="ring story"><div class="disc" style="background:#fff"><img src="../assets/logo-square-pink.png"></div></div><div class="nm">白底 · 限動環</div></div>
  <div class="av"><div class="ring" style="background:#fff;border:1px solid var(--line)"><div class="disc" style="background:var(--zana-pink);border-color:var(--zana-pink)"><img src="../assets/logo-square-white.png"></div></div><div class="nm">桃紅底</div></div>
  <div class="av"><div class="ring" style="background:#fff;border:1px solid var(--line)"><div class="disc" style="background:var(--ink);border-color:var(--ink)"><img src="../assets/logo-square-gold.png"></div></div><div class="nm">墨底 · 燙金</div></div>
  <div class="av"><div class="ring" style="background:#fff;border:1px solid var(--line)"><div class="disc" style="background:var(--gold-050)"><img src="../assets/logo-square-gold.png"></div></div><div class="nm">金 · 米底</div></div>
</body></html>
