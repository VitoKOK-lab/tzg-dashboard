<!DOCTYPE html><!-- @dsCard group="Spacing" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--paper-warm);padding:30px;color:var(--ink);display:flex;gap:22px}
  .item{flex:1;display:flex;flex-direction:column;align-items:center;gap:11px}
  .box{width:100%;height:66px;background:#fff;border-radius:var(--r-md)}
  .nm{font-family:var(--font-sans);font-size:11px;color:var(--ink)}
  .vl{font-family:var(--font-sans);font-size:10px;color:var(--ink-faint)}
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="nm">xs</div><div class="vl">subtle lift</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="nm">sm</div><div class="vl">card resting</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="nm">md</div><div class="vl">raised card</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="nm">lg</div><div class="vl">modal / overlay</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-pink)"></div><div class="nm">pink</div><div class="vl">primary CTA glow</div></div>
</body></html>
