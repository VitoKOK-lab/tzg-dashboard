<!DOCTYPE html><!-- @dsCard group="Type" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:24px 30px;color:var(--ink)}
  .r{display:flex;align-items:baseline;gap:16px;padding:7px 0;border-bottom:1px solid var(--line)}
  .r:last-child{border-bottom:none}
  .tag{flex:none;width:78px;font-family:var(--font-sans);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint)}
  .spec{flex:none;width:96px;font-family:var(--font-sans);font-size:11px;color:var(--gold-deep)}
  .ex{flex:1;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
</style></head>
<body>
  <div class="r"><div class="tag">Display</div><div class="spec">Helvetica 92</div><div class="ex" style="font-family:var(--font-display);font-size:34px;font-weight:700;letter-spacing:.06em">TAHIR ZAINAB</div></div>
  <div class="r"><div class="tag">H1 大標</div><div class="spec">思源黑體 700</div><div class="ex" style="font-family:var(--font-sans-tc);font-size:30px;font-weight:700">綻放的美</div></div>
  <div class="r"><div class="tag">H2</div><div class="spec">思源黑體 500 / 40</div><div class="ex" style="font-family:var(--font-sans-tc);font-size:24px;font-weight:500">本季新色上市</div></div>
  <div class="r"><div class="tag">Body</div><div class="spec">思源黑體 400 / 16</div><div class="ex" style="font-family:var(--font-sans-tc);font-size:16px;color:var(--ink-soft)">以純白為底，桃紅作重點引導。</div></div>
  <div class="r"><div class="tag">品牌故事</div><div class="spec">思源宋體 400</div><div class="ex" style="font-family:var(--font-serif-tc);font-size:19px">一抹桃紅，是故事的開端。</div></div>
  <div class="r"><div class="tag">Eyebrow</div><div class="spec">Helvetica / 12</div><div class="ex tz-eyebrow" style="font-size:13px">NEW ARRIVAL · 新品</div></div>
</body></html>
