<!DOCTYPE html><!-- @dsCard group="Colors" -->
<html lang="zh-Hant"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans-tc);background:var(--white);padding:26px 30px;color:var(--ink)}
  .row{display:flex;gap:14px}
  .sw{flex:1;display:flex;flex-direction:column}
  .chip{height:80px;border-radius:var(--r-sm);box-shadow:var(--shadow-xs);border:1px solid rgba(43,24,34,.05);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:30px}
  .name{font-family:var(--font-sans);font-size:12px;letter-spacing:.04em;margin-top:9px;color:var(--ink)}
  .meta{font-family:var(--font-sans);font-size:11px;color:var(--ink-faint);margin-top:2px}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#2B1822;color:#fff">Aa</div><div class="name">Ink — 主文字</div><div class="meta">#2B1822</div></div>
    <div class="sw"><div class="chip" style="background:#6A5560;color:#fff">Aa</div><div class="name">Ink soft — 次要</div><div class="meta">#6A5560</div></div>
    <div class="sw"><div class="chip" style="background:#A999A2;color:#fff">Aa</div><div class="name">Ink faint — 說明</div><div class="meta">#A999A2</div></div>
    <div class="sw"><div class="chip" style="background:#FFFCFA;color:var(--ink)">Aa</div><div class="name">Paper warm — 面板</div><div class="meta">#FFFCFA</div></div>
    <div class="sw"><div class="chip" style="background:#fff;color:var(--ink);border-color:var(--line)">Aa</div><div class="name">Line — 分隔線</div><div class="meta">#EDE4E8</div></div>
  </div>
</body></html>
