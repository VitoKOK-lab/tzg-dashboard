<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TZG 泰熙爾札娜珠寶</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Montserrat', 'PingFang TC', sans-serif; background: #fff; display: flex; flex-direction: column; }

/* ── TAB BAR ── */
.tabbar {
  height: 44px;
  background: #fff;
  border-bottom: 1px solid rgba(0,0,0,.08);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  padding: 0 16px;
  gap: 2px;
}

.brand {
  display: flex;
  align-items: center;
  padding-right: 16px;
  border-right: 1px solid rgba(0,0,0,.07);
  margin-right: 6px;
  flex-shrink: 0;
}
.brand img {
  height: 28px;
  width: auto;
  display: block;
  mix-blend-mode: multiply;
}

.tab {
  display: flex;
  align-items: center;
  padding: 0 14px;
  font-size: 12px;
  font-weight: 600;
  color: #e8a0b0;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: color .14s, border-color .14s;
  white-space: nowrap;
  user-select: none;
}
.tab:hover { color: #D4456A; }
.tab.active { color: #D4456A; border-bottom-color: #D4456A; font-weight: 700; }

/* ── CONTENT ── */
.content { flex: 1; position: relative; overflow: hidden; }

iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  border: none;
  transform: translateX(100%);
  transition: transform .4s cubic-bezier(.4,0,.2,1);
  pointer-events: none;
}
iframe.active { pointer-events: auto; z-index: 1; }

/* Loading */
.loader {
  position: fixed; inset: 0; top: 44px;
  display: flex; align-items: center; justify-content: center;
  background: #fff;
  z-index: 10;
  transition: opacity .2s;
}
.loader.hidden { opacity: 0; pointer-events: none; }
.spinner {
  width: 28px; height: 28px;
  border: 2px solid #e8e4dc;
  border-top-color: #C9A961;
  border-radius: 50%;
  animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="tabbar">
  <div class="brand"><img src="logo.png" alt="TZG"></div>
  <div class="tab active" onclick="show(0)">日報</div>
  <div class="tab" onclick="show(1)">月報</div>
  <div class="tab" onclick="show(2)">短影音</div>
  <div class="tab" onclick="show(3)">代理</div>
  <div class="tab" onclick="show(4)">KPI</div>
</div>

<div class="content">
  <div class="loader" id="loader"><div class="spinner"></div></div>
  <iframe id="f0" class="active" src=""></iframe>
  <iframe id="f1" src=""></iframe>
  <iframe id="f2" src=""></iframe>
  <iframe id="f3" src=""></iframe>
  <iframe id="f4" src=""></iframe>
</div>

<script>
const urls = [
  'https://vitokok-lab.github.io/tzg-dashboard/output/dashboard_latest.html',
  'https://vitokok-lab.github.io/tzg-dashboard/output/monthly_review.html',
  'https://vitokok-lab.github.io/meta-dashboard/',
  'https://tzg-commission.fly.dev/review/2026-04?t=a301e31bce1565a771691b7ad3167e05',
  'https://vitokok-lab.github.io/tzg-staff-dashboard/output/staff_latest.html',
];

const loaded = [false, false, false, false, false];
let cur = 0;

const tabs   = document.querySelectorAll('.tab');
const frames = [0,1,2,3,4].map(i => document.getElementById('f'+i));
const loader = document.getElementById('loader');

// 第一個 iframe 監聽 load，並帶 cache-buster 確保每次載入最新版（手機常被快取卡住）
frames[0].onload = () => { loaded[0] = true; if(cur===0) loader.classList.add('hidden'); };
frames[0].style.transform = 'translateX(0)';
frames[0].src = urls[0] + (urls[0].includes('?') ? '&' : '?') + '_t=' + Date.now();

function show(i) {
  if (i === cur) return;
  const dir = i > cur ? 1 : -1;          // 1：新頁從右滑入；-1：從左滑入
  const oldF = frames[cur], newF = frames[i];

  tabs[cur].classList.remove('active');
  tabs[i].classList.add('active');

  if (!loaded[i]) {
    loader.classList.remove('hidden');
    newF.src = urls[i] + (urls[i].includes('?') ? '&' : '?') + '_t=' + Date.now();
    newF.onload = () => { loaded[i] = true; loader.classList.add('hidden'); };
  } else {
    loader.classList.add('hidden');
  }

  // 新頁先瞬移到進場側，再一起滑動
  newF.style.transition = 'none';
  newF.style.transform = `translateX(${dir * 100}%)`;
  newF.classList.add('active');
  requestAnimationFrame(() => {
    newF.style.transition = '';
    newF.style.transform = 'translateX(0)';
    oldF.style.transform = `translateX(${-dir * 100}%)`;
  });
  oldF.classList.remove('active');
  cur = i;
}
</script>
</body>
</html>
