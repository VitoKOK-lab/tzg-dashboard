<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS-BRAIN // TZG Neural Vault</title>
<style>
:root {
  --bg: #000000;
  --bg-panel: rgba(10,12,28,.85);
  --bg-panel-solid: #08091a;
  --line: rgba(255,255,255,.08);
  --pink: #ff3d8a;
  --cyan: #00f0ff;
  --purple: #9b5cff;
  --gold: #ffb800;
  --green: #00ff88;
  --red: #ff3d3d;
  --dim: rgba(255,255,255,.42);
  --mid: rgba(255,255,255,.7);
  --hi: #ffffff;
  --mono: 'SF Mono','JetBrains Mono','Menlo','Consolas',monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 100%; height: 100vh;
  background: #000;
  font-family: -apple-system, 'Noto Sans TC', 'Inter', sans-serif;
  color: var(--mid);
  overflow: hidden;
}

/* === 背景三層：黑底 + 星塵 + 微紫漸層 === */
#bg-grad {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(80,40,150,.18) 0%, rgba(20,15,50,.05) 30%, #000 70%);
}
#stars, #stars2 {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}
#stars {
  background:
    radial-gradient(1px 1px at 20% 30%, white, transparent),
    radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,.7), transparent),
    radial-gradient(2px 2px at 50% 50%, rgba(255,255,255,.9), transparent),
    radial-gradient(1px 1px at 80% 10%, rgba(255,200,255,.8), transparent),
    radial-gradient(2px 2px at 90% 60%, white, transparent),
    radial-gradient(1px 1px at 33% 80%, rgba(200,200,255,.6), transparent),
    radial-gradient(1px 1px at 10% 90%, white, transparent),
    radial-gradient(1px 1px at 70% 20%, rgba(255,180,220,.6), transparent);
  background-size: 700px 700px;
  animation: starsMove 100s linear infinite;
}
#stars2 {
  background:
    radial-gradient(1px 1px at 30% 50%, rgba(0,240,255,.5), transparent),
    radial-gradient(1px 1px at 70% 30%, rgba(155,92,255,.45), transparent),
    radial-gradient(1px 1px at 50% 80%, rgba(255,61,138,.4), transparent);
  background-size: 900px 900px;
  animation: starsMove 150s linear infinite reverse;
}
@keyframes starsMove {
  from { transform: translate(0,0); }
  to { transform: translate(-700px, 700px); }
}

/* === CRT scanline 效果 === */
#scanlines {
  position: fixed; inset: 0; z-index: 50; pointer-events: none;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,.4) 50%);
  background-size: 100% 3px;
  opacity: .15;
  mix-blend-mode: multiply;
}

/* === Graph === */
#graph { position: fixed; inset: 0; z-index: 1; }

/* === 共用 panel === */
.panel {
  background: var(--bg-panel);
  border: 1px solid rgba(0,240,255,.18);
  border-radius: 3px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 0 24px rgba(0,0,0,.5);
}
.panel-h {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--pink);
  letter-spacing: 2px;
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,61,138,.15);
  text-transform: uppercase;
  font-weight: 700;
}
.panel-h .badge {
  float: right;
  color: var(--dim);
  font-weight: 400;
}

/* === Topbar === */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 42px;
  z-index: 10;
  background: linear-gradient(180deg, rgba(10,12,28,.95) 0%, rgba(10,12,28,.0) 100%);
  border-bottom: 1px solid rgba(255,61,138,.2);
  display: flex; align-items: center;
  padding: 0 16px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  font-family: var(--mono);
  font-size: 11px;
}
.brand {
  color: var(--pink);
  letter-spacing: 3px;
  font-weight: 700;
  text-shadow: 0 0 10px rgba(255,61,138,.5);
}
.sub-brand {
  margin-left: 12px;
  color: var(--dim);
  letter-spacing: 1.5px;
  font-size: 10px;
}
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); display: inline-block; margin-right: 6px;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.3 } }
.topbar-stats {
  margin-left: auto;
  display: flex; gap: 8px;
}
.topbar-stats .stat {
  padding: 4px 10px;
  border: 1px solid rgba(0,240,255,.28);
  border-radius: 2px;
  color: var(--cyan);
  font-size: 10px;
  letter-spacing: 1px;
  background: rgba(0,240,255,.04);
}

/* === Stock ticker (左下) === */
#stock-ticker {
  position: fixed; bottom: 14px; left: 14px;
  z-index: 10;
  padding: 8px 14px;
  font-family: var(--mono);
  font-size: 11px;
  display: flex; gap: 12px; align-items: center;
}
.stock-sym { color: var(--gold); font-weight: 700; letter-spacing: 1px; }
.stock-name { color: var(--dim); font-size: 10px; }
.stock-price { color: var(--hi); font-size: 16px; font-weight: 700; }
.stock-chg.up { color: var(--green); }
.stock-chg.down { color: var(--red); }

/* === Left bar (Dataview lists) === */
#leftbar {
  position: fixed; top: 56px; left: 14px;
  z-index: 10;
  width: 230px;
  display: flex; flex-direction: column; gap: 10px;
  font-size: 11px;
}
.dv-list { padding: 0 10px 10px; }
.dv-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 5px 4px;
  border-bottom: 1px dotted rgba(255,255,255,.06);
  font-size: 11px;
  cursor: pointer;
  transition: background .15s;
}
.dv-row:hover { background: rgba(0,240,255,.06); }
.dv-row:last-child { border-bottom: 0; }
.dv-row .name { color: var(--mid); }
.dv-row .meta { color: var(--dim); font-family: var(--mono); font-size: 9px; }

/* === Right bar (MOC tree + Service status) === */
#rightbar {
  position: fixed; top: 56px; right: 14px;
  z-index: 10;
  width: 230px;
  display: flex; flex-direction: column; gap: 10px;
  font-size: 11px;
}
.moc-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 5px 10px;
  border-bottom: 1px dotted rgba(255,255,255,.06);
  cursor: pointer;
  transition: background .15s;
  font-size: 11px;
}
.moc-row:hover { background: rgba(255,61,138,.08); color: var(--hi); }
.moc-row:last-child { border-bottom: 0; }
.moc-row .icon { color: var(--pink); margin-right: 6px; }
.moc-row .cnt { color: var(--dim); font-family: var(--mono); font-size: 9px; }

/* Service status mini chips */
.svc-grid {
  padding: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.svc-chip {
  background: rgba(0,240,255,.05);
  border: 1px solid rgba(0,240,255,.28);
  padding: 6px 8px;
  border-radius: 2px;
  font-size: 10px;
  text-align: center;
}
.svc-chip .nm { color: var(--cyan); font-weight: 600; font-family: var(--mono); }
.svc-chip .st { color: var(--green); font-size: 8px; letter-spacing: 1.5px; margin-top: 2px; }
.svc-chip .st::before { content: '● '; }

/* === AI Chat panel (右下) === */
#ai-chat {
  position: fixed; bottom: 14px; right: 14px;
  z-index: 10;
  width: 280px;
}
.chat-msg {
  padding: 6px 12px;
  font-size: 11px;
  border-bottom: 1px dotted rgba(255,255,255,.05);
  line-height: 1.5;
}
.chat-msg:last-of-type { border-bottom: 0; }
.chat-msg .who {
  color: var(--pink);
  font-family: var(--mono);
  font-size: 10px;
  font-weight: 700;
  margin-right: 6px;
}
.chat-msg .who.jarvis { color: var(--cyan); }
.chat-input {
  padding: 8px 12px;
  border-top: 1px solid rgba(0,240,255,.15);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
}
.chat-input::before { content: '> '; color: var(--green); }
.cursor { display: inline-block; width: 7px; height: 11px; background: var(--cyan); margin-left: 2px; animation: blink 1s infinite; }
@keyframes blink { 0%,50% { opacity:1; } 51%,100% { opacity:0; } }

/* === Center floating logo === */
#center-logo {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  pointer-events: none;
  text-align: center;
  opacity: .25;
  font-family: var(--mono);
}
#center-logo .big {
  font-size: 12px;
  color: var(--pink);
  letter-spacing: 5px;
  text-shadow: 0 0 16px rgba(255,61,138,.5);
}
#center-logo .sub {
  margin-top: 4px;
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 3px;
}

/* === Detail panel (click node) === */
#detail {
  position: fixed; top: 60px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  width: 320px;
  display: none;
  animation: dropIn .25s ease;
}
@keyframes dropIn {
  from { opacity: 0; transform: translate(-50%, -10px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}
#detail.show { display: block; }
#detail .d-h {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,61,138,.2);
}
#detail .d-name {
  color: var(--pink);
  font-size: 16px;
  font-weight: 700;
  font-family: var(--mono);
  letter-spacing: 1px;
}
#detail .d-sub {
  color: var(--dim);
  font-size: 10px;
  letter-spacing: 2px;
  margin-top: 4px;
  text-transform: uppercase;
}
#detail .d-body {
  padding: 12px 16px;
}
#detail .d-row {
  display: flex; justify-content: space-between;
  padding: 5px 0;
  font-size: 11px;
  border-bottom: 1px dotted rgba(255,255,255,.06);
}
#detail .d-row:last-child { border: 0; }
#detail .d-row .l { color: var(--dim); letter-spacing: 1px; }
#detail .d-row .v { color: var(--cyan); font-family: var(--mono); font-weight: 600; }
#detail .close {
  position: absolute; top: 8px; right: 12px;
  color: var(--dim); cursor: pointer; font-size: 14px;
  width: 20px; height: 20px; line-height: 18px; text-align: center;
  border: 1px solid rgba(255,255,255,.15); border-radius: 2px;
}
#detail .close:hover { color: var(--pink); border-color: var(--pink); }

/* === Hint === */
#hint {
  position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%);
  z-index: 10;
  font-size: 9px; color: var(--dim); font-family: var(--mono);
  letter-spacing: 1.5px;
}

/* === 文字節點 label === */
.node-label {
  background: rgba(0,0,0,.7);
  border: 1px solid rgba(255,61,138,.4);
  padding: 6px 10px;
  border-radius: 3px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--hi);
}
.node-label .nl-t { color: var(--pink); font-weight: 700; }
.node-label .nl-s { color: var(--dim); font-size: 9px; margin-top: 2px; letter-spacing: 1.5px; }
</style>

const TYPE_COLOR = {
  persona: '#ff3d8a',
  agent:   '#ff66a8',
  system:  '#00f0ff',
  moc:     '#ffb800',
  project: '#9b5cff',
  note:    'rgba(255,255,255,.7)',
};
const TYPE_LABEL = {
  persona: 'PERSONA',
  agent:   'BUSINESS AGENT',
  system:  'SYSTEM',
  moc:     'MAP OF CONTENT',
  project: 'PROJECT',
  note:    'NOTE',
};

function fmtN(n) { return (n||0).toLocaleString(); }
function fmtF(n) {
  n = n || 0;
  if (n >= 1e6) return 'NT$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return 'NT$' + (n/1e3).toFixed(0) + 'K';
  return 'NT$' + n;
}

}

  chatBody.appendChild(div);
});

// === 3D Force Graph ===
const Graph = ForceGraph3D()
  (document.getElementById('graph'))
  .backgroundColor('rgba(0,0,0,0)')
  .nodeRelSize(4)
  .nodeVal(n => {
    if (n.type === 'agent' && n.rev) {
      const maxRev = Math.max(...DATA.nodes.filter(x => x.rev).map(x => x.rev), 1);
      return 3 + (n.rev / maxRev) * 10;
    }
    return { persona: 8, system: 6, moc: 9, project: 5, note: 3, agent: 5 }[n.type] || 4;
  })
  .nodeColor(n => TYPE_COLOR[n.type] || '#fff')
  .nodeOpacity(0.95)
  .nodeLabel(n => `
    <div class="node-label">
      <div class="nl-t">${n.name}</div>
      <div class="nl-s">${TYPE_LABEL[n.type] || ''} · ${n.sub || ''}</div>
    </div>
  `)
  .linkColor(l => {
    // 連到 MOC 用金色、其他預設紫
    const s = (typeof l.source === 'object' ? l.source.id : l.source) || '';
    const t = (typeof l.target === 'object' ? l.target.id : l.target) || '';
    if (s.startsWith('m:') || t.startsWith('m:')) return 'rgba(255,184,0,0.4)';
    if (s.startsWith('s:') || t.startsWith('s:')) return 'rgba(0,240,255,0.35)';
    return 'rgba(155,92,255,0.35)';
  })
  .linkWidth(0.8)
  .linkOpacity(0.6)
  .linkDirectionalParticles(2)
  .linkDirectionalParticleWidth(1.4)
  .linkDirectionalParticleColor(l => {
    const s = (typeof l.source === 'object' ? l.source.id : l.source) || '';
    if (s.startsWith('m:')) return '#ffb800';
    if (s.startsWith('s:')) return '#00f0ff';
    return '#ff3d8a';
  })
  .linkDirectionalParticleSpeed(0.006)
  .onNodeClick(focusNode)
  .onBackgroundClick(() => document.getElementById('detail').classList.remove('show'))
  .graphData(DATA);

function focusNode(node) {
  const p = document.getElementById('detail');
  p.classList.add('show');
  p.querySelector('.d-name').textContent = node.name;
  p.querySelector('.d-sub').textContent  = (TYPE_LABEL[node.type] || '') + ' · ' + (node.sub || '');
  const body = document.getElementById('d-body');
  let rows = `<div class="d-row"><span class="l">節點 ID</span><span class="v" style="font-size:10px;">${node.id}</span></div>`;
  rows += `<div class="d-row"><span class="l">類別</span><span class="v">${TYPE_LABEL[node.type] || '--'}</span></div>`;
  if (node.rev) {
    rows += `<div class="d-row"><span class="l">業績</span><span class="v">${fmtF(node.rev)}</span></div>`;
    rows += `<div class="d-row"><span class="l">訂單</span><span class="v">${fmtN(node.orders)}</span></div>`;
    rows += `<div class="d-row"><span class="l">客戶</span><span class="v">${fmtN(node.customers)}</span></div>`;
  }
  if (node.status) {
    rows += `<div class="d-row"><span class="l">狀態</span><span class="v" style="color:var(--green);">● ${node.status}</span></div>`;
  }
  // 計算連線數
  const linkCount = DATA.links.filter(l => {
    const s = (typeof l.source === 'object' ? l.source.id : l.source);
    const t = (typeof l.target === 'object' ? l.target.id : l.target);
    return s === node.id || t === node.id;
  }).length;
  rows += `<div class="d-row"><span class="l">連線</span><span class="v">${linkCount}</span></div>`;
  body.innerHTML = rows;

  // 鏡頭飛到節點
  if (node.x != null) {
    const distance = 80;
    const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
    Graph.cameraPosition(
      { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
      node, 1400
    );
  }
}

// 自動旋轉，拖拉暫停
const controls = Graph.controls();
if (controls) {
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.35;
  Graph.renderer().domElement.addEventListener('pointerdown', () => {
    controls.autoRotate = false;
  });
}
