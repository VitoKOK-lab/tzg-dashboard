<style>
:root {
  --bg-deep: #050817;
  --bg-mid: #0b1132;
  --neon-pink: #ff3d8a;
  --neon-cyan: #00f0ff;
  --neon-purple: #9b5cff;
  --neon-gold: #ffb800;
  --text-dim: rgba(255,255,255,.45);
  --text-mid: rgba(255,255,255,.72);
  --text-hi: #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width: 100%; height: 100vh;
  background: radial-gradient(ellipse at 50% 50%, #1a1f4a 0%, var(--bg-mid) 40%, var(--bg-deep) 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans TC', sans-serif;
  color: var(--text-mid);
  overflow: hidden;
}

/* 粒子星塵背景（純 CSS） */
#stars, #stars2, #stars3 {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
}
#stars {
  background:
    radial-gradient(1px 1px at 20% 30%, white, transparent),
    radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,.7), transparent),
    radial-gradient(2px 2px at 50% 50%, white, transparent),
    radial-gradient(1px 1px at 80% 10%, rgba(255,200,255,.8), transparent),
    radial-gradient(2px 2px at 90% 60%, white, transparent),
    radial-gradient(1px 1px at 33% 80%, rgba(200,200,255,.6), transparent),
    radial-gradient(1px 1px at 10% 90%, white, transparent),
    radial-gradient(1px 1px at 70% 20%, rgba(255,180,220,.6), transparent);
  background-size: 600px 600px;
  animation: starsMove 90s linear infinite;
}
#stars2 {
  background:
    radial-gradient(1px 1px at 30% 50%, rgba(0,240,255,.6), transparent),
    radial-gradient(1px 1px at 70% 30%, rgba(155,92,255,.5), transparent),
    radial-gradient(1px 1px at 50% 80%, rgba(255,61,138,.4), transparent);
  background-size: 800px 800px;
  animation: starsMove 120s linear infinite reverse;
}
@keyframes starsMove {
  from { transform: translate(0, 0); }
  to { transform: translate(-600px, 600px); }
}

/* 3D graph 容器 */
#graph {
  position: fixed; inset: 0; z-index: 1;
}

/* Topbar */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 50px;
  display: flex; align-items: center;
  padding: 0 20px;
  z-index: 10;
  background: linear-gradient(180deg, rgba(11,17,50,.92) 0%, rgba(11,17,50,.0) 100%);
  border-bottom: 1px solid rgba(255,61,138,.25);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.logo {
  font-family: 'SF Mono','Menlo','DM Mono',monospace;
  font-size: 14px;
  color: var(--neon-pink);
  letter-spacing: 3px;
  font-weight: 700;
  text-shadow: 0 0 12px rgba(255,61,138,.6);
}
.sublogo {
  margin-left: 14px;
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 1.5px;
}
#topbar .right {
  margin-left: auto;
  display: flex;
  gap: 12px;
  font-family: 'SF Mono',monospace;
  font-size: 10px;
}
#topbar .stat {
  padding: 5px 12px;
  border: 1px solid rgba(0,240,255,.3);
  border-radius: 3px;
  color: var(--neon-cyan);
  letter-spacing: 1px;
  background: rgba(0,240,255,.05);
}
.live-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: #00ff66;
  display: inline-block; margin-right: 6px;
  box-shadow: 0 0 8px #00ff66;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .3; }
}

/* Left metric cards */
#leftbar {
  position: fixed; top: 70px; left: 14px;
  z-index: 10;
  display: flex; flex-direction: column; gap: 8px;
  font-family: 'SF Mono',monospace;
}
.metric-card {
  background: rgba(11,17,50,.75);
  border: 1px solid rgba(0,240,255,.25);
  padding: 8px 14px;
  border-radius: 3px;
  min-width: 96px;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
.metric-card .l {
  color: var(--text-dim);
  font-size: 8.5px;
  letter-spacing: 2px;
  margin-bottom: 3px;
  text-transform: uppercase;
}
.metric-card .v {
  color: var(--neon-cyan);
  font-size: 16px;
  font-weight: 700;
  letter-spacing: .5px;
}
.metric-card.pink .v { color: var(--neon-pink); }
.metric-card.purple .v { color: var(--neon-purple); }

/* Right tree (top agents) */
#rightbar {
  position: fixed; top: 70px; right: 14px;
  z-index: 10;
  background: rgba(11,17,50,.85);
  border: 1px solid rgba(255,61,138,.3);
  padding: 12px 16px;
  border-radius: 3px;
  width: 220px;
  font-size: 11px;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
#rightbar .title {
  color: var(--neon-pink);
  font-family: 'SF Mono',monospace;
  letter-spacing: 2px;
  margin-bottom: 10px;
  font-size: 10px;
  font-weight: 700;
  border-bottom: 1px solid rgba(255,61,138,.2);
  padding-bottom: 6px;
}
#rightbar .item {
  padding: 5px 6px;
  border-radius: 2px;
  color: var(--text-mid);
  cursor: pointer;
  transition: all .15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
}
#rightbar .item:hover {
  background: rgba(255,61,138,.12);
  color: var(--text-hi);
  transform: translateX(2px);
}
#rightbar .item .rank {
  display: inline-block; min-width: 16px;
  color: var(--neon-cyan);
  font-family: 'SF Mono',monospace;
  font-size: 10px;
  margin-right: 8px;
}
#rightbar .item .rev {
  color: var(--neon-gold);
  font-family: 'SF Mono',monospace;
  font-size: 10px;
}

/* Bottom service chips */
#service-chips {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%);
  z-index: 10;
  display: flex; gap: 10px;
}
.chip {
  background: rgba(11,17,50,.85);
  border: 1px solid var(--neon-cyan);
  padding: 8px 18px;
  border-radius: 4px;
  font-size: 13px;
  color: var(--neon-cyan);
  font-weight: 600;
  letter-spacing: 1px;
  position: relative;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  box-shadow: 0 0 16px rgba(0,240,255,.15), inset 0 0 8px rgba(0,240,255,.08);
}
.chip .status {
  display: block;
  font-size: 9px;
  color: rgba(0,240,255,.65);
  margin-top: 2px;
  letter-spacing: 2px;
  font-weight: 400;
}

/* Center floating KPI */
#center-kpi {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 5;
  pointer-events: none;
  text-align: center;
  opacity: .35;
}
#center-kpi .big {
  font-family: 'SF Mono',monospace;
  font-size: 11px;
  color: var(--neon-pink);
  letter-spacing: 4px;
  margin-bottom: 4px;
  text-shadow: 0 0 12px rgba(255,61,138,.6);
}
#center-kpi .sub {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 3px;
}

/* Detail panel (click node) */
#detail-panel {
  position: fixed; top: 80px; right: 244px;
  z-index: 11;
  background: rgba(11,17,50,.92);
  border: 1px solid var(--neon-pink);
  padding: 16px 20px;
  border-radius: 4px;
  width: 250px;
  font-size: 12px;
  display: none;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(255,61,138,.3);
  animation: slideIn .25s ease;
}
@keyframes slideIn {

  to { opacity: 1; transform: translateX(0); }
}
#detail-panel.show { display: block; }
#detail-panel .pname {
  color: var(--neon-pink);
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
  font-family: 'SF Mono',monospace;
  letter-spacing: 1px;
  text-shadow: 0 0 10px rgba(255,61,138,.5);

#detail-panel .ploc {
  color: var(--text-dim);
  font-size: 10px;
  letter-spacing: 2px;
  margin-bottom: 12px;
  text-transform: uppercase;
}
#detail-panel .row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px dotted rgba(255,255,255,.08);
  align-items: baseline;
}
#detail-panel .row:last-child { border: 0; }
#detail-panel .row .l {
  color: var(--text-dim);
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
#detail-panel .row .v {
  color: var(--neon-cyan);
  font-family: 'SF Mono',monospace;
  font-size: 13px;
  font-weight: 600;
}
#detail-panel .close {
  position: absolute; top: 8px; right: 10px;
  color: var(--text-dim); cursor: pointer; font-size: 16px;
  width: 20px; height: 20px; line-height: 18px; text-align: center;
  border: 1px solid rgba(255,255,255,.15); border-radius: 2px;
}
#detail-panel .close:hover { color: var(--neon-pink); border-color: var(--neon-pink); }

/* Footer info */
#footer-info {
  position: fixed; bottom: 8px; left: 14px;
  z-index: 10;
  font-size: 9px;
  color: var(--text-dim);
  font-family: 'SF Mono',monospace;
  letter-spacing: 1.5px;
  pointer-events: none;
}

/* Hint */
#hint {
  position: fixed; bottom: 8px; right: 14px;
  z-index: 10;
  font-size: 9px;
  color: var(--text-dim);
  font-family: 'SF Mono',monospace;
  letter-spacing: 1.5px;
}
</style>

  div.className = 'item';
  div.title = a.fullName;
  div.innerHTML = `<span><span class="rank">${(i+1).toString().padStart(2,'0')}</span>${a.name}</span><span class="rev">${(a.rev/1e3).toFixed(0)}K</span>`;
  div.onclick = () => focusNode(a.id);
  topList.appendChild(div);
});

// 3D Force Graph
const maxRev = Math.max(...DATA.nodes.map(n => n.rev), 1);
const Graph = ForceGraph3D()
  (document.getElementById('graph'))
  .backgroundColor('rgba(0,0,0,0)')
  .nodeRelSize(5)
  .nodeVal(n => 2 + (n.rev / maxRev) * 14)
  .nodeColor(n => {
    const t = n.rev / maxRev;
    if (t > 0.66) return '#ff3d8a';
    if (t > 0.33) return '#9b5cff';
    return '#00f0ff';
  })
  .nodeOpacity(0.95)
  .nodeLabel(n => `
    <div style="background:rgba(11,17,50,.95);border:1px solid #ff3d8a;padding:8px 12px;border-radius:3px;font-family:'SF Mono',monospace;font-size:11px;color:#fff;">
      <div style="color:#ff3d8a;font-weight:700;margin-bottom:4px;">${n.fullName}</div>
      <div>業績 <b style="color:#00f0ff;">NT$ ${fmtN(n.rev)}</b></div>
      <div>${n.orders} 訂單 · ${n.customers} 客戶</div>
    </div>
  `)
  .linkColor(() => 'rgba(155,92,255,0.4)')
  .linkWidth(l => Math.max(0.6, Math.min(3, (l.value||1) * 0.6)))
  .linkOpacity(0.55)
  .linkDirectionalParticles(2)
  .linkDirectionalParticleWidth(1.2)
  .linkDirectionalParticleColor(() => '#ff3d8a')
  .linkDirectionalParticleSpeed(0.008)
  .onNodeClick(node => focusNode(node.id))
  .onBackgroundClick(() => {
    document.getElementById('detail-panel').classList.remove('show');
  })
  .graphData(DATA);

function focusNode(id) {
  const node = DATA.nodes.find(n => n.id === id);
  if (!node) return;
  const p = document.getElementById('detail-panel');
  p.classList.add('show');
  p.querySelector('.pname').textContent = node.fullName;
  p.querySelector('.ploc').textContent  = (node.location || 'TZG') + ' · BRANCH';
  p.querySelector('[data-key="rev"]').textContent       = fmtF(node.rev);
  p.querySelector('[data-key="orders"]').textContent    = fmtN(node.orders);
  p.querySelector('[data-key="customers"]').textContent = fmtN(node.customers);
  p.querySelector('[data-key="aov"]').textContent       = fmtN(node.aov);
  // 鏡頭飛到那個節點
  if (node.x != null) {
    const distance = 90;
    const distRatio = 1 + distance / Math.hypot(node.x, node.y, node.z);
    Graph.cameraPosition(
      { x: node.x * distRatio, y: node.y * distRatio, z: node.z * distRatio },
      node, 1400
    );
  }
}

// 自動緩慢旋轉鏡頭（用 OrbitControls autoRotate）
const controls = Graph.controls();
if (controls) {
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.45;
  // 拖拉時暫停自動旋轉
  Graph.renderer().domElement.addEventListener('pointerdown', () => {
    controls.autoRotate = false;
  });
}

</script>
