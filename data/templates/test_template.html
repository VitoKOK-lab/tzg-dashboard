<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS-BRAIN // TZG 神經中樞</title>
<style>
:root {
  --bg: #02010a;
  --bg-panel: rgba(8,8,24,.88);
  --pink: #ff3d8a;
  --cyan: #00f0ff;
  --purple: #9b5cff;
  --gold: #ffb800;
  --orange: #ff8800;
  --green: #00ff88;
  --red: #ff3d3d;
  --dim: rgba(255,255,255,.42);
  --mid: rgba(255,255,255,.7);
  --hi: #ffffff;
  --mono: 'SF Mono','JetBrains Mono','Menlo','Consolas',monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100vh;
  background: #000;
  font-family: -apple-system, 'Noto Sans TC', sans-serif;
  color: var(--mid);
  overflow: hidden;
}

#bg-grad {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 50%, #160b3a 0%, #08051c 35%, #01000a 80%);
}

#scene-canvas { position: fixed; inset: 0; z-index: 1; cursor: grab; }
#scene-canvas:active { cursor: grabbing; }

#labels-layer { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
.node-label {
  position: absolute;
  transform: translate(-50%, -50%);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 700;
  white-space: nowrap;
  text-shadow:
    0 0 10px currentColor,
    0 0 18px currentColor,
    0 0 4px rgba(0,0,0,.9);
  letter-spacing: 1px;
  pointer-events: auto;
  cursor: pointer;
  transition: filter .15s, opacity .5s ease;
  user-select: none;
}
.node-label:hover { filter: brightness(1.4) drop-shadow(0 0 8px currentColor); }
.node-label.anchor { color: var(--cyan);   font-size: 22px; }
.node-label.agent  { color: var(--pink);   font-size: 16px; }
.node-label.video  { color: var(--orange); font-size: 13px; font-weight: 600; }
.node-label .sub {
  display: block;
  font-size: 9px;
  font-weight: 400;
  color: rgba(255,255,255,.5);
  letter-spacing: 2px;
  margin-top: 2px;
  text-shadow: none;
  text-transform: uppercase;
}

/* Focus mode */
#labels-layer.focused .node-label:not(.is-focus) { opacity: .08 !important; pointer-events: none; }
#labels-layer.focused .node-label.is-focus {
  filter: drop-shadow(0 0 14px currentColor) drop-shadow(0 0 28px currentColor);
  transform: translate(-50%, -50%) scale(1.15);
}

/* CRT scanline */
#scanlines {
  position: fixed; inset: 0; z-index: 60; pointer-events: none;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,.5) 50%);
  background-size: 100% 3px;
  opacity: .10;
  mix-blend-mode: multiply;
}

.panel {
  background: var(--bg-panel);
  border: 1px solid rgba(0,240,255,.2);
  border-radius: 14px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(0,0,0,.6), inset 0 0 16px rgba(0,240,255,.04);
  overflow: hidden;
}
.panel-h {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--pink);
  letter-spacing: 2.5px;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(255,61,138,.18);
  text-transform: uppercase;
  font-weight: 700;
  background: rgba(255,61,138,.05);
}
.panel-h .badge { float: right; color: var(--dim); font-weight: 400; }

/* Topbar */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 42px;
  z-index: 10;
  background: linear-gradient(180deg, rgba(8,8,24,.92) 0%, rgba(8,8,24,0) 100%);
  border-bottom: 1px solid rgba(255,61,138,.2);
  display: flex; align-items: center;
  padding: 0 16px;
  font-family: var(--mono);
  font-size: 11px;
}
.brand { color: var(--pink); letter-spacing: 3px; font-weight: 700; text-shadow: 0 0 12px rgba(255,61,138,.6); }
.sub-brand { margin-left: 12px; color: var(--dim); font-size: 10px; letter-spacing: 1.5px; }
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); display: inline-block; margin-right: 6px;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.3 } }
.topbar-stats { margin-left: auto; display: flex; gap: 8px; }
.topbar-stats .stat {
  padding: 4px 14px;
  border: 1px solid rgba(0,240,255,.28);
  border-radius: 999px;
  color: var(--cyan);
  font-size: 10px;
  background: rgba(0,240,255,.04);
}
.topbar-stats .stat.video { color: var(--orange); border-color: rgba(255,136,0,.5); background: rgba(255,136,0,.05); }
.topbar-stats .stat.period { color: var(--pink); border-color: rgba(255,61,138,.5); background: rgba(255,61,138,.05); }

/* Left panels (3 Dataview lists with REAL data) */
#leftbar {
  position: fixed; top: 56px; left: 14px;
  z-index: 10;
  width: 250px;
  display: flex; flex-direction: column; gap: 10px;
}
.dv-list { padding: 4px 8px 8px; }
.dv-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 6px 8px;
  border-radius: 8px;
  font-size: 11px;
  cursor: pointer;
  transition: background .15s, transform .15s;
}
.dv-row:hover { background: rgba(0,240,255,.08); transform: translateX(2px); }
.dv-row .name { color: var(--mid); }
.dv-row .meta { color: var(--dim); font-family: var(--mono); font-size: 9px; }
.dv-row .meta .pct { color: var(--gold); }

/* Detail panel */
#detail {
  position: fixed; top: 50%; right: 24px;
  transform: translateY(-50%);
  z-index: 20;
  width: 300px;
  display: none;
  animation: slideIn .25s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateY(-50%) translateX(10px); } to { opacity:1; transform:translateY(-50%) translateX(0); } }
#detail.show { display: block; }
#detail .d-h { padding: 14px 18px; border-bottom: 1px solid rgba(255,61,138,.2); position: relative; }
#detail .d-name { color: var(--pink); font-size: 15px; font-weight: 700; font-family: var(--mono); letter-spacing: 1px; word-break: break-all; line-height: 1.4; }
#detail .d-sub { color: var(--dim); font-size: 10px; letter-spacing: 2px; margin-top: 6px; text-transform: uppercase; }
#detail .d-body { padding: 12px 18px; }
#detail .d-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 11px; border-bottom: 1px dotted rgba(255,255,255,.06); align-items: baseline; }
#detail .d-row:last-child { border: 0; }
#detail .d-row .l { color: var(--dim); letter-spacing: 1px; }
#detail .d-row .v { color: var(--cyan); font-family: var(--mono); font-weight: 600; }
#detail .close { position: absolute; top: 8px; right: 12px; color: var(--dim); cursor: pointer; font-size: 14px; width: 22px; height: 22px; line-height: 20px; text-align: center; border: 1px solid rgba(255,255,255,.15); border-radius: 50%; }
#detail .close:hover { color: var(--pink); border-color: var(--pink); }

#hint { position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 9px; color: var(--dim); font-family: var(--mono); letter-spacing: 1.5px; }
#gen-info { position: fixed; bottom: 6px; right: 14px; z-index: 10; font-size: 9px; color: var(--dim); font-family: var(--mono); letter-spacing: 1px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.140.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="bg-grad"></div>
<canvas id="scene-canvas"></canvas>
<div id="labels-layer"></div>
<div id="scanlines"></div>

<div id="topbar">
  <span class="brand">JARVIS-BRAIN</span>
  <span class="sub-brand">// TZG 神經中樞 · <span class="live-dot"></span>DATA LIVE</span>
  <div class="topbar-stats">
    <span class="stat" id="t-rev">--</span>
    <span class="stat" id="t-ord">--</span>
    <span class="stat" id="t-cust">--</span>
    <span class="stat video" id="t-plays">--</span>
    <span class="stat period" id="t-period">--</span>
  </div>
</div>

<div id="leftbar">
  <div class="panel">
    <div class="panel-h">熱門影片 // TOP PLAYS <span class="badge" style="color:var(--orange);">6</span></div>
    <div class="dv-list" id="dv-videos"></div>
  </div>
  <div class="panel">
    <div class="panel-h">TOP 業務 // BY 業績 <span class="badge" style="color:var(--pink);">6</span></div>

  </div>

    <div class="panel-h">UTM 渠道 // CHANNEL MIX</div>

</div>

<div id="detail" class="panel">

    <div class="d-name">--</div>
    <div class="d-sub">--</div>
  </div>
  <div class="d-body" id="d-body"></div>
</div>

<div id="hint">DRAG · ZOOM · CLICK NODE = INSPECT</div>
<div id="gen-info">SYS://generated <span id="gen-at">--</span></div>

<script>
const DATA = __GRAPH_DATA__;

const TYPE_COLOR = {
  anchor: 0x00f0ff,
  agent:  0xff3d8a,
  video:  0xff8800,
};
const TYPE_LABEL_NAME = {
  anchor: 'SYSTEM ANCHOR',
  agent:  'BUSINESS AGENT',
  video:  'SHORT VIDEO',
};

function fmtN(n) { return (n||0).toLocaleString(); }
function fmtF(n) {
  n = n||0;
  if (n >= 1e6) return 'NT$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return 'NT$' + (n/1e3).toFixed(0) + 'K';
  return 'NT$' + n;
}

// Topbar KPI
const k = DATA.kpi || {};
document.getElementById('t-rev').textContent  = fmtF(k.total_rev);
document.getElementById('t-ord').textContent  = (k.total_orders||0) + ' 訂單';
document.getElementById('t-cust').textContent = (k.total_customers||0) + ' 客戶';
document.getElementById('t-plays').textContent = '▶ ' + (((k.total_plays||0)/1000) | 0) + 'K 播放';
document.getElementById('t-period').textContent = k.period_label || '近 60 天';
document.getElementById('gen-at').textContent = DATA.generated_at || '';

function renderDv(el, items) {
  el.innerHTML = items.map(i => `
    <div class="dv-row">
      <span class="name">${i.name}</span>
      <span class="meta">${i.tag||''} <span class="pct">${i.mtime||''}</span></span>
    </div>
  `).join('');
}
renderDv(document.getElementById('dv-videos'), (DATA.dataview||{}).top_videos  || []);
renderDv(document.getElementById('dv-agents'), (DATA.dataview||{}).top_agents  || []);
renderDv(document.getElementById('dv-utm'),    (DATA.dataview||{}).utm_channels || []);

// ═══════════════════════════════════════════════════════════
// THREE.JS 3D 場景
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('scene-canvas');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(W(), H());
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x02010a, 0.0004);  // 更淡，看到更遠

const camera = new THREE.PerspectiveCamera(60, W()/H(), 0.1, 5000);
camera.position.set(0, 200, 1000);              // 拉遠看全景

let controls = null;
if (typeof THREE.OrbitControls === 'function') {
  controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.35;
  controls.minDistance = 200;
  controls.maxDistance = 2000;                  // 可以退到更遠
}
let cameraAngle = 0;
let autoRotate = controls ? false : true;
let isDragging = false, dragStartX = 0, dragStartY = 0, dragAngleX = 0, dragAngleY = 0;
if (!controls) {
  canvas.addEventListener('pointerdown', e => { isDragging = true; dragStartX = e.clientX; dragStartY = e.clientY; autoRotate = false; });
  canvas.addEventListener('pointerup', () => isDragging = false);
  canvas.addEventListener('pointermove', e => {
    if (!isDragging) return;
    dragAngleX += (e.clientX - dragStartX) * 0.005;
    dragAngleY = Math.max(-1.5, Math.min(1.5, dragAngleY + (e.clientY - dragStartY) * 0.005));
    dragStartX = e.clientX; dragStartY = e.clientY;
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const z = camera.position.length();
    const nz = Math.max(200, Math.min(900, z + e.deltaY * 0.5));
    camera.position.multiplyScalar(nz / z);
  }, { passive: false });
}

// Core sphere
const coreGroup = new THREE.Group();
scene.add(coreGroup);
const icoGeo = new THREE.IcosahedronGeometry(140, 3);
const icoLines = new THREE.LineSegments(new THREE.WireframeGeometry(icoGeo), new THREE.LineBasicMaterial({
  color: 0x00f0ff, transparent: true, opacity: 0.65, depthWrite: false,
}));
coreGroup.add(icoLines);
const icoGeo2 = new THREE.IcosahedronGeometry(155, 2);
const icoLines2 = new THREE.LineSegments(new THREE.WireframeGeometry(icoGeo2), new THREE.LineBasicMaterial({
  color: 0xff3d8a, transparent: true, opacity: 0.30, depthWrite: false,
}));
coreGroup.add(icoLines2);
const innerSphere = new THREE.Mesh(new THREE.SphereGeometry(115, 32, 32), new THREE.MeshBasicMaterial({
  color: 0xff3d8a, transparent: true, opacity: 0.18, side: THREE.BackSide, depthWrite: false,
}));
coreGroup.add(innerSphere);
const coreCore = new THREE.Mesh(new THREE.SphereGeometry(40, 24, 24), new THREE.MeshBasicMaterial({
  color: 0xffffff, transparent: true, opacity: 0.18,
}));
coreGroup.add(coreCore);

function makeGlowTexture(color) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = 128;
  const c = cv.getContext('2d');
  const g = c.createRadialGradient(64, 64, 0, 64, 64, 64);
  g.addColorStop(0, color);
  g.addColorStop(0.3, color.replace(')', ',0.6)').replace('rgb', 'rgba'));
  g.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = g; c.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(cv);
}
const coreGlow = new THREE.Sprite(new THREE.SpriteMaterial({
  map: makeGlowTexture('rgb(255,61,138)'), blending: THREE.AdditiveBlending,
  transparent: true, depthWrite: false,
}));
coreGlow.scale.set(280, 280, 1);
coreGroup.add(coreGlow);

// 粒子場
function makeParticles(count, rMin, rMax, baseSize, colorMix) {
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = rMin + Math.random() * (rMax - rMin);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    const t = Math.random();
    if (t < colorMix.white) { col[i*3]=1; col[i*3+1]=1; col[i*3+2]=1; }
    else if (t < colorMix.white + colorMix.pink) { col[i*3]=1; col[i*3+1]=0.24; col[i*3+2]=0.54; }
    else if (t < colorMix.white + colorMix.pink + colorMix.cyan) { col[i*3]=0; col[i*3+1]=0.94; col[i*3+2]=1; }
    else { col[i*3]=0.61; col[i*3+1]=0.36; col[i*3+2]=1; }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  return new THREE.Points(geo, new THREE.PointsMaterial({
    size: baseSize, transparent: true, opacity: 0.85,
    vertexColors: true, blending: THREE.AdditiveBlending,
    depthWrite: false, sizeAttenuation: true,
  }));
}
const farStars  = makeParticles(3500, 800, 1600, 2.0, {white:0.85, pink:0.07, cyan:0.05, purple:0.03});
const midStars  = makeParticles(1500, 400, 800,  2.2, {white:0.55, pink:0.20, cyan:0.15, purple:0.10});
const nearGlow  = makeParticles(500,  180, 380,  3.5, {white:0.30, pink:0.30, cyan:0.20, purple:0.20});
scene.add(farStars, midStars, nearGlow);

// 星雲
function makeNebulaTexture(c1, c2) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = 256;
  const ctx = cv.getContext('2d');
  const g = ctx.createRadialGradient(128, 128, 10, 128, 128, 128);
  g.addColorStop(0, c1); g.addColorStop(0.35, c2); g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, 256, 256);
  return new THREE.CanvasTexture(cv);
}
const nebulaPalettes = [
  ['rgba(255,61,138,.55)', 'rgba(155,92,255,.20)'],
  ['rgba(0,240,255,.50)',  'rgba(155,92,255,.18)'],
  ['rgba(255,184,0,.45)',  'rgba(255,61,138,.15)'],
  ['rgba(155,92,255,.50)', 'rgba(0,240,255,.15)'],
];
const nebulas = [];
for (let i = 0; i < 7; i++) {
  const pal = nebulaPalettes[i % nebulaPalettes.length];
  const mat = new THREE.SpriteMaterial({
    map: makeNebulaTexture(pal[0], pal[1]), blending: THREE.AdditiveBlending,
    transparent: true, depthWrite: false, opacity: 0.8,
  });
  const sprite = new THREE.Sprite(mat);
  const size = 450 + Math.random() * 350;
  sprite.scale.set(size, size, 1);
  const r = 700 + Math.random() * 500;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  sprite.position.set(r*Math.sin(phi)*Math.cos(theta), r*Math.sin(phi)*Math.sin(theta)*0.6, r*Math.cos(phi));
  sprite.userData = { baseOp: 0.8 };
  scene.add(sprite); nebulas.push(sprite);
}

// 螺旋星系
function makeSpiralGalaxy(count, radius, arms = 3, palette = 'pink') {
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const t = i / count;
    const armIndex = i % arms;
    const armOffset = (armIndex / arms) * Math.PI * 2;
    const angle = t * Math.PI * 5.5 + armOffset + (Math.random() - 0.5) * 0.6;
    const r = Math.pow(t, 0.55) * radius;
    const jitter = (Math.random() - 0.5) * radius * 0.04;
    pos[i*3]   = (r + jitter) * Math.cos(angle);
    pos[i*3+1] = (Math.random() - 0.5) * radius * 0.06;
    pos[i*3+2] = (r + jitter) * Math.sin(angle);
    if (t < 0.18) { col[i*3]=1; col[i*3+1]=0.92; col[i*3+2]=0.72; }
    else if (t < 0.65) {
      if (palette === 'pink')  { col[i*3]=1;   col[i*3+1]=0.42; col[i*3+2]=0.72; }
      if (palette === 'cyan')  { col[i*3]=0.2; col[i*3+1]=0.85; col[i*3+2]=1; }
      if (palette === 'purple'){ col[i*3]=0.7; col[i*3+1]=0.4;  col[i*3+2]=1; }
    } else { col[i*3]=0.55; col[i*3+1]=0.72; col[i*3+2]=1; }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const galaxy = new THREE.Points(geo, new THREE.PointsMaterial({
    size: 2.2, transparent: true, opacity: 0.85,
    vertexColors: true, blending: THREE.AdditiveBlending,
    depthWrite: false, sizeAttenuation: true,
  }));
  galaxy.userData = { baseOp: 0.85, autoRotateSpeed: 0.0008 };
  return galaxy;
}
const galaxies = [];
const gA = makeSpiralGalaxy(3500, 750, 3, 'pink'); gA.position.set(-1100, 250, -700); gA.rotation.set(0.55, 0.35, 0); scene.add(gA); galaxies.push(gA);
const gB = makeSpiralGalaxy(2500, 580, 4, 'cyan'); gB.position.set(950, -350, -850); gB.rotation.set(-0.45, 1.1, 0.2); scene.add(gB); galaxies.push(gB);
const gC = makeSpiralGalaxy(1800, 480, 2, 'purple'); gC.position.set(150, 700, -1100); gC.rotation.set(1.0, 0.6, -0.3); scene.add(gC); galaxies.push(gC);

// ─── 節點分布（按類別到不同層）───
function fibSphere(n, radius, offset = 0) {
  const points = [];
  const phi = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - ((i + offset) / (n - 1 + offset)) * 2;
    const r = Math.sqrt(Math.max(0, 1 - y * y));
    const theta = phi * (i + offset);
    points.push([Math.cos(theta) * r * radius, y * radius, Math.sin(theta) * r * radius]);
  }
  return points;
}

const nodes = DATA.nodes;
const layerCfg = {
  anchor: { radius: 0,   jitter: 0 },     // 錨點手動定位
  agent:  { radius: 380, jitter: 50 },    // 業務中圈拉開
  video:  { radius: 650, jitter: 80 },    // 影音最外圈拉得更開
};

const node3D = [];
const labelsLayer = document.getElementById('labels-layer');
const grouped = {};
nodes.forEach(n => { (grouped[n.type] ||= []).push(n); });

// 三個 anchor 純「左右平行」排列在 X 軸上，按資料流方向：
//   Meta（流量入口·左）→ Shopline（成交系統·中）→ 主星（年度成長·右）
//   中央 wireframe sphere 跟 Shopline 重疊，當作成交系統的科技外殼
const anchorPositions = {
  's:Meta':     [-1300, 0, 0],
  's:Shopline': [    0, 0, 0],
  's:Core':     [ 1300, 0, 0],   // 主星在右側終點
};

// 軌道衛星全域陣列（每 frame 更新位置）
const orbiters = [];   // { mesh, around, axis, dist, angle, speed }

function makePlanetMaterial(colorHex, emissive) {
  return new THREE.MeshBasicMaterial({
    color: colorHex,
    transparent: true,
    opacity: 0.95,
  });
}

Object.keys(grouped).forEach(type => {
  const arr = grouped[type];

  // ─── 錨點：大星球 + 軌道環 + 3 顆衛星 ───
  if (type === 'anchor') {
    arr.forEach(n => {
      const p = anchorPositions[n.id] || [0, 0, 0];
      const pos = new THREE.Vector3(p[0], p[1], p[2]);
      const isCore = n.is_core;
      // Core 主星用金色，其他 anchor 用青色
      const colorHex = isCore ? 0xffb800 : TYPE_COLOR.anchor;
      const rgbStr = isCore ? 'rgb(255,184,0)'
        : 'rgb(' + ((colorHex>>16)&255) + ',' + ((colorHex>>8)&255) + ',' + (colorHex&255) + ')';

      // 大星球 mesh（Core 主星 100，其他 anchor 50）
      const planetR = isCore ? 100 : 50;
      const planetMesh = new THREE.Mesh(
        new THREE.SphereGeometry(planetR, 32, 32),
        new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.55 })
      );
      planetMesh.position.copy(pos);
      scene.add(planetMesh);

      // wireframe 蓋上（讓表面有網格感）
      const wire = new THREE.LineSegments(
        new THREE.WireframeGeometry(new THREE.SphereGeometry(planetR * 1.02, 16, 12)),
        new THREE.LineBasicMaterial({ color: colorHex, transparent: true, opacity: 0.6, depthWrite: false })
      );
      wire.position.copy(pos);
      scene.add(wire);

      // 大光暈 sprite
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
        map: makeGlowTexture(rgbStr), blending: THREE.AdditiveBlending,
        transparent: true, depthWrite: false,
      }));
      sprite.scale.set(180, 180, 1);
      sprite.position.copy(pos);
      scene.add(sprite);

      // 軌道環（土星環風格）— RingGeometry
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(planetR * 1.8, planetR * 2.4, 64),
        new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.25, side: THREE.DoubleSide, depthWrite: false })
      );
      ring.position.copy(pos);
      ring.rotation.x = Math.PI / 2 - 0.3;
      ring.rotation.y = 0.4;
      scene.add(ring);

      if (isCore) {
        // ─── 主星專屬：12 顆月度業績衛星（取代預設 3 衛星）───
        //   每顆衛星 = 一個月，大小按業績、顏色按達標率
        const monthly = n.monthly_rev || [];
        const MONTHLY_TARGET = 4500000;  // 月目標 450 萬，用於上色
        monthly.forEach((m, mi) => {
          const revLog = Math.log10(Math.max(1, m.rev));
          const moonR = 5 + Math.min(11, (revLog - 5) * 4);   // 5 ~ 16
          const ach = m.rev / MONTHLY_TARGET;
          let moonColor, moonRgb;
          if (ach >= 1)        { moonColor = 0xffb800; moonRgb = 'rgb(255,184,0)'; }   // 達標金
          else if (ach >= 0.85){ moonColor = 0xffd966; moonRgb = 'rgb(255,217,102)'; } // 暖黃
          else if (ach >= 0.6) { moonColor = 0xff8800; moonRgb = 'rgb(255,136,0)'; }   // 橘
          else if (ach >= 0.3) { moonColor = 0xb86a2c; moonRgb = 'rgb(184,106,44)'; }  // 暗橘
          else                 { moonColor = 0x666666; moonRgb = 'rgb(102,102,102)'; } // 灰

          const moonMesh = new THREE.Mesh(
            new THREE.SphereGeometry(moonR, 14, 14),
            new THREE.MeshBasicMaterial({ color: moonColor, transparent: true, opacity: 0.95 })
          );
          const moonGlow = new THREE.Sprite(new THREE.SpriteMaterial({
            map: makeGlowTexture(moonRgb), blending: THREE.AdditiveBlending,
            transparent: true, depthWrite: false,
          }));
          moonGlow.scale.set(moonR * 4, moonR * 4, 1);
          moonMesh.add(moonGlow);
          // 本月加 pulse 環（亮一點）
          if (m.is_current) {
            moonMesh.userData.isCurrent = true;
          }
          // 把月度資料掛在 mesh 上，給 click 用
          moonMesh.userData.monthData = m;
          scene.add(moonMesh);
          orbiters.push({
            mesh: moonMesh,
            around: pos.clone(),
            axisTilt: 0.22,                                   // 12 顆同一軌道平面
            axisRoll: 0,
            dist: planetR * 2.0 + 60,                          // 約 260 半徑
            angle: (mi / 12) * Math.PI * 2,                    // 12 等分
            speed: 0.0015,                                     // 慢慢轉一圈代表一年
          });
        });
      } else {
        // ─── 一般 anchor：3 顆衛星 + 微星 hierarchy ───
        for (let mi = 0; mi < 3; mi++) {
          const moonR = 8 + Math.random() * 5;
          const moonMesh = new THREE.Mesh(
            new THREE.SphereGeometry(moonR, 12, 12),
            new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.9 })
          );
          const moonGlow = new THREE.Sprite(new THREE.SpriteMaterial({
            map: makeGlowTexture(rgbStr), blending: THREE.AdditiveBlending, transparent: true, depthWrite: false,
          }));
          moonGlow.scale.set(moonR * 4, moonR * 4, 1);
          moonMesh.add(moonGlow);
          scene.add(moonMesh);
          orbiters.push({
            mesh: moonMesh,
            around: pos.clone(),
            axisTilt: (Math.random() - 0.5) * 0.6,
            axisRoll: mi * (Math.PI * 2 / 3) + Math.random() * 0.4,
            dist: planetR * (3.2 + Math.random() * 1.5),
            angle: Math.random() * Math.PI * 2,
            speed: 0.006 + Math.random() * 0.005,
          });

          // 微星繞衛星（小星 → 衛星 → 主星 三層 hierarchy）
          const nMicros = 1 + Math.floor(Math.random() * 2);
          for (let mj = 0; mj < nMicros; mj++) {
            const microR = 1.8 + Math.random() * 2;
            const microMesh = new THREE.Mesh(
              new THREE.SphereGeometry(microR, 8, 8),
              new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 })
            );
            const microGlow = new THREE.Sprite(new THREE.SpriteMaterial({
              map: makeGlowTexture('rgb(255,255,255)'), blending: THREE.AdditiveBlending,
              transparent: true, depthWrite: false,
            }));
            microGlow.scale.set(microR * 5, microR * 5, 1);
            microMesh.add(microGlow);
            scene.add(microMesh);
            orbiters.push({
              mesh: microMesh,
              around: moonMesh,
              axisTilt: (Math.random() - 0.5) * 1.4,
              axisRoll: Math.random() * Math.PI * 2,
              dist: moonR * (2.3 + Math.random() * 0.8),
              angle: Math.random() * Math.PI * 2,
              speed: 0.03 + Math.random() * 0.025,
            });
          }
        }
      }

      const div = document.createElement('div');
      div.className = 'node-label anchor';
      if (isCore) div.style.color = '#ffb800';   // 主星 label 金色
      div.innerHTML = `${n.name}<span class="sub">${n.sub || ''}</span>`;
      div.addEventListener('click', () => focusNode(n, pos));
      labelsLayer.appendChild(div);
      node3D.push({ node: n, pos, sprite, mesh: planetMesh, div });
    });
    return;
  }

  // ─── 業務 / 影片 ─── 規律圓環軌道分布
  //   影片繞 Meta (左)、業務繞 Shopline (右)
  //   多個同心傾斜環（讓視覺有 3D 立體感）
  const orbitCenter = (type === 'video')
    ? new THREE.Vector3(...(anchorPositions['s:Meta']     || [-1000, 0, 0]))
    : new THREE.Vector3(...(anchorPositions['s:Shopline'] || [ 1000, 0, 0]));

  // 軌道環配置（依節點數自動拆環）
  let ringConfig;
  if (type === 'video') {
    // 30 個影音排 3 環（10 / 10 / 10）
    ringConfig = [
      { radius: 220, tilt:  0.30, startA: 0 },
      { radius: 320, tilt: -0.30, startA: Math.PI / 10 },
      { radius: 420, tilt:  0.15, startA: Math.PI / 5  },
    ];
  } else if (type === 'agent') {
    // 13 個業務排 2 環（7 / 6）
    ringConfig = [
      { radius: 200, tilt:  0.35, startA: 0 },
      { radius: 290, tilt: -0.25, startA: Math.PI / 6 },
    ];
  } else {
    ringConfig = [{ radius: 300, tilt: 0, startA: 0 }];
  }
  // 把 arr 平均分到各 ring（前環放 top items）
  const perRing = Math.ceil(arr.length / ringConfig.length);

  // 為每個 ring 畫淡淡的軌道導引線（讓「規律」一眼看出）
  const guideColor = (type === 'video') ? 0xff8800 : 0xff3d8a;
  ringConfig.forEach(cfg => {
    const ringPoints = [];
    const segments = 96;
    for (let s = 0; s <= segments; s++) {
      const a = (s / segments) * Math.PI * 2;
      const x = Math.cos(a) * cfg.radius;
      const yz = Math.sin(a) * cfg.radius;
      const y = yz * Math.cos(cfg.tilt);
      const z = yz * Math.sin(cfg.tilt);
      ringPoints.push(new THREE.Vector3(orbitCenter.x + x, orbitCenter.y + y, orbitCenter.z + z));
    }
    const ringGeo = new THREE.BufferGeometry().setFromPoints(ringPoints);
    const ringLine = new THREE.Line(ringGeo, new THREE.LineBasicMaterial({
      color: guideColor, transparent: true, opacity: 0.15, depthWrite: false,
    }));
    scene.add(ringLine);
  });

  arr.forEach((n, idx) => {
    const ringIdx = Math.min(ringConfig.length - 1, Math.floor(idx / perRing));
    const inRing  = idx % perRing;
    const ringCount = (ringIdx === ringConfig.length - 1)
      ? (arr.length - ringIdx * perRing)
      : perRing;
    const cfg = ringConfig[ringIdx];
    const angle = cfg.startA + (inRing / Math.max(1, ringCount)) * Math.PI * 2;
    // 軌道平面：cos(angle)*r 為 x、sin(angle)*r 為環平面切線
    //   切線方向投影到 (y, z)，加 tilt
    const x = Math.cos(angle) * cfg.radius;
    const yz = Math.sin(angle) * cfg.radius;
    const y = yz * Math.cos(cfg.tilt);
    const z = yz * Math.sin(cfg.tilt);
    const pos = new THREE.Vector3(orbitCenter.x + x, orbitCenter.y + y, orbitCenter.z + z);

    let planetR, haloSize;
    if (type === 'video') {
      const playsLog = Math.log10(Math.max(1, n.plays || 1));
      planetR = 4 + Math.min(8, playsLog * 1.6);     // 4 ~ 12
      haloSize = planetR * 4 + 8;
    } else if (type === 'agent') {
      const revLog = Math.log10(Math.max(1, n.rev || 1));
      planetR = 9 + Math.min(8, revLog * 1.2);       // 9 ~ 17
      haloSize = planetR * 3.5 + 12;
    } else {
      planetR = 8; haloSize = 30;
    }
    const colorHex = TYPE_COLOR[type];
    const rgbStr = 'rgb(' + ((colorHex>>16)&255) + ',' + ((colorHex>>8)&255) + ',' + (colorHex&255) + ')';

    // 星球 mesh
    const planetMesh = new THREE.Mesh(
      new THREE.SphereGeometry(planetR, 16, 12),
      new THREE.MeshBasicMaterial({ color: colorHex, transparent: true, opacity: 0.92 })
    );
    planetMesh.position.copy(pos);
    scene.add(planetMesh);

    // 光暈 sprite halo
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: makeGlowTexture(rgbStr), blending: THREE.AdditiveBlending,
      transparent: true, depthWrite: false,
    }));
    sprite.scale.set(haloSize, haloSize, 1);
    sprite.position.copy(pos);
    scene.add(sprite);

    // 業務節點配 1 顆小衛星（裝飾性）
    if (type === 'agent') {
      const moonR = 2.5;
      const moonMesh = new THREE.Mesh(
        new THREE.SphereGeometry(moonR, 8, 8),
        new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.85 })
      );
      scene.add(moonMesh);
      orbiters.push({
        mesh: moonMesh,
        around: pos.clone(),
        axisTilt: (Math.random() - 0.5) * 1.2,
        axisRoll: Math.random() * Math.PI * 2,
        dist: planetR * 2.5 + 4,
        angle: Math.random() * Math.PI * 2,
        speed: 0.015 + Math.random() * 0.01,
      });
    }

    const div = document.createElement('div');
    div.className = 'node-label ' + type;
    div.innerHTML = `${n.name}${n.sub ? '<span class="sub">' + n.sub + '</span>' : ''}`;
    div.addEventListener('click', () => focusNode(n, pos));
    labelsLayer.appendChild(div);

    node3D.push({ node: n, pos, sprite, mesh: planetMesh, div });
  });
});

// ─── 遠景裝飾行星（純背景，不可點，沒 label）───
const decorPlanets = [];
const decorPalette = [0xff3d8a, 0x00f0ff, 0x9b5cff, 0xffb800, 0xff8800, 0xff66a8];
for (let i = 0; i < 12; i++) {
  const r = 1400 + Math.random() * 700;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const pos = new THREE.Vector3(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
  const radius = 18 + Math.random() * 45;
  const color = decorPalette[i % decorPalette.length];
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 16, 12),
    new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.6 })
  );
  mesh.position.copy(pos);
  scene.add(mesh);
  // 部分加環
  if (Math.random() < 0.4) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(radius * 1.6, radius * 2.2, 48),

    );
    ring.position.copy(pos);
    ring.rotation.x = Math.PI / 2 + (Math.random() - 0.5) * 0.8;
    ring.rotation.y = Math.random() * Math.PI;
    scene.add(ring);
  }
  // 0-2 顆衛星
  const nMoons = Math.floor(Math.random() * 3);
  for (let mi = 0; mi < nMoons; mi++) {
    const moonR = 4 + Math.random() * 5;
    const moonMesh = new THREE.Mesh(
      new THREE.SphereGeometry(moonR, 8, 8),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.85 })
    );
    scene.add(moonMesh);
    orbiters.push({
      mesh: moonMesh,
      around: pos.clone(),
      axisTilt: (Math.random() - 0.5) * 1.2,
      axisRoll: Math.random() * Math.PI * 2,
      dist: radius * (2.5 + Math.random()),
      angle: Math.random() * Math.PI * 2,
      speed: 0.003 + Math.random() * 0.004,
    });

  decorPlanets.push(mesh);

// 連線
const linkLines = new THREE.Group();
scene.add(linkLines);
const nodeMap = {};
node3D.forEach(nd => { nodeMap[nd.node.id] = nd; });

const linkFlowParticles = [];
DATA.links.forEach(l => {
  const src = typeof l.source === 'object' ? l.source.id : l.source;
  const tgt = typeof l.target === 'object' ? l.target.id : l.target;
  const a = nodeMap[src];
  const b = nodeMap[tgt];
  if (!a || !b) return;
  const geo = new THREE.BufferGeometry().setFromPoints([a.pos, b.pos]);
  let colorHex = 0x9b5cff, colorRgb = 'rgb(155,92,255)';
  // Shopline → Core 用金色（年度成長能量流，最關鍵的一條）
  if ((src === 's:Shopline' && tgt === 's:Core') || (src === 's:Core' && tgt === 's:Shopline')) {
    colorHex = 0xffb800; colorRgb = 'rgb(255,184,0)';
  }
  else if (src.startsWith('v:') || tgt.startsWith('v:')) { colorHex = 0xff8800; colorRgb = 'rgb(255,136,0)'; }
  else if (src.startsWith('s:Meta') && tgt.startsWith('s:Shopline')) { colorHex = 0x00f0ff; colorRgb = 'rgb(0,240,255)'; }
  else if (src.startsWith('agent:') || tgt.startsWith('agent:')) { colorHex = 0xff3d8a; colorRgb = 'rgb(255,61,138)'; }

  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({
    color: colorHex, transparent: true, opacity: 0.55, depthWrite: false,
  }));
  linkLines.add(line);

  // 每條連線 3 顆粒子相位錯開（更像連續能量流）
  const baseSpeed = 0.0035 + Math.random() * 0.003;
  for (let pi = 0; pi < 3; pi++) {
    const flowSprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: makeGlowTexture(colorRgb), blending: THREE.AdditiveBlending,
      transparent: true, depthWrite: false, opacity: 0.95,
    }));
    flowSprite.scale.set(11, 11, 1);
    flowSprite.userData = { baseOp: 0.95 };
    scene.add(flowSprite);
    linkFlowParticles.push({
      sprite: flowSprite, from: a.pos, to: b.pos,
      t: pi / 3,              // 0, 0.333, 0.666 三相位
      speed: baseSpeed,
    });
  }
});

// ─── 彗星 / 流星系統 ───
//   彗星：壽命長、tail 長、出現少；流星：短促快閃，類似畫面跨越
const shootingObjects = [];   // {head, tail, positions, velocity, life, maxLife, tailLen, dead, lifeFade}

function spawnShooting(opts) {
  const tailLen = opts.tailLen;
  const speed   = opts.speed;
  const headSize = opts.headSize;
  const color   = opts.color;        // 'rgb(...)'
  const colorVec = opts.colorVec;    // [r,g,b] 0-1
  const maxLife = opts.maxLife;

  // 起點：場景某一邊隨機，方向指向附近中心
  const startR = 1800 + Math.random() * 800;
  const sTheta = Math.random() * Math.PI * 2;
  const sPhi = Math.acos(2 * Math.random() - 1);
  const head = new THREE.Vector3(
    startR * Math.sin(sPhi) * Math.cos(sTheta),
    startR * Math.sin(sPhi) * Math.sin(sTheta) * 0.7,
    startR * Math.cos(sPhi)
  );
  const target = new THREE.Vector3(
    (Math.random() - 0.5) * 1200,
    (Math.random() - 0.5) * 600,
    (Math.random() - 0.5) * 1200
  );
  const velocity = target.sub(head).normalize().multiplyScalar(speed);

  // Head sprite (亮)
  const headSprite = new THREE.Sprite(new THREE.SpriteMaterial({
    map: makeGlowTexture(color),
    blending: THREE.AdditiveBlending,
    transparent: true, depthWrite: false,
  }));
  headSprite.scale.set(headSize, headSize, 1);
  headSprite.position.copy(head);
  scene.add(headSprite);

  // Tail line
  const tailGeo = new THREE.BufferGeometry();
  const positions = new Float32Array(tailLen * 3);
  const colors = new Float32Array(tailLen * 3);
  tailGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  tailGeo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  const tail = new THREE.Line(tailGeo, new THREE.LineBasicMaterial({
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  }));
  scene.add(tail);

  shootingObjects.push({
    head, tail, headSprite,
    positions: [],
    velocity,
    life: 0, maxLife, tailLen,
    color: colorVec,
    dead: false,
  });
}

function spawnComet() {
  // 彗星：白偏冷藍、慢、長尾
  const palettes = [
    { color: 'rgb(220,240,255)', vec: [0.86, 0.94, 1.0] },   // 冷白藍
    { color: 'rgb(255,220,255)', vec: [1.0, 0.86, 1.0] },    // 粉白
    { color: 'rgb(180,220,255)', vec: [0.7, 0.86, 1.0] },    // 淡藍
  ];
  const p = palettes[Math.floor(Math.random() * palettes.length)];
  spawnShooting({
    tailLen: 40,
    speed: 7 + Math.random() * 4,
    headSize: 28 + Math.random() * 14,
    color: p.color,
    colorVec: p.vec,
    maxLife: 600 + Math.random() * 400,    // frames
  });
}

function spawnMeteor() {
  // 流星：橘黃偏熱、快、短尾
  const palettes = [
    { color: 'rgb(255,200,100)', vec: [1.0, 0.78, 0.39] },   // 暖黃
    { color: 'rgb(255,150,100)', vec: [1.0, 0.59, 0.39] },   // 暖橘
    { color: 'rgb(255,220,180)', vec: [1.0, 0.86, 0.70] },   // 米白
  ];
  const p = palettes[Math.floor(Math.random() * palettes.length)];
  spawnShooting({
    tailLen: 18,
    speed: 18 + Math.random() * 10,
    headSize: 14 + Math.random() * 8,
    color: p.color,
    colorVec: p.vec,
    maxLife: 120 + Math.random() * 100,
  });
}

function updateShooting() {
  for (let si = shootingObjects.length - 1; si >= 0; si--) {
    const s = shootingObjects[si];
    s.life++;
    // 移動 head
    s.head.add(s.velocity);
    s.headSprite.position.copy(s.head);
    // tail 紀錄
    s.positions.unshift(s.head.clone());
    if (s.positions.length > s.tailLen) s.positions.pop();

    // 更新 tail buffer
    const posAttr = s.tail.geometry.attributes.position;
    const colAttr = s.tail.geometry.attributes.color;
    for (let i = 0; i < s.tailLen; i++) {
      const p = (i < s.positions.length) ? s.positions[i] : (s.positions[s.positions.length - 1] || s.head);
      posAttr.array[i*3]   = p.x;
      posAttr.array[i*3+1] = p.y;
      posAttr.array[i*3+2] = p.z;
      const fade = (i < s.positions.length) ? (1 - i / s.tailLen) : 0;
      // 接近壽終時整體淡出
      const lifeFade = Math.max(0, 1 - s.life / s.maxLife);
      const f = fade * lifeFade;
      colAttr.array[i*3]   = s.color[0] * f;
      colAttr.array[i*3+1] = s.color[1] * f;
      colAttr.array[i*3+2] = s.color[2] * f;
    }
    posAttr.needsUpdate = true;
    colAttr.needsUpdate = true;
    // Head sprite 透明度也跟著 lifeFade
    s.headSprite.material.opacity = Math.max(0, 1 - s.life / s.maxLife);

    // 死亡條件
    if (s.life > s.maxLife || s.head.length() > 4000) {
      s.dead = true;
      scene.remove(s.headSprite);
      scene.remove(s.tail);
      shootingObjects.splice(si, 1);
    }
  }
}

let cometCooldown = 60;     // 1 秒後出第一顆
let meteorCooldown = 30;    // 0.5 秒後出第一顆

// ─── 鏡頭飛行 ───
let flyAnimId = null;
function flyTo(targetCamPos, lookAtPos, duration = 2600) {
  if (flyAnimId !== null) cancelAnimationFrame(flyAnimId);
  if (controls) controls.autoRotate = false;
  else autoRotate = false;
  const startPos = camera.position.clone();
  const startTarget = controls ? controls.target.clone() : new THREE.Vector3(0, 0, 0);
  const startFov = camera.fov;
  const startTime = performance.now();
  function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }
  function tick() {
    const elapsed = performance.now() - startTime;
    const t = Math.min(1, elapsed / duration);
    const e = easeOutQuart(t);
    camera.position.lerpVectors(startPos, targetCamPos, e);
    const fovT = Math.sin(e * Math.PI);
    camera.fov = startFov - fovT * 6;
    camera.updateProjectionMatrix();
    if (controls) { controls.target.lerpVectors(startTarget, lookAtPos, e); controls.update(); }
    else {
      const cur = new THREE.Vector3().lerpVectors(startTarget, lookAtPos, e);
      camera.lookAt(cur);
    }
    if (t < 1) { flyAnimId = requestAnimationFrame(tick); }
    else { flyAnimId = null; camera.fov = startFov; camera.updateProjectionMatrix(); }
  }
  flyAnimId = requestAnimationFrame(tick);
}

// Focus Mode
let focusedNodeId = null;
function enterFocusMode(nodeId) {
  focusedNodeId = nodeId;
  document.getElementById('labels-layer').classList.add('focused');
  node3D.forEach(nd => nd.div.classList.toggle('is-focus', nd.node.id === nodeId));
  linkLines.children.forEach(line => { line.material.opacity = 0.06; });
  linkFlowParticles.forEach(p => { p.sprite.material.opacity = 0.10; });
  nebulas.forEach(n => { n.material.opacity = 0.15; });
  galaxies.forEach(g => { g.material.opacity = 0.20; });
  farStars.material.opacity = 0.30; midStars.material.opacity = 0.25; nearGlow.material.opacity = 0.18;
  icoLines.material.opacity = 0.35; icoLines2.material.opacity = 0.15;
}
function exitFocusMode() {
  focusedNodeId = null;
  document.getElementById('labels-layer').classList.remove('focused');
  node3D.forEach(nd => nd.div.classList.remove('is-focus'));
  linkLines.children.forEach(line => { line.material.opacity = 0.55; });
  linkFlowParticles.forEach(p => { p.sprite.material.opacity = p.sprite.userData.baseOp; });
  nebulas.forEach(n => { n.material.opacity = n.userData.baseOp; });
  galaxies.forEach(g => { g.material.opacity = g.userData.baseOp; });
  farStars.material.opacity = 0.85; midStars.material.opacity = 0.85; nearGlow.material.opacity = 0.85;
  icoLines.material.opacity = 0.65; icoLines2.material.opacity = 0.30;
  document.getElementById('detail').classList.remove('show');
}

function focusNode(node, pos) {
  const p = document.getElementById('detail');
  p.classList.add('show');
  p.querySelector('.d-name').textContent = node.fullName || node.name;
  p.querySelector('.d-sub').textContent = (TYPE_LABEL_NAME[node.type] || '') + ' · ' + (node.sub || '');
  const body = document.getElementById('d-body');
  let rows = `<div class="d-row"><span class="l">節點 ID</span><span class="v" style="font-size:10px;word-break:break-all;">${node.id}</span></div>`;
  rows += `<div class="d-row"><span class="l">類別</span><span class="v">${TYPE_LABEL_NAME[node.type]||'--'}</span></div>`;
  if (node.type === 'anchor' && node.is_core) {
    rows += `<div class="d-row"><span class="l">期間業績</span><span class="v" style="color:#ffb800;">${fmtF(node.period_rev)}</span></div>`;
    rows += `<div class="d-row"><span class="l">統計天數</span><span class="v">${node.period_days} 天</span></div>`;
    rows += `<div class="d-row"><span class="l">推估年度</span><span class="v" style="color:#ffb800;font-size:14px;">${fmtF(node.projected_annual)}</span></div>`;
    rows += `<div class="d-row"><span class="l">訂單</span><span class="v">${fmtN(node.period_orders)}</span></div>`;
    rows += `<div class="d-row"><span class="l">客戶</span><span class="v">${fmtN(node.period_customers)}</span></div>`;
    rows += `<div class="d-row"><span class="l">AOV</span><span class="v">${fmtN(node.period_aov)}</span></div>`;
  } else if (node.type === 'agent') {
    rows += `<div class="d-row"><span class="l">業績</span><span class="v">${fmtF(node.rev)}</span></div>`;
    rows += `<div class="d-row"><span class="l">訂單</span><span class="v">${fmtN(node.orders)}</span></div>`;
    rows += `<div class="d-row"><span class="l">客戶</span><span class="v">${fmtN(node.customers)}</span></div>`;
    rows += `<div class="d-row"><span class="l">AOV</span><span class="v">${fmtN(node.aov)}</span></div>`;
  } else if (node.type === 'video') {
    rows += `<div class="d-row"><span class="l">平台</span><span class="v" style="color:#ff8800;">${node.platform}</span></div>`;
    rows += `<div class="d-row"><span class="l">播放</span><span class="v">${fmtN(node.plays)}</span></div>`;
    rows += `<div class="d-row"><span class="l">觸及</span><span class="v">${fmtN(node.reach)}</span></div>`;
    rows += `<div class="d-row"><span class="l">分享</span><span class="v">${fmtN(node.shares)}</span></div>`;
    rows += `<div class="d-row"><span class="l">留言</span><span class="v">${fmtN(node.comments)}</span></div>`;
    rows += `<div class="d-row"><span class="l">片長</span><span class="v">${node.length_sec}s</span></div>`;
    if (node.created_date) rows += `<div class="d-row"><span class="l">上線</span><span class="v" style="font-size:10px;">${node.created_date}</span></div>`;
  }
  const linkCount = DATA.links.filter(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s === node.id || t === node.id;
  }).length;
  rows += `<div class="d-row"><span class="l">連線</span><span class="v">${linkCount}</span></div>`;
  body.innerHTML = rows;

  const dist = 190, sideOffset = 90;
  const dirOut = pos.clone().normalize();
  if (dirOut.length() < 0.01) dirOut.set(0, 0, 1);
  const right = new THREE.Vector3().crossVectors(dirOut, new THREE.Vector3(0, 1, 0)).normalize();
  if (right.length() < 0.1) right.set(1, 0, 0);
  const targetCam = pos.clone().add(dirOut.multiplyScalar(dist)).add(right.multiplyScalar(sideOffset));
  flyTo(targetCam, pos, 2600);
  setTimeout(() => enterFocusMode(node.id), 2400);
}

canvas.addEventListener('click', e => { if (e.target === canvas) exitFocusMode(); });
if (controls) canvas.addEventListener('pointerdown', () => { controls.autoRotate = false; });

// Dataview 飛行
function findNodesByType(type) { return node3D.filter(nd => nd.node.type === type); }
function bindDvRows(elId, type) {
  document.querySelectorAll('#' + elId + ' .dv-row').forEach((row, idx) => {
    row.style.cursor = 'pointer';
    row.addEventListener('click', () => {
      const matched = findNodesByType(type);
      const target = matched[idx % matched.length];
      if (target) focusNode(target.node, target.pos);
    });
  });
}
bindDvRows('dv-videos', 'video');
bindDvRows('dv-agents', 'agent');
// utm 沒對應節點，純資訊用

// Resize
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

// Label projection
const tmpVec = new THREE.Vector3();
function updateLabels() {
  const halfW = W()/2, halfH = H()/2;
  node3D.forEach(nd => {
    tmpVec.copy(nd.pos).project(camera);
    const x = (tmpVec.x * halfW) + halfW;
    const y = (-tmpVec.y * halfH) + halfH;
    const inFront = tmpVec.z < 1;
    nd.div.style.left = x + 'px';
    nd.div.style.top  = y + 'px';
    nd.div.style.display = inFront ? 'block' : 'none';
    if (focusedNodeId) {
      if (nd.node.id === focusedNodeId) nd.div.style.opacity = 1;
      else nd.div.style.opacity = '';
    } else {
      const distance = camera.position.distanceTo(nd.pos);
      const opacity = inFront ? Math.max(0.15, Math.min(1, 1 - (distance - 200) / 900)) : 0;
      nd.div.style.opacity = opacity;
    }
  });
}

// Animation
let frame = 0;
function animate() {
  requestAnimationFrame(animate);
  frame++;
  if (controls) {
    controls.update();
  } else {
    if (autoRotate) cameraAngle += 0.003;
    const radius = camera.position.length();
    const phi = dragAngleX + cameraAngle;
    const theta = Math.PI / 2 - dragAngleY;
    camera.position.set(radius*Math.sin(theta)*Math.cos(phi), radius*Math.cos(theta), radius*Math.sin(theta)*Math.sin(phi));
    camera.lookAt(0, 0, 0);
  }
  coreGroup.rotation.y += 0.0015;
  coreGroup.rotation.x += 0.0007;
  farStars.rotation.y += 0.00015;
  midStars.rotation.y -= 0.00025;
  nearGlow.rotation.y += 0.0004;
  galaxies.forEach((g, i) => { g.rotation.z += g.userData.autoRotateSpeed * (i%2===0?1:-1); });
  linkFlowParticles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    p.sprite.position.lerpVectors(p.from, p.to, p.t);
  });

  // 星球/節點自轉（節點 mesh 自己慢慢轉）
  node3D.forEach(nd => {
    if (nd.mesh) {
      nd.mesh.rotation.y += 0.003;
      nd.mesh.rotation.x += 0.0012;
    }
  });
  // 遠景裝飾行星自轉
  decorPlanets.forEach((m, i) => {
    m.rotation.y += 0.0008 + (i * 0.0001);
  });
  // 彗星 / 流星 spawn + update
  cometCooldown--;
  if (cometCooldown <= 0) {
    spawnComet();
    cometCooldown = 400 + Math.random() * 600;   // 6-15 秒
  }
  meteorCooldown--;
  if (meteorCooldown <= 0) {
    spawnMeteor();
    meteorCooldown = 90 + Math.random() * 180;   // 1.5-4 秒
  }
  updateShooting();

  // 軌道衛星運動（支援 around 為 Vector3 固定點 或 Object3D mesh 跟隨）
  orbiters.forEach(o => {
    o.angle += o.speed;
    const lx = Math.cos(o.angle) * o.dist;
    const lz = Math.sin(o.angle) * o.dist;
    const ly = lz * Math.sin(o.axisTilt);
    const lz2 = lz * Math.cos(o.axisTilt);
    const rx = lx * Math.cos(o.axisRoll) - lz2 * Math.sin(o.axisRoll);
    const rz = lx * Math.sin(o.axisRoll) + lz2 * Math.cos(o.axisRoll);
    const center = o.around.isObject3D ? o.around.position : o.around;
    o.mesh.position.set(center.x + rx, center.y + ly, center.z + rz);
  });
  nebulas.forEach((n, i) => {
    const breathe = 1 + Math.sin(frame * 0.005 + i * 1.3) * 0.04;
    n.scale.x = n.scale.y = (450 + (i * 50)) * breathe;
    if (!focusedNodeId) n.material.opacity = 0.7 + Math.sin(frame * 0.008 + i) * 0.15;
  });
  const pulse = 1 + Math.sin(frame * 0.04) * 0.08;
  coreGlow.scale.set(280 * pulse, 280 * pulse, 1);
  updateLabels();
  renderer.render(scene, camera);
}
animate();
</script>
