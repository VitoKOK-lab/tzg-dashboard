<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS-BRAIN // 神經中樞 3D</title>
<style>
:root {
  --bg: #02010a;
  --bg-panel: rgba(8,8,24,.88);
  --pink: #ff3d8a;
  --cyan: #00f0ff;
  --purple: #9b5cff;
  --gold: #ffb800;
  --green: #00ff88;
  --red: #ff3d3d;
  --dim: rgba(255,255,255,.42);
  --mid: rgba(255,255,255,.7);
  --hi: #ffffff;
  --mono: 'SF Mono','JetBrains Mono','Menlo','Consolas',monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100vh;
  background: #000;
  font-family: -apple-system, 'Noto Sans TC', sans-serif;
  color: var(--mid);
  overflow: hidden;
}

#bg-grad {
  position: fixed; inset: 0; z-index: 0;
  background: radial-gradient(ellipse at 50% 50%, #160b3a 0%, #08051c 35%, #01000a 80%);
}

/* === 3D scene container === */
#scene-canvas {
  position: fixed; inset: 0; z-index: 1;
  cursor: grab;
}
#scene-canvas:active { cursor: grabbing; }

/* === HTML labels overlay (跟 3D 位置同步) === */
#labels-layer {
  position: fixed; inset: 0; z-index: 2;
  pointer-events: none;
}
.node-label {
  position: absolute;
  transform: translate(-50%, -50%);
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 700;
  white-space: nowrap;
  text-shadow:
    0 0 10px currentColor,
    0 0 18px currentColor,
    0 0 4px rgba(0,0,0,.9);
  letter-spacing: 1px;
  pointer-events: auto;
  cursor: pointer;
  transition: filter .15s;
  user-select: none;
}
.node-label:hover { filter: brightness(1.4) drop-shadow(0 0 8px currentColor); }
.node-label { transition: opacity .5s ease; }
/* === Focus mode：dim 所有非 focus 的元素 === */
#labels-layer.focused .node-label:not(.is-focus) { opacity: .08 !important; pointer-events: none; }
#labels-layer.focused .node-label.is-focus {
  filter: drop-shadow(0 0 14px currentColor) drop-shadow(0 0 28px currentColor);
  transform: translate(-50%, -50%) scale(1.15);
}
.node-label.persona { color: var(--pink); font-size: 22px; }
.node-label.agent   { color: var(--pink); font-size: 16px; }
.node-label.system  { color: var(--cyan); font-size: 18px; }
.node-label.moc     { color: var(--gold); font-size: 17px; }
.node-label.project { color: var(--purple); font-size: 14px; }
.node-label.note    { color: rgba(255,255,255,.85); font-size: 12px; font-weight: 500; }
.node-label .sub {
  display: block;
  font-size: 9px;
  font-weight: 400;
  color: rgba(255,255,255,.5);
  letter-spacing: 2px;
  margin-top: 2px;
  text-shadow: none;
  text-transform: uppercase;
}

/* === CRT scanline === */
#scanlines {
  position: fixed; inset: 0; z-index: 60; pointer-events: none;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,.5) 50%);
  background-size: 100% 3px;
  opacity: .12;
  mix-blend-mode: multiply;
}

/* === 共用 panel === */
.panel {
  background: var(--bg-panel);
  border: 1px solid rgba(0,240,255,.2);
  border-radius: 14px;          /* 圓角方塊 */
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(0,0,0,.6), inset 0 0 16px rgba(0,240,255,.04);
  overflow: hidden;             /* 讓內部 panel-h 圓角貼齊 */
}
.panel-h {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--pink);
  letter-spacing: 2.5px;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(255,61,138,.18);
  text-transform: uppercase;
  font-weight: 700;
  background: rgba(255,61,138,.05);
  border-top-left-radius: 14px;
  border-top-right-radius: 14px;
}
.panel-h .badge {
  float: right;
  color: var(--dim);
  font-weight: 400;
}

/* === Topbar === */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: 42px;
  z-index: 10;
  background: linear-gradient(180deg, rgba(8,8,24,.92) 0%, rgba(8,8,24,0) 100%);
  border-bottom: 1px solid rgba(255,61,138,.2);
  display: flex; align-items: center;
  padding: 0 16px;
  font-family: var(--mono);
  font-size: 11px;
}
.brand { color: var(--pink); letter-spacing: 3px; font-weight: 700; text-shadow: 0 0 12px rgba(255,61,138,.6); }
.sub-brand { margin-left: 12px; color: var(--dim); font-size: 10px; letter-spacing: 1.5px; }
.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); display: inline-block; margin-right: 6px;
  box-shadow: 0 0 8px var(--green);
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.3 } }
.topbar-stats { margin-left: auto; display: flex; gap: 8px; }
.topbar-stats .stat {
  padding: 4px 14px;
  border: 1px solid rgba(0,240,255,.28);
  border-radius: 999px;          /* pill 膠囊型 */
  color: var(--cyan);
  font-size: 10px;
  background: rgba(0,240,255,.04);
}

/* === Left panels === */
#leftbar {
  position: fixed; top: 56px; left: 14px;
  z-index: 10;
  width: 240px;
  display: flex; flex-direction: column; gap: 10px;
}
.dv-list { padding: 0 10px 10px; }
.dv-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 5px 4px;
  border-bottom: 1px dotted rgba(255,255,255,.06);
  font-size: 11px;
  transition: background .15s;
}
.dv-row { border-radius: 8px; }
.dv-row:hover { background: rgba(0,240,255,.08); }
.dv-row:last-child { border-bottom: 0; }
.dv-row .name { color: var(--mid); }
.dv-row .meta { color: var(--dim); font-family: var(--mono); font-size: 9px; }

/* === Right panels === */
#rightbar {
  position: fixed; top: 56px; right: 14px;
  z-index: 10;
  width: 250px;
  display: flex; flex-direction: column; gap: 10px;
}
.moc-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 5px 10px;
  border-bottom: 1px dotted rgba(255,255,255,.06);
  font-size: 11px;
  transition: background .15s;
}
.moc-row { border-radius: 8px; margin: 0 4px; }
.moc-row:hover { background: rgba(255,184,0,.12); }
.moc-row:last-child { border-bottom: 0; }
.moc-row .icon { color: var(--gold); margin-right: 6px; }
.moc-row .cnt { color: var(--dim); font-family: var(--mono); font-size: 9px; }

/* Service grid */
.svc-grid {
  padding: 10px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.svc-chip {
  background: rgba(0,240,255,.05);
  border: 1px solid rgba(0,240,255,.28);
  padding: 8px 10px;
  border-radius: 999px;          /* 圓 pill */
  font-size: 10px;
  text-align: center;
  transition: all .2s;
}
.svc-chip:hover {
  background: rgba(0,240,255,.15);
  border-color: var(--cyan);
  box-shadow: 0 0 12px rgba(0,240,255,.4);
}
.svc-chip .nm { color: var(--cyan); font-weight: 600; font-family: var(--mono); }
.svc-chip .st { color: var(--green); font-size: 8px; letter-spacing: 1.5px; margin-top: 2px; }
.svc-chip .st::before { content: '● '; }

/* === Stock chart === */
#stock-panel {
  position: fixed; top: 56px; left: 270px;
  z-index: 10;
  width: 320px;
  display: none;
}
#stock-panel.show { display: block; }
.stock-head {
  padding: 8px 12px;
  display: flex; align-items: baseline; gap: 8px;
  border-bottom: 1px solid rgba(255,184,0,.15);
}
.stock-head .sym { color: var(--gold); font-family: var(--mono); font-size: 12px; font-weight: 700; }
.stock-head .name { color: var(--dim); font-size: 10px; }
.stock-head .price { margin-left: auto; color: var(--hi); font-family: var(--mono); font-size: 18px; font-weight: 700; }
.stock-head .chg.up { color: var(--green); font-family: var(--mono); font-size: 11px; }
.stock-head .chg.down { color: var(--red); font-family: var(--mono); font-size: 11px; }
#stock-chart { width: 100%; height: 100px; }

/* === AI chat === */
#ai-chat {
  position: fixed; bottom: 14px; right: 14px;
  z-index: 10;
  width: 300px;
}
.chat-msg {
  padding: 6px 12px;
  font-size: 11px;
  border-bottom: 1px dotted rgba(255,255,255,.05);
  line-height: 1.5;
}
.chat-msg:last-of-type { border-bottom: 0; }
.chat-msg .who { color: var(--pink); font-family: var(--mono); font-size: 10px; font-weight: 700; margin-right: 6px; }
.chat-msg .who.jarvis { color: var(--cyan); }
.chat-input {
  padding: 8px 12px;
  border-top: 1px solid rgba(0,240,255,.15);
  font-family: var(--mono);
  font-size: 11px;
  color: var(--dim);
}
.chat-input::before { content: '> '; color: var(--green); }
.cursor { display: inline-block; width: 7px; height: 11px; background: var(--cyan); margin-left: 2px; animation: blink 1s infinite; }
@keyframes blink { 0%,50% { opacity:1; } 51%,100% { opacity:0; } }

/* === Detail panel === */
#detail {
  position: fixed; top: 50%; right: 280px;
  transform: translateY(-50%);
  z-index: 20;
  width: 290px;
  display: none;
  animation: slideIn .25s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateY(-50%) translateX(10px); } to { opacity:1; transform:translateY(-50%) translateX(0); } }
#detail.show { display: block; }
#detail .d-h { padding: 12px 16px; border-bottom: 1px solid rgba(255,61,138,.2); position: relative; }
#detail .d-name { color: var(--pink); font-size: 15px; font-weight: 700; font-family: var(--mono); letter-spacing: 1px; }
#detail .d-sub { color: var(--dim); font-size: 10px; letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }
#detail .d-body { padding: 12px 16px; }
#detail .d-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 11px; border-bottom: 1px dotted rgba(255,255,255,.06); }
#detail .d-row:last-child { border: 0; }
#detail .d-row .l { color: var(--dim); letter-spacing: 1px; }
#detail .d-row .v { color: var(--cyan); font-family: var(--mono); font-weight: 600; }
#detail .close { position: absolute; top: 8px; right: 12px; color: var(--dim); cursor: pointer; font-size: 14px; width: 22px; height: 22px; line-height: 20px; text-align: center; border: 1px solid rgba(255,255,255,.15); border-radius: 50%; }
#detail .close:hover { color: var(--pink); border-color: var(--pink); }

#hint { position: fixed; bottom: 6px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 9px; color: var(--dim); font-family: var(--mono); letter-spacing: 1.5px; }
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.140.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.140.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="bg-grad"></div>
<canvas id="scene-canvas"></canvas>
<div id="labels-layer"></div>
<div id="scanlines"></div>

<div id="topbar">
  <span class="brand">JARVIS-BRAIN</span>
  <span class="sub-brand">// 神經中樞 3D · <span class="live-dot"></span>DATA STREAM</span>
  <div class="topbar-stats">
    <span class="stat" id="t-rev">--</span>
    <span class="stat" id="t-ord">--</span>
    <span class="stat" id="t-cust">--</span>
    <span class="stat" id="t-aov">--</span>
    <span class="stat" style="color:var(--pink);" id="t-period">--</span>
  </div>
</div>

<div id="leftbar">
  <div class="panel">
    <div class="panel-h">AI 筆主 <span class="badge" id="b-ai">5</span></div>
    <div class="dv-list" id="dv-ai"></div>
  </div>
  <div class="panel">
    <div class="panel-h">彩寶指任 // PROJECTS <span class="badge">5</span></div>
    <div class="dv-list" id="dv-proj"></div>
  </div>
  <div class="panel">
    <div class="panel-h">最近筆記</div>
    <div class="dv-list" id="dv-rec"></div>
  </div>
</div>

<div id="rightbar">
  <div class="panel">
    <div class="panel-h">MOC 階層 // TOP <span class="badge" id="b-moc">7</span></div>
    <div id="moc-list"></div>
  </div>
  <div class="panel">
    <div class="panel-h">系統狀態 // SERVICES</div>
    <div class="svc-grid">
      <div class="svc-chip"><div class="nm">POS</div><div class="st">啟用中</div></div>
      <div class="svc-chip"><div class="nm">1SHOP</div><div class="st">啟用中</div></div>
      <div class="svc-chip"><div class="nm">LINE</div><div class="st">啟用中</div></div>
      <div class="svc-chip"><div class="nm">GBP</div><div class="st">啟用中</div></div>
      <div class="svc-chip"><div class="nm">Shopline</div><div class="st">啟用中</div></div>
      <div class="svc-chip"><div class="nm">Meta</div><div class="st">啟用中</div></div>
    </div>
  </div>
</div>

<div id="stock-panel" class="panel show">
  <div class="stock-head">
    <span class="sym" id="s-sym">--</span>
    <span class="name" id="s-name">--</span>
    <span class="price" id="s-price">--</span>
    <span class="chg" id="s-chg">--</span>
  </div>
  <canvas id="stock-chart"></canvas>
</div>

<div id="ai-chat" class="panel">
  <div class="panel-h">JARVIS // CHAT <span class="badge"><span class="live-dot" style="margin-right:2px;"></span>LIVE</span></div>
  <div id="chat-body"></div>
  <div class="chat-input">輸入指令<span class="cursor"></span></div>
</div>

<div id="detail" class="panel">
  <span class="close" onclick="exitFocusMode()">×</span>
  <div class="d-h">
    <div class="d-name">--</div>
    <div class="d-sub">--</div>
  </div>
  <div class="d-body" id="d-body"></div>
</div>

<div id="hint">DRAG · ZOOM · CLICK NODE = INSPECT</div>

<script>
const DATA = __GRAPH_DATA__;

const TYPE_COLOR = {
  persona: 0xff3d8a, agent: 0xff66a8,
  system: 0x00f0ff, moc: 0xffb800,
  project: 0x9b5cff, note: 0xddddff,
};
const TYPE_LABEL_NAME = {
  persona: 'PERSONA', agent: 'BUSINESS AGENT',
  system: 'SYSTEM', moc: 'MAP OF CONTENT',
  project: 'PROJECT', note: 'NOTE',
};

function fmtN(n) { return (n||0).toLocaleString(); }
function fmtF(n) {
  n = n||0;
  if (n >= 1e6) return 'NT$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3) return 'NT$' + (n/1e3).toFixed(0) + 'K';
  return 'NT$' + n;
}

// ─── HUD ───
const k = DATA.kpi || {};
document.getElementById('t-rev').textContent  = fmtF(k.total_rev);
document.getElementById('t-ord').textContent  = (k.total_orders||0) + ' ORD';
document.getElementById('t-cust').textContent = (k.total_customers||0) + ' CUS';
document.getElementById('t-aov').textContent  = 'AOV ' + fmtN(k.avg_aov);
document.getElementById('t-period').textContent = k.period_label || '近 60 天';

const st = DATA.stock || {};
document.getElementById('s-sym').textContent = st.symbol || '--';
document.getElementById('s-name').textContent = st.name || '';
document.getElementById('s-price').textContent = (st.price||0).toFixed(1);
const chgEl = document.getElementById('s-chg');
const isUp = (st.change||0) >= 0;
chgEl.className = 'chg ' + (isUp?'up':'down');
chgEl.textContent = (isUp?'▲ +':'▼ ') + Math.abs(st.change||0).toFixed(1) + ' (' + (isUp?'+':'') + (st.pct||0).toFixed(2) + '%)';

function renderDv(el, items) {
  el.innerHTML = items.map(i => `<div class="dv-row"><span class="name">${i.name}</span><span class="meta">${i.tag||''} · ${i.mtime||''}</span></div>`).join('');
}
renderDv(document.getElementById('dv-ai'),   (DATA.dataview||{}).ai_brain || []);
renderDv(document.getElementById('dv-proj'), (DATA.dataview||{}).projects || []);
renderDv(document.getElementById('dv-rec'),  (DATA.dataview||{}).recent_notes || []);

const mocEl = document.getElementById('moc-list');
(DATA.moc_tree || []).forEach(m => {
  const div = document.createElement('div');
  div.className = 'moc-row';
  div.innerHTML = `<span><span class="icon">▶</span>${m.name}</span><span class="cnt">${m.children_count||0}</span>`;
  mocEl.appendChild(div);
});

const chatBody = document.getElementById('chat-body');
(DATA.ai_chat || []).forEach(m => {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  const cls = m.who === 'JARVIS' ? 'who jarvis' : 'who';
  div.innerHTML = `<span class="${cls}">${m.who} ›</span>${m.msg}`;
  chatBody.appendChild(div);
});

// ─── Stock mini chart (fake candlesticks) ───
function drawStockChart() {
  const cv = document.getElementById('stock-chart');
  const ctx = cv.getContext('2d');
  const W = cv.width = cv.clientWidth * devicePixelRatio;
  const H = cv.height = 100 * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  const w = cv.clientWidth, h = 100;
  // 60 fake bars
  const bars = [];
  let p = (st.price || 1000) * 0.95;
  for (let i = 0; i < 60; i++) {
    const o = p;
    const c = o + (Math.random()-0.48) * (st.price||1000) * 0.012;
    const hi = Math.max(o,c) + Math.random() * (st.price||1000) * 0.006;
    const lo = Math.min(o,c) - Math.random() * (st.price||1000) * 0.006;
    bars.push({o, c, hi, lo});
    p = c;
  }
  const lows = bars.map(b=>b.lo);
  const his  = bars.map(b=>b.hi);
  const minP = Math.min(...lows);
  const maxP = Math.max(...his);
  const range = maxP - minP || 1;
  const bw = w / bars.length;
  bars.forEach((b, i) => {
    const x = i * bw + bw/2;
    const yO = h - ((b.o - minP) / range) * (h - 20) - 10;
    const yC = h - ((b.c - minP) / range) * (h - 20) - 10;
    const yH = h - ((b.hi - minP) / range) * (h - 20) - 10;
    const yL = h - ((b.lo - minP) / range) * (h - 20) - 10;
    const up = b.c >= b.o;
    ctx.strokeStyle = up ? '#00ff88' : '#ff3d3d';
    ctx.fillStyle   = up ? '#00ff88' : '#ff3d3d';
    ctx.beginPath();
    ctx.moveTo(x, yH); ctx.lineTo(x, yL); ctx.stroke();
    const bodyW = Math.max(2, bw * 0.6);
    ctx.fillRect(x - bodyW/2, Math.min(yO,yC), bodyW, Math.abs(yC-yO) || 1);
  });
}
setTimeout(drawStockChart, 100);

// ═══════════════════════════════════════════════════════════
// THREE.JS 3D 場景
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('scene-canvas');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(W(), H());
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x02010a, 0.0007);   // 降低 fog 強度，中央更清楚

const camera = new THREE.PerspectiveCamera(60, W()/H(), 0.1, 3000);
camera.position.set(0, 60, 480);

// OrbitControls：若 CDN 沒載入成功，做 fallback（手動拖拉旋轉）
let controls = null;
if (typeof THREE.OrbitControls === 'function') {
  controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.35;
  controls.minDistance = 200;
  controls.maxDistance = 900;
} else {
  console.warn('[JARVIS] OrbitControls 未載入，使用 fallback 旋轉');
}
let cameraAngle = 0;
let autoRotate = controls ? false : true;  // fallback 模式直接自動轉
let isDragging = false, dragStartX = 0, dragStartY = 0, dragAngleX = 0, dragAngleY = 0;
if (!controls) {
  canvas.addEventListener('pointerdown', e => { isDragging = true; dragStartX = e.clientX; dragStartY = e.clientY; autoRotate = false; });
  canvas.addEventListener('pointerup', () => isDragging = false);
  canvas.addEventListener('pointermove', e => {
    if (!isDragging) return;
    dragAngleX += (e.clientX - dragStartX) * 0.005;
    dragAngleY = Math.max(-1.5, Math.min(1.5, dragAngleY + (e.clientY - dragStartY) * 0.005));
    dragStartX = e.clientX; dragStartY = e.clientY;
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const z = camera.position.length();
    const nz = Math.max(200, Math.min(900, z + e.deltaY * 0.5));
    camera.position.multiplyScalar(nz / z);
  }, { passive: false });
}

// ─── 中央 wireframe sphere（多層） ───
const coreGroup = new THREE.Group();
scene.add(coreGroup);

// 外層 icosahedron wireframe（強化能見度）
const icoGeo = new THREE.IcosahedronGeometry(140, 3);
const icoWire = new THREE.WireframeGeometry(icoGeo);
const icoLines = new THREE.LineSegments(icoWire, new THREE.LineBasicMaterial({
  color: 0x00f0ff, transparent: true, opacity: 0.65, depthWrite: false,
}));
coreGroup.add(icoLines);

// 第二層 icosahedron（不同細度，疊出網狀）
const icoGeo2 = new THREE.IcosahedronGeometry(155, 2);

function makeGlowTexture(color) {
  const cv = document.createElement('canvas');
  cv.width = cv.height = 128;
  const c = cv.getContext('2d');
  const g = c.createRadialGradient(64, 64, 0, 64, 64, 64);

  g.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = g; c.fillRect(0, 0, 128, 128);
  return new THREE.CanvasTexture(cv);
}

function makeParticles(count, rMin, rMax, baseSize, colorMix) {
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = rMin + Math.random() * (rMax - rMin);
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = r * Math.cos(phi);
    const t = Math.random();
    if (t < colorMix.white) { col[i*3]=1; col[i*3+1]=1; col[i*3+2]=1; }
    else if (t < colorMix.white + colorMix.pink) { col[i*3]=1; col[i*3+1]=0.24; col[i*3+2]=0.54; }
    else if (t < colorMix.white + colorMix.pink + colorMix.cyan) { col[i*3]=0; col[i*3+1]=0.94; col[i*3+2]=1; }
    else { col[i*3]=0.61; col[i*3+1]=0.36; col[i*3+2]=1; }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({
    size: baseSize, transparent: true, opacity: 0.85,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    sizeAttenuation: true,
  });
  return new THREE.Points(geo, mat);
}

// ─── 螺旋星系（spiral galaxy）───
// 用對數螺旋公式分布粒子，做出真實銀河旋臂結構
function makeSpiralGalaxy(count, radius, arms = 3, palette = 'pink') {
  const pos = new Float32Array(count * 3);
  const col = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const t = i / count;
    const armIndex = i % arms;
    const armOffset = (armIndex / arms) * Math.PI * 2;
    // 對數螺旋 + 隨機抖動讓旋臂有厚度
    const angle = t * Math.PI * 5.5 + armOffset + (Math.random() - 0.5) * 0.6;
    const r = Math.pow(t, 0.55) * radius;            // sqrt-ish，核心密集
    const jitter = (Math.random() - 0.5) * radius * 0.04;
    pos[i*3]   = (r + jitter) * Math.cos(angle);
    pos[i*3+1] = (Math.random() - 0.5) * radius * 0.06;  // 銀河盤面薄
    pos[i*3+2] = (r + jitter) * Math.sin(angle);

    // 顏色：核心暖白黃、旋臂依 palette、邊緣冷藍
    if (t < 0.18) {
      col[i*3]=1; col[i*3+1]=0.92; col[i*3+2]=0.72;   // 核心 warm
    } else if (t < 0.65) {
      if (palette === 'pink')  { col[i*3]=1;   col[i*3+1]=0.42; col[i*3+2]=0.72; }
      if (palette === 'cyan')  { col[i*3]=0.2; col[i*3+1]=0.85; col[i*3+2]=1; }
      if (palette === 'purple'){ col[i*3]=0.7; col[i*3+1]=0.4;  col[i*3+2]=1; }
    } else {
      col[i*3]=0.55; col[i*3+1]=0.72; col[i*3+2]=1;   // 邊緣 cold blue
    }
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const mat = new THREE.PointsMaterial({
    size: 2.2, transparent: true, opacity: 0.85,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false, sizeAttenuation: true,
  });
  const galaxy = new THREE.Points(geo, mat);
  galaxy.userData = { baseOp: 0.85, autoRotateSpeed: 0.0008 };
  return galaxy;
}

// ─── 節點（球面 Fibonacci 分布在不同 layer）───
function fibSphere(n, radius, offset = 0) {
  const points = [];
  const phi = Math.PI * (3 - Math.sqrt(5));
  for (let i = 0; i < n; i++) {
    const y = 1 - ((i + offset) / (n - 1 + offset)) * 2;
    const r = Math.sqrt(Math.max(0, 1 - y * y));
    const theta = phi * (i + offset);
    points.push([
      Math.cos(theta) * r * radius,
      y * radius,
      Math.sin(theta) * r * radius,
    ]);
  }
  return points;
}

// ─── Label projection（每 frame 把 3D pos 投影到 2D）───
const tmpVec = new THREE.Vector3();
function updateLabels() {
  const halfW = W() / 2, halfH = H() / 2;
  node3D.forEach(nd => {
    tmpVec.copy(nd.pos).project(camera);
    const x = (tmpVec.x * halfW) + halfW;
    const y = (-tmpVec.y * halfH) + halfH;
    const inFront = tmpVec.z < 1;
    nd.div.style.left = x + 'px';
    nd.div.style.top  = y + 'px';
    nd.div.style.display = inFront ? 'block' : 'none';
    // focus mode 時 opacity 由 CSS class 控制；否則用距離計算
    if (focusedNodeId) {
      if (nd.node.id === focusedNodeId) {
        nd.div.style.opacity = 1;
      } else {
        nd.div.style.opacity = '';  // 讓 CSS .focused .node-label 接管
      }
    } else {
      const distance = camera.position.distanceTo(nd.pos);
      const opacity = inFront ? Math.max(0.15, Math.min(1, 1 - (distance - 200) / 900)) : 0;
      nd.div.style.opacity = opacity;
    }
  });
}

// ─── 鏡頭飛行補間（ease-out cubic 起飛快、落點慢 + dolly zoom）───
let flyAnimId = null;
function flyTo(targetCamPos, lookAtPos, duration = 2600) {
  if (flyAnimId !== null) cancelAnimationFrame(flyAnimId);
  if (controls) controls.autoRotate = false;
  else autoRotate = false;

  const startPos = camera.position.clone();
  const startTarget = controls ? controls.target.clone() : new THREE.Vector3(0, 0, 0);
  const startFov = camera.fov;
  const startTime = performance.now();

  // ease-out quart：起飛瞬間快、尾端非常慢、有「滑入定位」感
  function easeOutQuart(t) {
    return 1 - Math.pow(1 - t, 4);
  }

  function tick() {
    const elapsed = performance.now() - startTime;
    const t = Math.min(1, elapsed / duration);
    const e = easeOutQuart(t);

    camera.position.lerpVectors(startPos, targetCamPos, e);
    const fovT = Math.sin(e * Math.PI);
    camera.fov = startFov - fovT * 6;
    camera.updateProjectionMatrix();

    if (controls) {
      controls.target.lerpVectors(startTarget, lookAtPos, e);
      controls.update();
    } else {
      const cur = new THREE.Vector3().lerpVectors(startTarget, lookAtPos, e);
      camera.lookAt(cur);
    }

    if (t < 1) {
      flyAnimId = requestAnimationFrame(tick);
    } else {
      flyAnimId = null;
      camera.fov = startFov;
      camera.updateProjectionMatrix();
    }
  }
  flyAnimId = requestAnimationFrame(tick);
}

// ─── Focus Mode：飛到節點後 dim 周圍 ───
let focusedNodeId = null;
function enterFocusMode(nodeId) {
  focusedNodeId = nodeId;
  document.getElementById('labels-layer').classList.add('focused');
  node3D.forEach(nd => {
    nd.div.classList.toggle('is-focus', nd.node.id === nodeId);
  });
  // 連線淡化
  linkLines.children.forEach(line => { line.material.opacity = 0.06; });
  linkFlowParticles.forEach(p => { p.sprite.material.opacity = 0.10; });
  nebulas.forEach(n => { n.material.opacity = 0.15; });
  galaxies.forEach(g => { g.material.opacity = 0.20; });
  // 粒子場淡化
  farStars.material.opacity = 0.30;
  midStars.material.opacity = 0.25;
  nearGlow.material.opacity = 0.18;
  // 中央球體稍淡
  icoLines.material.opacity = 0.35;
  icoLines2.material.opacity = 0.15;
}
function exitFocusMode() {
  focusedNodeId = null;
  document.getElementById('labels-layer').classList.remove('focused');
  node3D.forEach(nd => nd.div.classList.remove('is-focus'));
  linkLines.children.forEach(line => { line.material.opacity = 0.55; });
  linkFlowParticles.forEach(p => { p.sprite.material.opacity = p.sprite.userData.baseOp; });
  nebulas.forEach(n => { n.material.opacity = n.userData.baseOp; });
  galaxies.forEach(g => { g.material.opacity = g.userData.baseOp; });
  farStars.material.opacity = 0.85;
  midStars.material.opacity = 0.85;
  nearGlow.material.opacity = 0.85;
  icoLines.material.opacity = 0.65;
  icoLines2.material.opacity = 0.30;
  document.getElementById('detail').classList.remove('show');
}

// ─── Detail panel ───
function focusNode(node, pos) {
  const p = document.getElementById('detail');
  p.classList.add('show');
  p.querySelector('.d-name').textContent = node.name;
  p.querySelector('.d-sub').textContent = (TYPE_LABEL_NAME[node.type] || '') + ' · ' + (node.sub || '');
  const body = document.getElementById('d-body');
  let rows = `<div class="d-row"><span class="l">節點 ID</span><span class="v" style="font-size:10px;">${node.id}</span></div>`;
  rows += `<div class="d-row"><span class="l">類別</span><span class="v">${TYPE_LABEL_NAME[node.type]||'--'}</span></div>`;
  if (node.rev) {
    rows += `<div class="d-row"><span class="l">業績</span><span class="v">${fmtF(node.rev)}</span></div>`;
    rows += `<div class="d-row"><span class="l">訂單</span><span class="v">${fmtN(node.orders)}</span></div>`;
    rows += `<div class="d-row"><span class="l">客戶</span><span class="v">${fmtN(node.customers)}</span></div>`;
  }
  if (node.status) {
    rows += `<div class="d-row"><span class="l">狀態</span><span class="v" style="color:var(--green);">● ${node.status}</span></div>`;
  }
  const linkCount = DATA.links.filter(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    return s === node.id || t === node.id;
  }).length;
  rows += `<div class="d-row"><span class="l">連線</span><span class="v">${linkCount}</span></div>`;
  body.innerHTML = rows;

  // 飛行終點計算：
  //   1) 沿節點方向 (球心 → 節點) 拉遠 dist，讓 camera 在節點外側
  //   2) 沿節點切線方向 (右手系，與 world Y 做 cross) 偏移 sideOffset
  //      讓節點顯示在畫面「**左 1/3**」處，detail panel 在右側不會擋
  const dist = 190;
  const sideOffset = 90;  // 偏移強度
  const dirOut = pos.clone().normalize();
  const right = new THREE.Vector3().crossVectors(dirOut, new THREE.Vector3(0, 1, 0)).normalize();
  // 若節點剛好在 y 軸上 (right 變 0)，fallback 用 X 軸
  if (right.length() < 0.1) right.set(1, 0, 0);
  const targetCam = pos.clone()
    .add(dirOut.multiplyScalar(dist))
    .add(right.multiplyScalar(sideOffset));
  flyTo(targetCam, pos, 2600);

  // 飛行結束後（稍延遲一點 ease-out 比較慢）進入 focus mode
  setTimeout(() => enterFocusMode(node.id), 2400);
}

function bindDvRows(elId, candidateTypes) {
  document.querySelectorAll('#' + elId + ' .dv-row').forEach((row, idx) => {
    row.style.cursor = 'pointer';
    row.addEventListener('click', () => {
      // 找 candidateTypes 內第 idx 個節點
      const matched = node3D.filter(nd => candidateTypes.includes(nd.node.type));
      const target = matched[idx % matched.length];
      if (target) focusNode(target.node, target.pos);
    });
  });
}
bindDvRows('dv-ai',   ['persona']);
bindDvRows('dv-proj', ['project']);
bindDvRows('dv-rec',  ['note', 'agent']);

if (controls) canvas.addEventListener('pointerdown', () => { controls.autoRotate = false; });

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});

// ─── Animation loop ───
let frame = 0;
function animate() {
  requestAnimationFrame(animate);
  frame++;
  if (controls) {
    controls.update();
  } else {
    // Fallback：手動 orbit
    if (autoRotate) cameraAngle += 0.003;
    const radius = camera.position.length();
    const phi = dragAngleX + cameraAngle;
    const theta = Math.PI / 2 - dragAngleY;
    camera.position.set(
      radius * Math.sin(theta) * Math.cos(phi),
      radius * Math.cos(theta),
      radius * Math.sin(theta) * Math.sin(phi)
    );
    camera.lookAt(0, 0, 0);
  }

  // 中央球體緩慢自轉
  coreGroup.rotation.y += 0.0015;
  coreGroup.rotation.x += 0.0007;

  // 粒子層緩慢自轉
  farStars.rotation.y += 0.00015;
  midStars.rotation.y -= 0.00025;
  nearGlow.rotation.y += 0.0004;

  // 銀河系緩慢自轉（每個沿自己 normal 軸旋）
  galaxies.forEach((g, i) => {
    const sign = i % 2 === 0 ? 1 : -1;
    g.rotation.z += g.userData.autoRotateSpeed * sign;
  });

  // 連線流動粒子（沿線往返）
  linkFlowParticles.forEach(p => {
    p.t += p.speed;
    if (p.t > 1) p.t -= 1;
    // 用 sin 曲線讓中段加速、頭尾減速，更有「脈衝流」感
    const tt = p.t;
    p.sprite.position.lerpVectors(p.from, p.to, tt);
  });

  // 星雲緩慢呼吸（scale 微縮+opacity 漂浮）
  nebulas.forEach((n, i) => {
    const breathe = 1 + Math.sin(frame * 0.005 + i * 1.3) * 0.04;
    n.scale.x = n.scale.y = (450 + (i * 50)) * breathe;
    if (!focusedNodeId) {
      n.material.opacity = 0.7 + Math.sin(frame * 0.008 + i) * 0.15;
    }
  });

  // Pulse 中心 glow
  const pulse = 1 + Math.sin(frame * 0.04) * 0.08;
  coreGlow.scale.set(280 * pulse, 280 * pulse, 1);

  // Label projection
  updateLabels();

  renderer.render(scene, camera);
}
animate();
</script>
