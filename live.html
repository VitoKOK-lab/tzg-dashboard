<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════
   TZG 即時動態儀表板（珠寶工坊即時場景）  live.html
  ═══════════════════════════════════════════════════════════════
   ▸ 純前端、零後端、零函式庫。唯讀 output/dashboard_latest.html
     內嵌的 const D= JSON，不影響任何既有產生流程。
   ▸ 移除方式：
       1. 刪除本檔案（git rm live.html）
       2. 還原 index.html 中的三處新增：
          -「即時」tab、- f4 iframe、- urls 陣列最後一項
          （loaded 陣列改回 4 個 false）
   ▸ 測試參數：
       ?hour=20              時鐘跳到今天 20:00
       ?time=2026-07-15T20:30 指定完整時間
       ?demo=1               內建範例資料 + 60 倍速時鐘
  ═══════════════════════════════════════════════════════════════
-->
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TZG 即時工坊</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Montserrat:wght@400;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #120b10;
  font-family: 'Montserrat', 'Noto Sans TC', 'PingFang TC', sans-serif;
  color: #F5EFE4;
}

#stage {
  position: fixed; inset: 0 0 52px 0;
  display: flex; align-items: center; justify-content: center;
  /* 防烙印：整體 90 秒 8 字形微漂移 */
  animation: drift 90s ease-in-out infinite;
}
@keyframes drift {
  0%   { transform: translate(0px, 0px); }
  25%  { transform: translate(6px, -5px); }
  50%  { transform: translate(0px, -8px); }
  75%  { transform: translate(-6px, -4px); }
  100% { transform: translate(0px, 0px); }
}
svg#scene { width: 100%; height: 100%; display: block; }

text { user-select: none; }
.serif  { font-family: 'Cormorant Garamond', serif; }
.num    { font-family: 'Cormorant Garamond', serif; font-variant-numeric: tabular-nums; }
.zh     { font-family: 'Noto Sans TC', 'PingFang TC', 'Montserrat', sans-serif; }

/* ── 環境動畫（全 CSS，合成器執行緒） ── */
.gem { animation: twinkle 4s ease-in-out infinite; }
@keyframes twinkle { 0%,100% { opacity: .45; } 50% { opacity: 1; } }

.chan-swing { animation: sway 6s ease-in-out infinite; transform-origin: 0 0; }
@keyframes sway { 0%,100% { transform: rotate(-2deg); } 50% { transform: rotate(2deg); } }

.star { opacity: 0; transition: opacity 2s; }
.is-night .star { animation: twinkle 3s ease-in-out infinite; opacity: .9; }

/* ── 員工三態 ── */
.figure { animation: breathe 2.8s ease-in-out infinite; }
@keyframes breathe { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }

.worker .arm { transition: transform .3s; }
.worker.working .arm-l { animation: typeL .32s ease-in-out infinite alternate; }
.worker.working .arm-r { animation: typeR .29s ease-in-out infinite alternate; }
@keyframes typeL { from { transform: rotate(-14deg); } to { transform: rotate(10deg); } }
@keyframes typeR { from { transform: rotate(12deg); }  to { transform: rotate(-12deg); } }
.worker.working .figure { animation: workbob .5s ease-in-out infinite; }
@keyframes workbob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

.worker.celebrate .figure { animation: jump .55s ease-in-out infinite; }
@keyframes jump { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-26px); } }
.worker.celebrate .arm-l { transform: rotate(-150deg); }
.worker.celebrate .arm-r { transform: rotate(150deg); }

/* 泡泡 */
.bubble { opacity: 0; pointer-events: none; transition: opacity .35s, transform .35s; transform: translateY(8px); }
.bubble.show { opacity: 1; transform: translateY(0); }

/* 夜間模式 */
#nightDim { opacity: 0; transition: opacity 3s; pointer-events: none; }
.is-night #nightDim { opacity: .52; }
.is-night .figure, .is-night .nametag { opacity: 0; transition: opacity 2s; }
.figure, .nametag { transition: opacity 2s; }
#cat { opacity: 0; transition: opacity 2s; }
.is-night #cat { opacity: 1; }
#cat .cat-body { animation: breathe 3.4s ease-in-out infinite; }
#lampGlow { opacity: 0; transition: opacity 3s; }
.is-night #lampGlow { opacity: .22; }
.zzz { opacity: 0; }
.is-night .zzz { animation: zzz 3s ease-in-out infinite; }
.zzz:nth-of-type(2) { animation-delay: 1s !important; }
@keyframes zzz { 0% { opacity: 0; transform: translate(0,0); } 30% { opacity: .8; } 100% { opacity: 0; transform: translate(10px,-22px); } }

/* 彩紙（池化，觸發時加 .boom） */
#confetti .cf { opacity: 0; }
#confetti.boom .cf { animation: fall var(--dur) var(--delay) cubic-bezier(.2,.6,.4,1) forwards; }
@keyframes fall {
  0%   { opacity: 1; transform: translate(0,0) rotate(0deg); }
  100% { opacity: 0; transform: translate(var(--dx), 620px) rotate(var(--rot)); }
}

/* 綵帶橫幅 */
#banner { opacity: 0; transition: opacity .5s, transform .5s; transform: translateY(-18px) scale(.92); transform-origin: 960px 300px; }
#banner.show { opacity: 1; transform: translateY(0) scale(1); }

/* 禮盒上架 */
.giftbox { opacity: 0; }
.giftbox.on { opacity: 1; animation: pop .5s cubic-bezier(.3,1.6,.5,1); }
@keyframes pop { 0% { transform: translateY(14px) scale(.4); } 100% { transform: translateY(0) scale(1); } }

/* 收銀機更新脈衝 */
#regToday.pulse { animation: pulse .8s ease-out; }
@keyframes pulse { 0% { fill: #ffe9b8; } 100% { fill: #C9A961; } }

/* 短影音成效牆 */
#metaTV { opacity: 0; transition: opacity 1.2s; }
#metaTV.on { opacity: 1; }
#metaTV .livedot { animation: livedot 1.6s ease-in-out infinite; }
@keyframes livedot { 0%,100% { opacity: 1; } 50% { opacity: .25; } }
#metaTV .eq { transform-origin: center bottom; transform-box: fill-box; animation: eq 1s ease-in-out infinite alternate; }
@keyframes eq { from { transform: scaleY(.25); } to { transform: scaleY(1); } }
.is-night #metaTV.on { opacity: .35; }

/* 資料異常告示 */
#stalePlaque { opacity: 0; transition: opacity 1s; }
#stalePlaque.show { opacity: 1; }

/* ── 底部跑馬燈（僅真實訂單） ── */
#ticker {
  position: fixed; left: 0; right: 0; bottom: 0; height: 52px;
  background: rgba(18,10,15,.9);
  border-top: 1px solid rgba(201,169,97,.4);
  display: flex; align-items: center; overflow: hidden;
}
#tickerLabel {
  flex-shrink: 0; padding: 0 18px; height: 100%;
  display: flex; align-items: center;
  background: rgba(201,169,97,.12);
  border-right: 1px solid rgba(201,169,97,.35);
  color: #C9A961; font-size: 13px; font-weight: 700; letter-spacing: 2px;
  z-index: 1;
}
#tickerViewport { flex: 1; overflow: hidden; }
#tickerTrack {
  display: inline-flex; white-space: nowrap; width: max-content;
  will-change: transform;
  animation: tickmove var(--tickDur, 60s) linear infinite;
}
@keyframes tickmove { to { transform: translateX(-50%); } }
.tick-item { padding: 0 34px; font-size: 14px; color: #e9dfcc; }
.tick-item .amt { color: #C9A961; font-weight: 600; }
.tick-item .sep { color: rgba(212,69,106,.8); padding: 0 10px; }

/* ── 載入 / 錯誤覆蓋層 ── */
.overlay {
  position: fixed; inset: 0; z-index: 20;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
  background: #120b10; text-align: center; padding: 24px;
}
.overlay.hidden { display: none; }
.spinner {
  width: 34px; height: 34px; border-radius: 50%;
  border: 2px solid rgba(201,169,97,.25); border-top-color: #C9A961;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.overlay h2 { font-size: 17px; font-weight: 500; color: #F5EFE4; letter-spacing: 1px; }
.overlay p  { font-size: 13px; color: rgba(245,239,228,.55); line-height: 1.9; }
</style>
</head>

/* ═══════════════ 4. 模擬引擎 ═══════════════ */
// 一切由（今天日期 + data_as_of_iso）決定：任何時刻刷新頁面，
// 顯示數字都與從早上跑到現在的螢幕一致。
var sim = { events: [], dayStart: 0, simStartMs: 0, realTodayRev: 0, realTodayOrders: 0, dailyTarget: 150000 };
var lastTickMs = -1;
var prevPct = null;
var firedMilestones = {};

function hourCurve() {
  var counts = new Array(24).fill(0);
  (D.hour_dist || []).forEach(function (h) { if (h && h.hour >= 0 && h.hour < 24) counts[h.hour] = +h.orders || 0; });
  var total = counts.reduce(function (a, b) { return a + b; }, 0);
  // 先驗曲線：凌晨低谷、19–22 高峰（源自 weekday_hour 峰值觀察）
  var prior = [1,1,.4,.3,.3,.4,.8,1.5,2.5,3.5,4.5,5,5.5,6,6.5,7,7.5,8.5,9.5,11,11.5,11,8,4];
  var pTotal = prior.reduce(function (a, b) { return a + b; }, 0);
  var w = [], sum = 0;
  for (var h = 0; h < 24; h++) {
    var real = total > 0 ? counts[h] / total : 0;
    // 3 點平滑
    if (total > 0) {
      var l = counts[(h + 23) % 24] / total, r = counts[(h + 1) % 24] / total;
      real = (l + 2 * real + r) / 4;
    }
    var blend = total >= 100 ? 0.8 * real + 0.2 * (prior[h] / pTotal)
                             : 0.5 * real + 0.5 * (prior[h] / pTotal);
    blend += 0.002;
    w.push(blend); sum += blend;
  }
  return w.map(function (x) { return x / sum; });
}

function buildSim() {
  var t = now();
  sim.dayStart = startOfDay(t);
  var seed = hashStr(ymd(t) + '|' + (D.meta.data_as_of_iso || ''));
  var rng = mulberry32(seed);
  var w = hourCurve();

  // 今日包絡：近 7 完整天平均營收（排除 is_today），fallback daily_target
  var dt = (D.last_7_days && D.last_7_days.daily_target) || 150000;
  sim.dailyTarget = dt;
  var fullDays = ((D.last_7_days && D.last_7_days.data) || []).filter(function (d) { return !d.is_today && d.rev > 0; });
  var estDaily = fullDays.length ? fullDays.reduce(function (a, d) { return a + d.rev; }, 0) / fullDays.length : dt;
  estDaily = clamp(estDaily, 0.4 * dt, 1.6 * dt);
  var dayTotal = estDaily * (0.85 + 0.3 * rng());
  var avgOrder = (D.kpi && D.kpi.avg_order) || 4500;
  var medOrder = (D.kpi && D.kpi.median_order) || Math.round(avgOrder * 0.4);
  var estOrders = clamp(Math.round(dayTotal / avgOrder), 5, 80);

  // 今日已有的真實數字（報表當天已跑過的情況）
  sim.realTodayRev = 0; sim.realTodayOrders = 0;
  var todayKey = String(new Date(t).getMonth() + 1).padStart(2, '0') + '/' + String(new Date(t).getDate()).padStart(2, '0');
  (((D.last_7_days || {}).data) || []).forEach(function (d) {
    if (d.date === todayKey) { sim.realTodayRev = d.rev || 0; sim.realTodayOrders = d.orders || 0; }
  });

  // 模擬只涵蓋 data_as_of 之後的時間
  var asOf = new Date(D.meta.data_as_of_iso || 0).getTime();
  sim.simStartMs = Math.max(0, asOf - sim.dayStart);

  // 事件排程（Poisson 式）
  var events = [];
  for (var h = 0; h < 24; h++) {
    var lam = estOrders * w[h];
    var n = Math.floor(lam) + (rng() < (lam - Math.floor(lam)) ? 1 : 0);
    for (var k = 0; k < n; k++) events.push({ t: h * 36e5 + rng() * 36e5 });
  }
  events.sort(function (a, b) { return a.t - b.t; });

  // 金額：75% 中位數對數常態、25% 大單，總和縮放至 dayTotal
  var rawSum = 0;
  events.forEach(function (ev) {
    ev.amount = rng() < 0.75 ? medOrder * Math.exp(gauss(rng) * 0.6) : avgOrder * (1 + 2 * rng());
    rawSum += ev.amount;
  });
  var scale = rawSum > 0 ? dayTotal / rawSum : 1;
  events.forEach(function (ev) { ev.amount = Math.max(200, Math.round(ev.amount * scale)); });

  // 指派員工（依昨日業績佔比加權）與商品
  var weights = workerList.map(function (wk) { return Math.max(wk.rev, 1); });
  var wSum = weights.reduce(function (a, b) { return a + b; }, 0);
  var prods = (D.prod_qty || []).map(function (p) { return shortProduct(p.name); });
  events.forEach(function (ev) {
    var r = rng() * wSum, idx = 0;
    for (var i2 = 0; i2 < weights.length; i2++) { r -= weights[i2]; if (r <= 0) { idx = i2; break; } }
    ev.worker = idx;
    ev.product = prods.length ? prods[Math.floor(rng() * prods.length)] : '新訂單';
  });

  sim.events = events.filter(function (ev) { return ev.t > sim.simStartMs; });
  lastTickMs = -1;
  prevPct = null;
  if (boxPool.length) clearBoxes();
}

var workerList = []; // {name, rev, el, bubble, mvp}

function buildWorkers() {
  var g = $('workers');
  while (g.firstChild) g.removeChild(g.firstChild);
  workerList = [];

  // 合併 yesterday.agents + agents（去重、依 rank）
  var seen = {}, merged = [];
  (((D.yesterday || {}).agents) || []).concat(D.agents || []).forEach(function (a) {
    var nm = agentDisplayName(a.name);
    if (!seen[nm]) { seen[nm] = true; merged.push({ name: nm, rev: a.rev || 0 }); }
  });
  merged.sort(function (a, b) { return b.rev - a.rev; });

  SLOTS.forEach(function (slot, i) {
    var agent = merged[i];
    var name = agent ? agent.name : slot.role + '組';
    var rev = agent ? agent.rev : 1;
    var mvp = i === 0 && !!agent;
    var el = makeWorker(slot, name, SUITS[i % SUITS.length], mvp);
    g.appendChild(el.root);
    workerList.push({ name: name, rev: rev, el: el.root, bubble: el.bubble, bubbleLine1: el.line1, bubbleLine2: el.line2 });
  });
}

var SVGNS = 'http://www.w3.org/2000/svg';
function svgEl(tag, attrs, cls) {
  var e = document.createElementNS(SVGNS, tag);
  for (var k in attrs) e.setAttribute(k, attrs[k]);
  if (cls) e.setAttribute('class', cls);
  return e;
}

function makeWorker(slot, name, suit, mvp) {
  var root = svgEl('g', { transform: 'translate(' + slot.x + ',' + slot.y + ')' }, 'worker');
  var fig = svgEl('g', {}, 'figure');

  // 左臂（肩點為局部原點 → CSS rotate 不會覆蓋定位）
  var armLPos = svgEl('g', { transform: 'translate(-30,-84)' });
  var armL = svgEl('g', {}, 'arm arm-l');
  armL.appendChild(svgEl('rect', { x: -6, y: 0, width: 12, height: 46, rx: 6, fill: suit }));
  armL.appendChild(svgEl('circle', { cx: 0, cy: 48, r: 7, fill: '#f3d9c6' }));
  armLPos.appendChild(armL); fig.appendChild(armLPos);
  // 右臂
  var armRPos = svgEl('g', { transform: 'translate(30,-84)' });
  var armR = svgEl('g', {}, 'arm arm-r');
  armR.appendChild(svgEl('rect', { x: -6, y: 0, width: 12, height: 46, rx: 6, fill: suit }));
  armR.appendChild(svgEl('circle', { cx: 0, cy: 48, r: 7, fill: '#f3d9c6' }));
  armRPos.appendChild(armR); fig.appendChild(armRPos);

  // 軀幹
  fig.appendChild(svgEl('path', { d: 'M-36 0 C-36 -68 -20 -96 0 -96 C20 -96 36 -68 36 0 Z', fill: suit }));
  fig.appendChild(svgEl('path', { d: 'M-10 -96 L0 -80 L10 -96', stroke: '#C9A961', 'stroke-width': 3, fill: 'none' }));
  // 頭
  fig.appendChild(svgEl('circle', { cx: 0, cy: -122, r: 25, fill: '#f3d9c6' }));
  fig.appendChild(svgEl('path', { d: 'M-25 -128 A25 25 0 0 1 25 -128 L25 -122 Q0 -142 -25 -122 Z', fill: '#42303a' }));
  fig.appendChild(svgEl('circle', { cx: -8, cy: -120, r: 2.4, fill: '#33232c' }));
  fig.appendChild(svgEl('circle', { cx: 8, cy: -120, r: 2.4, fill: '#33232c' }));
  fig.appendChild(svgEl('path', { d: 'M-6 -110 Q0 -105 6 -110', stroke: '#b0755f', 'stroke-width': 2, fill: 'none', 'stroke-linecap': 'round' }));
  if (slot.headset) {
    fig.appendChild(svgEl('path', { d: 'M-25 -126 A25 25 0 0 1 25 -126', stroke: '#C9A961', 'stroke-width': 4, fill: 'none' }));
    fig.appendChild(svgEl('circle', { cx: -25, cy: -120, r: 6, fill: '#C9A961' }));
    fig.appendChild(svgEl('path', { d: 'M-25 -114 Q-22 -102 -10 -102', stroke: '#C9A961', 'stroke-width': 3, fill: 'none' }));
  }
  root.appendChild(fig);

  // 名牌
  var tag = svgEl('g', {}, 'nametag');
  var tagW = Math.max(96, name.length * 22 + 40);
  tag.appendChild(svgEl('rect', { x: -tagW / 2, y: 14, width: tagW, height: 34, rx: 8, fill: 'rgba(0,0,0,.45)', stroke: '#C9A961', 'stroke-width': 1.5 }));
  var tagText = svgEl('text', { x: mvp ? 8 : 0, y: 38, 'font-size': 19, fill: '#F5EFE4', 'text-anchor': 'middle', 'letter-spacing': 1 }, 'zh');
  tagText.textContent = name;
  tag.appendChild(tagText);
  if (mvp) {
    var star = svgEl('path', { d: 'M0 -7 L2 -2 L7 -2 L3 1.5 L4.6 7 L0 3.6 L-4.6 7 L-3 1.5 L-7 -2 L-2 -2 Z', fill: '#C9A961', transform: 'translate(' + (-tagW / 2 + 18) + ',31)' });
    tag.appendChild(star);
    var mvpTxt = svgEl('text', { x: 0, y: 66, 'font-size': 12, fill: '#C9A961', 'text-anchor': 'middle' }, 'zh');
    mvpTxt.textContent = '昨日 MVP';
    tag.appendChild(mvpTxt);
  }
  root.appendChild(tag);

  // 泡泡（每位員工一顆，重複使用）
  var bubble = svgEl('g', {}, 'bubble');
  bubble.appendChild(svgEl('path', { d: 'M-8 -158 L0 -146 L8 -158 Z', fill: '#F5EFE4' }));
  bubble.appendChild(svgEl('rect', { x: -125, y: -224, width: 250, height: 68, rx: 12, fill: '#F5EFE4' }));
  var line1 = svgEl('text', { x: 0, y: -196, 'font-size': 17, fill: '#4a3340', 'text-anchor': 'middle', 'font-weight': 500 }, 'zh');
  var line2 = svgEl('text', { x: 0, y: -170, 'font-size': 19, fill: '#D4456A', 'text-anchor': 'middle', 'font-weight': 700 }, 'num');
  bubble.appendChild(line1); bubble.appendChild(line2);
  root.appendChild(bubble);

  return { root: root, bubble: bubble, line1: line1, line2: line2 };
}

/* ═══════════════ 6. 禮盒池 / 彩紙池 ═══════════════ */
var BOX_COLORS = ['#D4456A', '#C9A961', '#8a5d9e', '#4a8a7e'];
var boxPool = [], boxNext = 0, boxShown = 0;
function buildBoxPool() {
  var g = $('boxShelf');
  for (var i = 0; i < 12; i++) {
    var col = i % 6, row = Math.floor(i / 6);
    var x = 1522 + col * 44, y = row === 0 ? 706 : 792;
    var box = svgEl('g', { transform: 'translate(' + x + ',' + y + ')' }, 'giftbox');
    var c = BOX_COLORS[i % BOX_COLORS.length];
    box.appendChild(svgEl('rect', { x: 0, y: -34, width: 38, height: 34, rx: 4, fill: c }));
    box.appendChild(svgEl('rect', { x: 16, y: -34, width: 6, height: 34, fill: 'rgba(255,255,255,.55)' }));
    box.appendChild(svgEl('rect', { x: 0, y: -22, width: 38, height: 5, fill: 'rgba(255,255,255,.55)' }));
    box.appendChild(svgEl('path', { d: 'M19 -34 q-8 -12 -14 -4 q6 6 14 4 q8 2 14 -4 q-6 -8 -14 4', fill: 'rgba(255,255,255,.7)' }));
    g.appendChild(box);
    boxPool.push(box);
  }
}
function spawnBox() {
  var box = boxPool[boxNext];
  box.classList.remove('on');
  void box.getBoundingClientRect(); // 重觸發動畫
  box.classList.add('on');
  boxNext = (boxNext + 1) % boxPool.length;
  boxShown = Math.min(boxShown + 1, boxPool.length);
}
function syncBoxes(n) {
  if (boxShown >= n) return;
  for (var i = 0; i < n; i++) boxPool[i].classList.add('on');
  boxShown = n; boxNext = n % boxPool.length;
}
function clearBoxes() {
  boxPool.forEach(function (b) { b.classList.remove('on'); });
  boxShown = 0; boxNext = 0;
}

function buildConfetti() {
  var g = $('confetti');
  var cols = ['#D4456A', '#C9A961', '#F5EFE4', '#e88ca3'];
  for (var i = 0; i < 40; i++) {
    var r = svgEl('rect', {
      x: 660 + (i * 157) % 600, y: -30,
      width: 8 + (i % 3) * 3, height: 12 + (i % 4) * 3,
      fill: cols[i % cols.length]
    }, 'cf');
    r.style.setProperty('--dx', (((i * 73) % 260) - 130) + 'px');
    r.style.setProperty('--rot', (((i * 131) % 720) - 360) + 'deg');
    r.style.setProperty('--dur', (2.4 + (i % 5) * 0.28) + 's');
    r.style.setProperty('--delay', ((i % 8) * 0.09) + 's');
    g.appendChild(r);
  }
}

var bannerTimer = null, confettiTimer = null;
function celebrate(text) {
  $('bannerText').textContent = text;
  var banner = $('banner'), conf = $('confetti');
  banner.classList.add('show');
  conf.classList.remove('boom');
  void conf.getBoundingClientRect();
  conf.classList.add('boom');
  workerList.forEach(function (wk) { wk.el.classList.remove('working'); wk.el.classList.add('celebrate'); });
  clearTimeout(bannerTimer); clearTimeout(confettiTimer);
  bannerTimer = setTimeout(function () {
    banner.classList.remove('show');
    workerList.forEach(function (wk) { wk.el.classList.remove('celebrate'); });
  }, 5200);
  confettiTimer = setTimeout(function () { conf.classList.remove('boom'); }, 4200);
}

/* ═══════════════ 7. 靜態渲染（每次資料更新） ═══════════════ */
function renderStatic() {
  var m = D.meta || {};
  $('calMonth').textContent = m.report_month || '';
  $('calDay').textContent = '第 ' + (m.days_elapsed || '—') + ' / ' + (m.days_total || '—') + ' 天';
  $('asOf').textContent = '資料截至 ' + (m.data_as_of || '—') + (m.data_as_of_iso ? ' ' + String(m.data_as_of_iso).slice(11, 16) : '');
  $('gaugeTarget').textContent = fmt(D.target || 0);
  $('gaugeTargetLabel').textContent = (m.report_month || '本月') + ' 目標';
  updateStalePlaque(null);
}

function buildTicker() {
  var track = $('tickerTrack');
  var rows = (D.customers || []).slice().sort(function (a, b) { return String(b.time).localeCompare(String(a.time)); }).slice(0, 14);
  var html = rows.map(function (c) {
    var t = String(c.time || '').slice(11, 16);
    return '<span class="tick-item">' + (t ? t + '　' : '') + (c.customer || '') +
      '<span class="sep">✦</span>' + shortProduct(c.products) +
      '<span class="sep">✦</span><span class="amt">' + fmt(c.amount || 0) + '</span></span>';
  }).join('');
  if (!html) html = '<span class="tick-item">尚無近期訂單資料</span>';
  track.innerHTML = html + html; // 兩份內容 → translateX(-50%) 無縫循環
  var len = track.textContent.length;
  track.style.setProperty('--tickDur', clamp(len * 0.28, 30, 150) + 's');
}

/* ═══════════════ 8. 收銀機補間 ═══════════════ */
var regShown = 0, regTarget = 0, tweenRAF = null;
function setRegister(target) {
  if (Math.round(target) === Math.round(regTarget)) return;
  regTarget = target;
  if (document.hidden) { regShown = regTarget; drawRegister(); return; }
  var from = regShown, start = performance.now(), dur = 1300;
  cancelAnimationFrame(tweenRAF);
  var el = $('regToday');
  el.classList.remove('pulse'); void el.getBoundingClientRect(); el.classList.add('pulse');
  (function step(ts) {
    var p = clamp((ts - start) / dur, 0, 1);
    var e = 1 - Math.pow(1 - p, 3); // ease-out cubic
    regShown = from + (regTarget - from) * e;
    drawRegister();
    if (p < 1) tweenRAF = requestAnimationFrame(step);
  })(start);
}
function drawRegister() { $('regToday').textContent = fmt(regShown); }

/* ═══════════════ 9. 事件觸發 ═══════════════ */
var workingTimers = [];
function fireEvent(ev) {
  var wk = workerList[ev.worker] || workerList[0];
  if (!wk) return;
  var el = wk.el;
  el.classList.add('working');
  wk.bubbleLine1.textContent = '新訂單 ✦ ' + ev.product;
  wk.bubbleLine2.textContent = fmt(ev.amount);
  wk.bubble.classList.add('show');
  workingTimers.push(setTimeout(function () {
    el.classList.remove('working');
    wk.bubble.classList.remove('show');
  }, 4600 / (DEMO ? 4 : 1)));
  // 6 秒後包裝完成 → 禮盒上架
  workingTimers.push(setTimeout(spawnBox, 6000 / (DEMO ? 6 : 1)));
  if (workingTimers.length > 60) workingTimers.splice(0, 30);
}

/* ═══════════════ 10. 主迴圈（1 Hz） ═══════════════ */
function renderNow(skipAnim) {
  if (!D) return;
  var t = now();

  // 跨日 → 重建排程（新種子）
  if (startOfDay(t) !== sim.dayStart) { buildSim(); skipAnim = true; }

  var msOfDay = t - sim.dayStart;
  var simSum = 0, simCount = 0;
  var newEvents = [];
  for (var i = 0; i < sim.events.length; i++) {
    var ev = sim.events[i];
    if (ev.t <= msOfDay) {
      simSum += ev.amount; simCount++;
      if (!skipAnim && ev.t > lastTickMs && msOfDay - ev.t < 15e3 * SPEED) newEvents.push(ev);
    } else break;
  }
  lastTickMs = msOfDay;

  var revMtd = (D.kpi && D.kpi.rev_mtd) || 0;
  var ordersMtd = (D.kpi && D.kpi.orders_mtd) || 0;
  var displayedToday = sim.realTodayRev + simSum;
  var displayedMTD = revMtd + simSum;
  var displayedTodayOrders = sim.realTodayOrders + simCount;
  var pct = D.target > 0 ? (displayedMTD / D.target) * 100 : 0;

  // 收銀機 + 本月掛牌
  setRegister(displayedToday);
  $('regOrders').textContent = '今日 ' + displayedTodayOrders + ' 筆';
  $('regMonth').textContent = fmt(displayedMTD) + ' ・ ' + (ordersMtd + simCount) + ' 筆';

  // 禮盒架與今日模擬完成單數同步（頁面載入 / 補跑時直接對齊）
  syncBoxes(Math.min(simCount, boxPool.length));

  // 目標溫度計（0–100% 高 346px，底 y=553）
  var fillPct = clamp(pct, 0, 100);
  var h = 346 * fillPct / 100;
  $('gaugeFill').setAttribute('y', 553 - h);
  $('gaugeFill').setAttribute('height', Math.max(h, 7));
  $('gaugePct').textContent = pct.toFixed(1) + '%';
  $('crown').setAttribute('opacity', pct >= 100 ? 1 : 0);

  // 慶祝時刻
  var dayKey = ymd(t);
  if (displayedToday >= sim.dailyTarget && sim.dailyTarget > 0) {
    var dk = 'tzg_daily_' + dayKey;
    var already = false;
    try { already = sessionStorage.getItem(dk) === '1'; } catch (e) {}
    if (!already && !skipAnim) {
      try { sessionStorage.setItem(dk, '1'); } catch (e) {}
      celebrate('今日達標 🎉');
    } else if (!already) {
      try { sessionStorage.setItem(dk, '1'); } catch (e) {}
    }
  }
  if (prevPct !== null && !skipAnim) {
    [25, 50, 75, 100].forEach(function (mst) {
      if (prevPct < mst && pct >= mst && !firedMilestones[dayKey + mst]) {
        firedMilestones[dayKey + mst] = true;
        celebrate('本月達成 ' + mst + '% 🏆');
      }
    });
  }
  prevPct = pct;

  // 事件動畫（最多同時演 3 筆，避免補跑洪水）
  if (!skipAnim) newEvents.slice(-3).forEach(fireEvent);

  updateAmbience(t);
}

/* ═══════════════ 11. 氛圍（晝夜 / 夜間模式） ═══════════════ */
var SKY = [
  { h: 0,    c: ['#141230', '#241a3a'] },  // 深夜
  { h: 4.5,  c: ['#141230', '#241a3a'] },  // 深夜維持
  { h: 6,    c: ['#3a2a55', '#c96a7e'] },  // 破曉
  { h: 7.5,  c: ['#7e9cc9', '#f3d9b0'] },  // 清晨
  { h: 10,   c: ['#8fb6d9', '#dcd3e8'] },  // 白天
  { h: 16,   c: ['#c98a6a', '#e8b891'] },  // 黃昏前
  { h: 18,   c: ['#8a4a6a', '#e88a6a'] },  // 暮色
  { h: 20,   c: ['#1c1840', '#3a2a55'] },  // 夜晚
  { h: 24,   c: ['#141230', '#241a3a'] }
];
function updateAmbience(t) {
  var d = new Date(t);
  var hour = d.getHours() + d.getMinutes() / 60;
  var a = SKY[0], b = SKY[SKY.length - 1], f = 0;
  for (var i = 0; i < SKY.length - 1; i++) {
    if (hour >= SKY[i].h && hour < SKY[i + 1].h) {
      a = SKY[i]; b = SKY[i + 1];
      f = (hour - a.h) / (b.h - a.h);
      break;
    }
  }
  $('skyStop1').setAttribute('stop-color', lerpColor(a.c[0], b.c[0], f));
  $('skyStop2').setAttribute('stop-color', lerpColor(a.c[1], b.c[1], f));
  var night = hour >= 1 && hour < 8;
  document.body.classList.toggle('is-night', night);
  $('moon').setAttribute('opacity', (hour >= 20 || hour < 6) ? 0.9 : 0);
}
function lerpColor(c1, c2, f) {
  var p1 = parseInt(c1.slice(1), 16), p2 = parseInt(c2.slice(1), 16);
  var r = Math.round(((p1 >> 16) & 255) + (((p2 >> 16) & 255) - ((p1 >> 16) & 255)) * f);
  var g = Math.round(((p1 >> 8) & 255) + (((p2 >> 8) & 255) - ((p1 >> 8) & 255)) * f);
  var bl = Math.round((p1 & 255) + ((p2 & 255) - (p1 & 255)) * f);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}

/* ═══════════════ 12. 強健性（24/7） ═══════════════ */
document.addEventListener('visibilitychange', function () {
  if (!document.hidden && D) renderNow(true); // 復原時直接對齊決定性排程
});
// 每日 04:30 自癒 reload（時間旅行 / 展示模式不重載）
setInterval(function () {
  if (TIME_TRAVEL) return;
  var d = new Date();
  if (d.getHours() === 4 && d.getMinutes() === 30) {
    var key = 'tzg_live_reload';
    try {
      if (localStorage.getItem(key) !== ymd(Date.now())) {
        localStorage.setItem(key, ymd(Date.now()));
        location.reload();
      }
    } catch (e) { location.reload(); }
  }
}, 30e3);

/* ═══════════════ 13. 啟動 ═══════════════ */
buildBoxPool();
buildConfetti();
loadData();
loadMeta();
setInterval(function () { if (D) renderNow(false); }, DEMO ? 250 : 1000);
if (!DEMO) {
  setInterval(loadData, 10 * 60e3);
  setInterval(loadMeta, 30 * 60e3);
}

})();
