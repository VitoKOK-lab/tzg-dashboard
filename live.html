<!DOCTYPE html>
<!--
  ═══════════════════════════════════════════════════════════════
   TZG 即時儀表板 v2 —「水晶奇幻都市」3D 世界  live.html
  ═══════════════════════════════════════════════════════════════
   ▸ 純前端、零後端。Three.js 由 jsdelivr CDN 載入（importmap），
     所有幾何程序化生成，不用外部模型/貼圖。
   ▸ 唯讀 output/dashboard_latest.html 內嵌的 const D= JSON 與
     同源 /meta-dashboard/ 的 STATIC_DATA，不影響任何產生流程。
   ▸ 移除方式：
       1. 刪除本檔案（git rm live.html）
       2. 還原 index.html 中的三處新增：
          -「即時」tab、- f4 iframe、- urls 陣列最後一項
          （loaded 陣列改回 4 個 false）
   ▸ 測試參數：
       ?hour=20   時鐘跳到今天 20:00      ?time=2026-07-15T20:30
       ?demo=1    內建範例資料 + 60 倍速   ?lite=1  低階裝置模式
       ?debug=1   顯示 fps / draw calls HUD
  ═══════════════════════════════════════════════════════════════
-->

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #120b10;
  font-family: 'Montserrat', 'Noto Sans TC', 'PingFang TC', sans-serif;
  color: #F5EFE4;
}

#gl { position: fixed; inset: 0 0 52px 0; }
#gl canvas { display: block; }

/* ── HUD 覆蓋層（防烙印微漂移） ── */
#hud {
  position: fixed; inset: 0 0 52px 0;
  pointer-events: none; z-index: 5;
  animation: drift 90s ease-in-out infinite;
}
@keyframes drift {
  0%   { transform: translate(0px, 0px); }
  25%  { transform: translate(6px, -5px); }
  50%  { transform: translate(0px, -8px); }
  75%  { transform: translate(-6px, -4px); }
  100% { transform: translate(0px, 0px); }
}
#asOf {
  position: absolute; top: 14px; right: 20px;
  font-size: 13px; color: rgba(245,239,228,.62); letter-spacing: 1px;
  text-shadow: 0 1px 4px rgba(0,0,0,.6);
}
#stalePlaque {
  position: absolute; top: 40px; right: 20px;
  padding: 6px 14px; border-radius: 8px;
  background: rgba(214,158,46,.18); border: 1px solid rgba(230,180,70,.7);
  color: #e6b446; font-size: 13px;
  opacity: 0; transition: opacity 1s;
}
#stalePlaque.show { opacity: 1; }
#disclaimer {
  position: absolute; bottom: 10px; right: 20px;
  font-size: 11px; color: rgba(245,239,228,.4);
  text-shadow: 0 1px 3px rgba(0,0,0,.6);
}
#debugHud {
  position: absolute; top: 14px; left: 20px;
  font-size: 12px; font-family: monospace; color: #9fe89f;
  background: rgba(0,0,0,.5); padding: 6px 10px; border-radius: 6px;
  white-space: pre; display: none;
}

/* ── 底部跑馬燈（僅真實訂單） ── */
#ticker {
  position: fixed; left: 0; right: 0; bottom: 0; height: 52px;
  background: rgba(18,10,15,.9);
  border-top: 1px solid rgba(201,169,97,.4);
  display: flex; align-items: center; overflow: hidden;
  z-index: 6;
}
#tickerLabel {
  flex-shrink: 0; padding: 0 18px; height: 100%;
  display: flex; align-items: center;
  background: rgba(201,169,97,.12);
  border-right: 1px solid rgba(201,169,97,.35);
  color: #C9A961; font-size: 13px; font-weight: 700; letter-spacing: 2px;
  z-index: 1;
}
#tickerViewport { flex: 1; overflow: hidden; }
#tickerTrack {
  display: inline-flex; white-space: nowrap; width: max-content;
  will-change: transform;
  animation: tickmove var(--tickDur, 60s) linear infinite;
}
@keyframes tickmove { to { transform: translateX(-50%); } }
.tick-item { padding: 0 34px; font-size: 14px; color: #e9dfcc; }
.tick-item .amt { color: #C9A961; font-weight: 600; }
.tick-item .sep { color: rgba(212,69,106,.8); padding: 0 10px; }

/* ── 覆蓋層 ── */
.overlay {
  position: fixed; inset: 0; z-index: 20;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
  background: #120b10; text-align: center; padding: 24px;
}
.overlay.hidden { display: none; }
.spinner {
  width: 34px; height: 34px; border-radius: 50%;
  border: 2px solid rgba(201,169,97,.25); border-top-color: #C9A961;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.overlay h2 { font-size: 17px; font-weight: 500; color: #F5EFE4; letter-spacing: 1px; }
.overlay p  { font-size: 13px; color: rgba(245,239,228,.55); line-height: 1.9; }
.fbNums { display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
.fbNums div { font-size: 16px; color: rgba(245,239,228,.7); }
.fbNums b { font-family: 'Cormorant Garamond', serif; font-size: 34px; color: #C9A961; margin-left: 12px; }

// 看門狗（非 module）：CDN 載入失敗導致整個 module 無法執行時，給出友善訊息並定時重試
setTimeout(function () {
  if (!window.__world) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    var fb = document.getElementById('glFallback');
    fb.querySelector('h2').textContent = '3D 引擎載入失敗';
    fb.querySelector('p').textContent = '需可連線 cdn.jsdelivr.net。兩分鐘後自動重試…';
    fb.classList.remove('hidden');
    setTimeout(function () { location.reload(); }, 120000);
  }
}, 20000);
</script>

<script type="module">
import * as THREE from 'three';
import { mergeGeometries } from 'three/addons/utils/BufferGeometryUtils.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ═══════════════ 0. 時鐘（支援時間旅行 / 展示加速） ═══════════════ */
var q = new URLSearchParams(location.search);
var DEMO = q.has('demo');
var LITE = q.has('lite');
var DEBUG = q.has('debug');
var SPEED = DEMO ? 60 : 1;
var TIME_TRAVEL = DEMO || q.has('hour') || q.has('time');
var bootReal = Date.now();
var bootVirtual = (function () {
  if (q.get('time')) { var t = new Date(q.get('time')).getTime(); if (!isNaN(t)) return t; }
  if (q.get('hour') !== null && q.get('hour') !== undefined && q.get('hour') !== '') {
    var d = new Date(); d.setHours(+q.get('hour') || 0, 0, 0, 0); return d.getTime();
  }
  if (DEMO) { var d2 = new Date(); d2.setHours(7, 30, 0, 0); return d2.getTime(); }
  return bootReal;
})();
function now() { return bootVirtual + (Date.now() - bootReal) * SPEED; }
function startOfDay(t) { var d = new Date(t); d.setHours(0, 0, 0, 0); return d.getTime(); }
function ymd(t) { var d = new Date(t); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

/* ═══════════════ 1. 小工具 ═══════════════ */
function $(id) { return document.getElementById(id); }
function fmt(n) { return 'NT$ ' + Math.round(n).toLocaleString('en-US'); }
function fmtCompact(n) {
  n = Math.round(n);
  return n >= 10000 ? (n / 10000).toFixed(1).replace(/\.0$/, '') + '萬' : n.toLocaleString('en-US');
}
function clamp(v, lo, hi) { return Math.min(hi, Math.max(lo, v)); }
function hashStr(s) { var h = 2166136261; for (var i = 0; i < s.length; i++) { h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); } return h >>> 0; }
function mulberry32(seed) {
  var a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    var t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function gauss(rng) {
  var u = Math.max(rng(), 1e-9), v = Math.max(rng(), 1e-9);
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
}
var CJK_NAME = /^[一-鿿]{2,4}$/;
function agentDisplayName(full) {
  var segs = String(full || '').split('/').map(function (s) { return s.trim(); }).filter(Boolean);
  if (segs.length >= 2 && CJK_NAME.test(segs[1])) return segs[1];
  for (var i = 1; i < segs.length; i++) if (CJK_NAME.test(segs[i])) return segs[i];
  return segs[0] || '同仁';
}
function shortProduct(p) {
  var first = String(p || '').split(/[\/｜|]/)[0].trim();
  return first.length > 13 ? first.slice(0, 12) + '…' : (first || '珠寶訂單');
}
function easeInOut(k) { return k < 0.5 ? 4 * k * k * k : 1 - Math.pow(-2 * k + 2, 3) / 2; }
function lerpColor(c1, c2, f) {
  var p1 = parseInt(c1.slice(1), 16), p2 = parseInt(c2.slice(1), 16);
  var r = Math.round(((p1 >> 16) & 255) + (((p2 >> 16) & 255) - ((p1 >> 16) & 255)) * f);
  var g = Math.round(((p1 >> 8) & 255) + (((p2 >> 8) & 255) - ((p1 >> 8) & 255)) * f);
  var bl = Math.round((p1 & 255) + ((p2 & 255) - (p1 & 255)) * f);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}

/* ═══════════════ 2. 展示模式範例資料 ═══════════════ */
var DEMO_D = {
  target: 4500000,
  meta: { report_month: '示範月份', data_as_of: '（展示模式）', data_as_of_iso: ymd(now() - 864e5) + 'T23:30:00', days_elapsed: 16, days_total: 31, timezone: 'UTC+08:00' },
  kpi: { rev_mtd: 2318400, orders_mtd: 497, avg_order: 4665, median_order: 1680, new_customers: 213, returning: 96 },
  yesterday: { rev: 152300, orders: 31, agents: [
    { name: '客服跟單/曉彤/深圳', orders: 12, rev: 66300, rank: 1 },
    { name: '中控/佳穎/深圳', orders: 9, rev: 45100, rank: 2 },
    { name: '店務客服/志明/彰化', orders: 6, rev: 28400, rank: 3 },
    { name: '客服/雅婷/台北', orders: 4, rev: 12500, rank: 4 }
  ]},
  agents: [],
  last_7_days: { daily_target: 150000, data: [
    { date: '07/10', rev: 142000, orders: 30, is_today: false },
    { date: '07/11', rev: 168000, orders: 36, is_today: false },
    { date: '07/12', rev: 131000, orders: 27, is_today: false },
    { date: '07/13', rev: 176500, orders: 39, is_today: false },
    { date: '07/14', rev: 149800, orders: 33, is_today: false },
    { date: '07/15', rev: 152300, orders: 31, is_today: false }
  ]},
  hour_dist: [1,1,0,0,0,0,1,2,4,6,8,9,10,12,14,15,16,18,20,26,28,24,18,8].map(function (n, h) { return { hour: h, orders: n }; }),
  prod_qty: [
    { name: '天然海藍寶裸石' }, { name: '925銀戒指 鴿子蛋粉水晶' }, { name: '坦桑石手鍊' },
    { name: '幽靈水晶｜豼貅' }, { name: '太陽之石｜奧勒岡太陽石' }, { name: '碧璽裸石' }
  ],
  customers: [
    { time: '21:18', customer: '徐O雯', products: '坦桑石手鍊', amount: 8223 },
    { time: '20:42', customer: '林O徵', products: '925銀戒指 鴿子蛋粉水晶戒指', amount: 14563 },
    { time: '19:05', customer: '戴O吟', products: 'Loggon碧璽裸石', amount: 1560 },
    { time: '17:56', customer: '丁O芬', products: '太陽之石｜奧勒岡太陽石', amount: 3174 },
    { time: '15:24', customer: 'cO6', products: '定制鉑金戒指', amount: 45063 }
  ].map(function (c) { return { time: ymd(now()) + ' ' + c.time + ':00', customer: c.customer, products: c.products, amount: c.amount }; })
};

/* ═══════════════ 3. 資料層 ═══════════════ */
var LS_KEY = 'tzg_live_D';
var D = null;
var retryDelay = 60e3;
var retryTimer = null;

function extractD(html) {
  var i = html.indexOf('const D=');
  if (i < 0) throw new Error('no const D');
  var j = html.indexOf('\n', i);
  if (j < 0) j = html.length;
  var raw = html.slice(i + 8, j).trim().replace(/;$/, '');
  return JSON.parse(raw);
}

function applyData(newD, fromCache) {
  var changed = !D || !D.meta || D.meta.data_as_of_iso !== newD.meta.data_as_of_iso;
  D = newD;
  if (changed) {
    buildStaff();
    buildTicker();
    buildSim();
    renderStatic();
    renderNow(true);
  }
  $('loadingOverlay').classList.add('hidden');
  $('errorOverlay').classList.add('hidden');
  updateStalePlaque(fromCache ? '⚠ 資料更新失敗，顯示 ' + (D.meta.data_as_of || '快取') + ' 資料' : null);
}

function updateStalePlaque(forcedMsg) {
  var el = $('stalePlaque'), txt = $('staleText');
  if (forcedMsg) { txt.textContent = forcedMsg; el.classList.add('show'); return; }
  if (D && D.meta && D.meta.data_as_of_iso && !DEMO) {
    var ageH = (now() - new Date(D.meta.data_as_of_iso).getTime()) / 36e5;
    if (ageH > 36) { txt.textContent = '⚠ 資料已 ' + Math.round(ageH) + ' 小時未更新'; el.classList.add('show'); return; }
  }
  el.classList.remove('show');
}

function loadData() {
  if (DEMO) { applyData(DEMO_D, false); return; }
  fetch('output/dashboard_latest.html?_live=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function (html) {
      var d = extractD(html);
      retryDelay = 60e3;
      try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch (e) {}
      applyData(d, false);
    })
    .catch(function () {
      if (D) { updateStalePlaque('⚠ 資料更新失敗，顯示 ' + (D.meta.data_as_of || '快取') + ' 資料'); }
      else {
        var cached = null;
        try { cached = JSON.parse(localStorage.getItem(LS_KEY)); } catch (e) {}
        if (cached && cached.meta) applyData(cached, true);
        else { $('loadingOverlay').classList.add('hidden'); $('errorOverlay').classList.remove('hidden'); }
      }
      clearTimeout(retryTimer);
      retryTimer = setTimeout(loadData, retryDelay);
      retryDelay = Math.min(retryDelay * 2, 300e3);
    });
}

function renderStatic() {
  var m = D.meta || {};
  $('asOf').textContent = '資料截至 ' + (m.data_as_of || '—') + (m.data_as_of_iso ? ' ' + String(m.data_as_of_iso).slice(11, 16) : '');
  updateStalePlaque(null);
  world.monthMeta = {
    month: m.report_month || '', dayX: m.days_elapsed || 0, dayY: m.days_total || 0,
    target: D.target || 0
  };
  paintMonth();
}

function buildTicker() {
  var track = $('tickerTrack');
  var rows = (D.customers || []).slice().sort(function (a, b) { return String(b.time).localeCompare(String(a.time)); }).slice(0, 14);
  var html = rows.map(function (c) {
    var t = String(c.time || '').slice(11, 16);
    return '<span class="tick-item">' + (t ? t + '　' : '') + (c.customer || '') +
      '<span class="sep">✦</span>' + shortProduct(c.products) +
      '<span class="sep">✦</span><span class="amt">' + fmt(c.amount || 0) + '</span></span>';
  }).join('');
  if (!html) html = '<span class="tick-item">尚無近期訂單資料</span>';
  track.innerHTML = html + html;
  var len = track.textContent.length;
  track.style.setProperty('--tickDur', clamp(len * 0.28, 30, 150) + 's');
}

/* ═══════════════ 3b. 短影音（Meta）成效 ═══════════════ */
function aggMeta(S) {
  var cutoff = ymd(now() - 7 * 864e5);
  var plays = 0, engage = 0, fans = 0, count = 0;
  (S.videos || []).forEach(function (v) {
    if ((v.created_date || '') >= cutoff) {
      count++;
      plays += v.plays || 0;
      engage += (v.likes || 0) + (v.comments || 0) + (v.shares || 0) + (v.saved || 0);
      fans += v.newFollowers || 0;
    }
  });
  return { plays: plays, engage: engage, fans: fans, count: count };
}
function renderMeta(a) {
  world.metaData = a;
  // 短影音流量 → 參觀人潮：每 10 萬次播放 ≈ 每分鐘 1 位訪客（1–8 上限）
  visitorRate = clamp(a.plays / 100000, 1, 8);
  paintJumbo();
}
function loadMeta() {
  if (DEMO) { renderMeta({ plays: 567366, engage: 7180, fans: 445, count: 77 }); return; }
  fetch('/meta-dashboard/?_live=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function (html) {
      var i = html.indexOf('const STATIC_DATA =');
      if (i < 0) throw new Error('no STATIC_DATA');
      var j = html.indexOf('\n', i);
      if (j < 0) j = html.length;
      var S = JSON.parse(html.slice(i + 19, j).trim().replace(/;$/, ''));
      renderMeta(aggMeta(S));
    })
    .catch(function () { /* 巨幕維持前次內容 */ });
}

/* ═══════════════ 4. 模擬引擎（決定性） ═══════════════ */
var sim = { events: [], dayStart: 0, simStartMs: 0, realTodayRev: 0, realTodayOrders: 0, dailyTarget: 150000 };
var lastTickMs = -1;
var prevPct = null;
var firedMilestones = {};
var workerList = [];

function hourCurve() {
  var counts = new Array(24).fill(0);
  (D.hour_dist || []).forEach(function (h) { if (h && h.hour >= 0 && h.hour < 24) counts[h.hour] = +h.orders || 0; });
  var total = counts.reduce(function (a, b) { return a + b; }, 0);
  var prior = [1,1,.4,.3,.3,.4,.8,1.5,2.5,3.5,4.5,5,5.5,6,6.5,7,7.5,8.5,9.5,11,11.5,11,8,4];
  var pTotal = prior.reduce(function (a, b) { return a + b; }, 0);
  var w = [], sum = 0;
  for (var h = 0; h < 24; h++) {
    var real = total > 0 ? counts[h] / total : 0;
    if (total > 0) {
      var l = counts[(h + 23) % 24] / total, r = counts[(h + 1) % 24] / total;
      real = (l + 2 * real + r) / 4;
    }
    var blend = total >= 100 ? 0.8 * real + 0.2 * (prior[h] / pTotal)
                             : 0.5 * real + 0.5 * (prior[h] / pTotal);
    blend += 0.002;
    w.push(blend); sum += blend;
  }
  return w.map(function (x) { return x / sum; });
}

function buildSim() {
  var t = now();
  sim.dayStart = startOfDay(t);
  var seed = hashStr(ymd(t) + '|' + (D.meta.data_as_of_iso || ''));
  var rng = mulberry32(seed);
  var w = hourCurve();

  var dt = (D.last_7_days && D.last_7_days.daily_target) || 150000;
  sim.dailyTarget = dt;
  var fullDays = ((D.last_7_days && D.last_7_days.data) || []).filter(function (d) { return !d.is_today && d.rev > 0; });
  var estDaily = fullDays.length ? fullDays.reduce(function (a, d) { return a + d.rev; }, 0) / fullDays.length : dt;
  estDaily = clamp(estDaily, 0.4 * dt, 1.6 * dt);

function drawTextCanvas(c, text, st) {
  var g = c.getContext('2d');
  g.clearRect(0, 0, c.width, c.height);
  g.font = st.font;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  if (st.bg) {
    g.fillStyle = st.bg;
    roundRect(g, 4, 4, c.width - 8, c.height - 8, 18);
    g.fill();
    if (st.border) { g.strokeStyle = st.border; g.lineWidth = 4; roundRect(g, 4, 4, c.width - 8, c.height - 8, 18); g.stroke(); }
  }
  g.fillStyle = st.fg;
  g.fillText(text, c.width / 2, c.height / 2 + 2);
}
function roundRect(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x + r, y); g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath();
}
function makeLabel(text, styleKey) {
  var key = styleKey + '|' + text;

  if (hit) {
    hit.lastUse = et;
    var sp0 = new THREE.Sprite(new THREE.SpriteMaterial({ map: hit.tex, transparent: true, depthWrite: false }));
    sp0.scale.set(hit.aspect * TEXT_STYLES[styleKey].h, TEXT_STYLES[styleKey].h, 1);
    return sp0;
  }
  var st = TEXT_STYLES[styleKey];
  var probe = document.createElement('canvas').getContext('2d');
  probe.font = st.font;
  var w = Math.min(512, Math.ceil(probe.measureText(text).width) + st.pad * 2);
  var c = document.createElement('canvas');
  c.width = Math.max(64, w); c.height = 96;
  drawTextCanvas(c, text, st);
  var tex = canvasTex(c);
  var entry = { tex: tex, aspect: c.width / c.height, lastUse: et };
  labelCache.set(key, entry);
  if (labelCache.size > LABEL_LRU) { // 汰換最舊
    var oldest = null, oldestKey = null;
    labelCache.forEach(function (v, k) { if (!oldest || v.lastUse < oldest.lastUse) { oldest = v; oldestKey = k; } });
    if (oldestKey) { oldest.tex.dispose(); labelCache.delete(oldestKey); }
  }
  var sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
  sp.scale.set(entry.aspect * st.h, st.h, 1);
  return sp;
}

  }));

  // 光軌飛珠（宮殿→塔→巨幕環線）
  var orbRail = closedCurve([[0, 8, -8], [-14, 10, 2], [-18, 14, 8], [-6, 12, 16], [13, 6, 10], [24, 10, -8], [30, 13, -22], [16, 15, -18]]);
  var orbN = LITE ? 6 : 12, tail = 7;
  var opos = new Float32Array(orbN * tail * 3), ocol = new Float32Array(orbN * tail * 3);
  orbData = { rail: orbRail, n: orbN, tail: tail, us: [] };
  for (var o = 0; o < orbN; o++) {
    orbData.us.push(o / orbN);
    for (var t2 = 0; t2 < tail; t2++) {
      var fade = 1 - t2 / tail;
      var oc = o % 2 ? new THREE.Color(0xC9A961) : new THREE.Color(0xE88CA3);
      ocol[(o * tail + t2) * 3] = oc.r * fade;
      ocol[(o * tail + t2) * 3 + 1] = oc.g * fade;
      ocol[(o * tail + t2) * 3 + 2] = oc.b * fade;
    }
  }
  var og = new THREE.BufferGeometry();
  og.setAttribute('position', new THREE.BufferAttribute(opos, 3).setUsage(THREE.DynamicDrawUsage));
  og.setAttribute('color', new THREE.BufferAttribute(ocol, 3));
  orbPts = new THREE.Points(og, new THREE.PointsMaterial({
    size: 0.8, vertexColors: true, transparent: true,
    map: glowTexture('rgba(255,255,255,1)'), blending: THREE.AdditiveBlending, depthWrite: false
  }));
  scene.add(orbPts);
}

function burstCoins(x, y, z, n) {
  var used = 0;
  for (var i = 0; i < coinData.length && used < n; i++) {
    var cd = coinData[i];
    if (cd.active) continue;
    cd.active = true;
    cd.p.set(x, y, z);
    var a = Math.random() * Math.PI * 2, r = 1 + Math.random() * 2.5;
    cd.v.set(Math.cos(a) * r, 5 + Math.random() * 3.5, Math.sin(a) * r);
    cd.w = (Math.random() - 0.5) * 14;
    used++;
  }
}
function firework(x, y, z, hex) {
  var used = 0;
  _c2.set(hex);
  for (var i = 0; i < fwData.length && used < 80; i++) {
    var fd = fwData[i];
    if (fd.active) continue;
    fd.active = true; fd.life = 1.9;
    fd.p.set(x, y, z);
    var th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    var sp2 = 6 + Math.random() * 4;
    fd.v.set(Math.sin(ph) * Math.cos(th) * sp2, Math.cos(ph) * sp2, Math.sin(ph) * Math.sin(th) * sp2);
    fwColAttr.setXYZ(i, _c2.r, _c2.g, _c2.b);
    used++;
  }
}
function launchBalloon(x, y, z) {
  for (var b = 8; b < 12; b++) {
    if (!balloonData[b].active && balloonData[b].kind === 'launch') {
      balloonData[b].active = true;
      balloonData[b].x = x; balloonData[b].y = y + 2.8; balloonData[b].z = z;
      balloonData[b].t = 0;
      return;
    }
  }
}

function updateParticles(dt) {
  // 閃粉
  var pa = sparklePts.geometry.attributes.position;
  for (var i = 0; i < sparkleData.length; i++) {
    var sd = sparkleData[i];
    sd.y += sd.v * dt;
    if (sd.y > 25) sd.y = 0;
    pa.setXYZ(i, sd.x + Math.sin(et * 0.7 + sd.w) * 1.2, sd.y, sd.z + Math.cos(et * 0.5 + sd.w) * 1.2);
  }
  pa.needsUpdate = true;

  // 金幣
  var anyCoin = false;
  for (var c7 = 0; c7 < coinData.length; c7++) {
    var cd = coinData[c7];
    if (!cd.active) continue;
    anyCoin = true;
    cd.v.y -= 14 * dt;
    cd.p.addScaledVector(cd.v, dt);
    if (cd.p.y < 0.1) {
      cd.active = false;
      _m.compose(_v.set(0, -99, 0), _q.identity(), _s.set(0.001, 0.001, 0.001));
    } else {
      _e.set(et * cd.w, 0, et * cd.w * 0.7); _q.setFromEuler(_e);
      _m.compose(cd.p, _q, _s.set(1, 1, 1));
    }
    coinInst.setMatrixAt(c7, _m);
  }
  if (anyCoin) coinInst.instanceMatrix.needsUpdate = true;

  // 煙火
  var anyFw = false;
  for (var f4 = 0; f4 < fwData.length; f4++) {
    var fd = fwData[f4];
    if (!fd.active) continue;
    anyFw = true;
    fd.life -= dt;
    if (fd.life <= 0) { fd.active = false; fwGeoAttr.setY(f4, -999); continue; }
    fd.v.y -= 3 * dt;
    fd.p.addScaledVector(fd.v, dt);
    fwGeoAttr.setXYZ(f4, fd.p.x, fd.p.y, fd.p.z);
    var fade = clamp(fd.life / 1.9, 0, 1);
    fwColAttr.setXYZ(f4, fwColAttr.getX(f4) * (0.97), fwColAttr.getY(f4) * 0.97, fwColAttr.getZ(f4) * 0.97);
  }
  if (anyFw) { fwGeoAttr.needsUpdate = true; fwColAttr.needsUpdate = true; }

  // 光軌
  var oa = orbPts.geometry.attributes.position;
  for (var o2 = 0; o2 < orbData.n; o2++) {
    orbData.us[o2] = (orbData.us[o2] + dt * 0.035) % 1;
    for (var t3 = 0; t3 < orbData.tail; t3++) {
      var u2 = (orbData.us[o2] - t3 * 0.008 + 1) % 1;
      orbData.rail.getPointAt(u2, _v);
      oa.setXYZ(o2 * orbData.tail + t3, _v.x, _v.y, _v.z);
    }
  }
  oa.needsUpdate = true;

  // 氣球
  for (var b2 = 0; b2 < 12; b2++) {
    var bd2 = balloonData[b2];
    if (bd2.kind === 'drift') {
      bd2.x += bd2.vx * dt;
      if (bd2.x > 60) bd2.x = -60;
      _v.set(bd2.x, bd2.y + Math.sin(et * 0.5 + bd2.ph) * 1.4, bd2.z);
      _e.set(0, 0, 0.06 * Math.sin(et * 0.7 + bd2.ph)); _q.setFromEuler(_e);
      _m.compose(_v, _q, _s.set(1, 1, 1));
    } else if (bd2.active) {
      bd2.t += dt;
      bd2.y += 3 * dt;
      var sway = Math.sin(bd2.t * 2.2) * 0.4;
      if (bd2.y > 30) { bd2.active = false; _m.compose(_v.set(0, -99, 0), _q.identity(), _s.set(0.001, 0.001, 0.001)); }
      else {
        _e.set(0, 0, 0.1 * Math.sin(bd2.t * 2)); _q.setFromEuler(_e);
        _m.compose(_v.set(bd2.x + sway, bd2.y, bd2.z), _q, _s.set(1, 1, 1));
      }
    } else {
      _m.compose(_v.set(0, -99, 0), _q.identity(), _s.set(0.001, 0.001, 0.001));
    }
    balloonInst.setMatrixAt(b2, _m);
  }
  balloonInst.instanceMatrix.needsUpdate = true;

  // 鳥 / 蝴蝶
  if (birdInst) {
    for (var bd3 = 0; bd3 < birdData.length; bd3++) {
      var B = birdData[bd3];
      var ba = et * B.sp + B.ph;
      var flap = 0.5 + 0.5 * Math.abs(Math.sin(et * 7 + B.ph));
      _e.set(0, -ba - Math.PI / 2, 0); _q.setFromEuler(_e);
      _m.compose(_v.set(Math.cos(ba) * B.r, B.y + Math.sin(et * 1.2 + B.ph) * 1.2, Math.sin(ba) * B.r), _q, _s.set(1, flap, 1));
      birdInst.setMatrixAt(bd3, _m);
    }
    birdInst.instanceMatrix.needsUpdate = true;
    for (var bf2 = 0; bf2 < bflyData.length; bf2++) {
      var F = bflyData[bf2];
      var flap2 = 0.4 + 0.6 * Math.abs(Math.sin(et * 11 + F.ph));
      _q.setFromAxisAngle(UP, et * 0.8 + F.ph);
      _m.compose(_v.set(F.cx + Math.sin(et * F.s1 + F.ph) * 2.4, 1.2 + Math.sin(et * F.s2 * 2 + F.ph) * 0.7, F.cz + Math.cos(et * F.s2 + F.ph) * 2.4), _q, _s.set(0.32, 0.32 * flap2, 0.32));
      bflyInst.setMatrixAt(bf2, _m);
    }
    bflyInst.instanceMatrix.needsUpdate = true;
  }

  // 兔子：繞著家附近蹦跳，偶爾坐下休息
  if (bunnyInst) {
    for (var bn2 = 0; bn2 < bunnyData.length; bn2++) {
      var BY = bunnyData[bn2];
      var go = Math.sin(et * 0.35 + BY.ph) > -0.25;
      if (go) BY.a += dt * BY.sp;
      var bx = BY.x + Math.cos(BY.a) * BY.r;
      var bz = BY.z + Math.sin(BY.a) * BY.r;
      var hop = go ? Math.max(0, Math.sin(et * 5 + BY.ph)) * 0.32 : 0;
      _q.setFromAxisAngle(UP, -BY.a);
      _m.compose(_v.set(bx, 0.6 + hop, bz), _q, _s.set(1, 1, 1));
      bunnyInst.setMatrixAt(bn2, _m);
    }
    bunnyInst.instanceMatrix.needsUpdate = true;
  }

  // 飛船
  for (var a3 = 0; a3 < airships.length; a3++) {
    var sh = airships[a3];
    var u3 = ((et / sh.userData.period) + sh.userData.ph) % 1;
    sh.userData.route.getPointAt(u3, sh.position);
    sh.userData.route.getTangentAt(u3, _v2);
    sh.rotation.y = Math.atan2(_v2.x, _v2.z) - Math.PI / 2;
    sh.userData.prop.rotation.x = et * 12;
  }

  // 禮盒上架動畫
  for (var da = dockAnims.length - 1; da >= 0; da--) {
    var an = dockAnims[da];
    an.t += dt * 2.4;
    var k2 = Math.min(an.t, 1);
    var pop = k2 < 0.7 ? (0.4 + 0.9 * (k2 / 0.7)) : (1.3 - 0.3 * ((k2 - 0.7) / 0.3));
    var slot = dockSlotPos(an.idx);
    _m.compose(_v.set(slot.x, slot.y, slot.z), _q.identity(), _s.set(pop, pop, pop));
    dockBoxes.setMatrixAt(an.idx, _m);
    dockBoxes.instanceMatrix.needsUpdate = true;
    if (k2 >= 1) dockAnims.splice(da, 1);
  }

  // 彈窗
  for (var pp = 0; pp < popupPool.length; pp++) {
    var P2 = popupPool[pp];
    if (!P2.active) continue;
    P2.t += dt;
    P2.sprite.position.y += dt * 1.1;
    P2.sprite.material.opacity = clamp(1 - P2.t / P2.dur, 0, 1);
    if (P2.t >= P2.dur) { P2.active = false; P2.sprite.visible = false; }
  }

  // 門脈衝
  if (doorPulseT < 2) {
    doorPulseT += dt;
    doorMat.opacity = 0.35 + 0.5 * Math.abs(Math.sin(doorPulseT * 9));
  } else if (doorMat.opacity !== doorBaseOpacity) {
    doorMat.opacity = doorBaseOpacity;
  }

  // 瀑布
  if (!LITE) for (var wf2 = 0; wf2 < waterfallTexs.length; wf2++) waterfallTexs[wf2].offset.y -= dt * 0.55;

  // 品牌水晶
  brandCrystal.rotation.y += dt * 0.15;
  brandCrystal.position.y = 21 + Math.sin(et * 0.9) * 0.5;
  brandCore.rotation.y -= dt * 0.3;

  // 看板漂浮 + 面向鏡頭
  for (var bb2 = 0; bb2 < billboards.length; bb2++) {
    var B2 = billboards[bb2];
    B2.group.position.y += Math.sin(et * 0.8 + B2.bobPhase) * dt * 0.25;
    B2.group.lookAt(camera.position);
  }
  // 巨幕小島浮動
  screenIslandGroup.position.y = 9 + Math.sin(et * 0.55) * 0.6;
  // EQ 條重繪（2Hz）
  jumboEqT += dt;
  if (world.metaData && jumboEqT - (paintJumbo._last || 0) > 0.5) { paintJumbo._last = jumboEqT; paintJumbo(); }
}

/* ═══════════════ 11. 事件編排 ═══════════════ */
var doorPulseT = 99, doorBaseOpacity = 0.35;
var workingTimers = [];
var evToggle = false;
function fireEvent(ev) {
  if (!world.ok) return;
  var wk = workerList[ev.worker];
  var tScale = DEMO ? 4 : 1;
  doorPulseT = 0;
  if (wk) {
    var npc = npcs[wk.npcSlot];
    npc.jumpT = 0;
    popupAt(npc.pos.x, npc.pos.y + 2.6, npc.pos.z, '新訂單 ✦ ' + ev.product, fmt(ev.amount));
  }
  // 交替演出：快遞氣球出貨 ↔ 礦工快送寶石進宮賣錢
  evToggle = !evToggle;
  var expressMiner = null;
  if (!evToggle) {
    for (var m3 = MINER_BASE; m3 < MINER_BASE + 3; m3++) {
      if (npcs[m3].mine && npcs[m3].mine.phase === 'dig' && !npcs[m3].mine.express && npcs[m3].targetScale > 0) {
        expressMiner = npcs[m3];
        break;
      }
    }
  }
  if (expressMiner) {
    expressMiner.mine.express = ev; // 立即帶著發光寶石出發，抵達宮殿時 +NT$ + 金幣
  } else {
    // 快遞員：門口 → 發射台
    workingTimers.push(setTimeout(function () {
      for (var c8 = COURIER_BASE; c8 < COURIER_BASE + 3; c8++) {
        if (npcs[c8].courierT === undefined && npcs[c8].targetScale === 0) {
          npcs[c8].courierT = 0;
          npcs[c8].courierDur = 5 / tScale;
          npcs[c8].targetScale = 1;
          npcs[c8].scale = 0.6;
          break;
        }
      }
    }, 800 / tScale));
    // 到達發射台：氣球升空 + 金幣 + 飄字 + 禮盒上架
    workingTimers.push(setTimeout(function () {
      launchBalloon(13, 0.4, 10);
      burstCoins(13, 1.2, 10, 24);
      popupAt(13, 4.2, 10, '+' + fmt(ev.amount), null);
      world.setBoxCount(Math.min(dockShown + 1, 12));
    }, 6000 / tScale));
  }
  if (workingTimers.length > 60) workingTimers.splice(0, 30);
  requestFly('order');
}

var bannerSprite = null, bannerTimer = null;
function celebrate(text) {
  if (!world.ok) return;
  if (bannerSprite) { scene.remove(bannerSprite); bannerSprite.material.dispose(); bannerSprite = null; }
  bannerSprite = makeLabel(text, 'banner');
  bannerSprite.position.set(0, 14, -2);
  bannerSprite.scale.multiplyScalar(2.4);
  scene.add(bannerSprite);
  var isMilestone = text.indexOf('%') >= 0;
  var bursts = isMilestone ? 8 : 3;
  var cols = [0xE88CA3, 0xC9A961, 0xF5EFE4, 0xD4456A];
  for (var b3 = 0; b3 < bursts; b3++) {
    (function (bi) {
      workingTimers.push(setTimeout(function () {
        firework((Math.random() - 0.5) * 30, 24 + Math.random() * 8, -14 + (Math.random() - 0.5) * 16, cols[bi % 4]);
      }, bi * 700));
    })(b3);
  }
  burstCoins(0, 6, -2, 40);
  workerList.forEach(function (wk) { npcs[wk.npcSlot].jumpT = 0; });
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(function () {
    if (bannerSprite) { scene.remove(bannerSprite); bannerSprite.material.dispose(); bannerSprite = null; }
  }, 5200);
  requestFly(isMilestone ? 'milestone' : 'daily');
}

var SHOTS = [
  { name: 'orbitWide', dur: 50, pose: function (k, out) {
      var th = camCycleTheta + k * Math.PI;
      out.pos.set(Math.cos(th) * 66, 30, Math.sin(th) * 66);
      out.look.set(0, 7, 0);
  }},
  { name: 'streetDolly', dur: 45, pose: function (k, out) {
      var u = k * 0.55;
      PATHS.length ? PATHS[1].getPointAt(u, out.pos) : out.pos.set(0, 3, 20);
      out.pos.y += 2.1;
      PATHS.length && PATHS[1].getPointAt((u + 0.06) % 1, out.look);
      out.look.y += 1.4;
  }},
  { name: 'shopCloseup', dur: 35, pose: function (k, out) {
      out.pos.set(17 - k * 7, 7.5 - k * 2.5, 22 - k * 8);
      out.look.set(0, 3 - k * 0.6, -4);
  }},
  { name: 'jumboPass', dur: 30, pose: function (k, out) {
      out.pos.set(8 + k * 8, 13 - k * 1.5, 6 - k * 10);
      out.look.set(30, 11, -22);
  }},
  { name: 'towerRise', dur: 35, pose: function (k, out) {
      var e2 = k * k * (3 - 2 * k);
      out.pos.set(-28 + e2 * 2, 2 + e2 * 19, 16 - e2 * 4);
      out.look.set(-18, 3 + e2 * 16, 8);
  }},
  { name: 'crystalHalo', dur: 30, pose: function (k, out) {
      var th = k * Math.PI * 1.5;
      out.pos.set(Math.cos(th) * 15, 25, -8 + Math.sin(th) * 15);
      out.look.set(0, 21, -8);
  }}
];
var CAM_TOTAL = SHOTS.reduce(function (a, s) { return a + s.dur; }, 0);
var camCycleTheta = 0;
var poseA = { pos: new THREE.Vector3(), look: new THREE.Vector3() };
var poseB = { pos: new THREE.Vector3(), look: new THREE.Vector3() };
var camLook = new THREE.Vector3(0, 7, 0);
var fly = { mode: 'auto', t: 0, from: { pos: new THREE.Vector3(), look: new THREE.Vector3() }, target: { pos: new THREE.Vector3(), look: new THREE.Vector3() }, lastOrder: -999, lastCele: -999 };
var FLY_SHOTS = {
  order:     { pos: [11, 4.5, 9],  look: [4, 1.5, -1], hold: 7 },
  daily:     { pos: [14, 10, 16],  look: [0, 8, -6],   hold: 8 },
  milestone: { pos: [-27, 8, 18],  look: [-18, 12, 8], hold: 8 }
};
function requestFly(kind) {
  var nowS = et;
  if (fly.mode !== 'auto') return;
  if (kind === 'order' && nowS - fly.lastOrder < 45) return;
  if (kind !== 'order' && nowS - fly.lastCele < 20) return;
  if (kind === 'order') fly.lastOrder = nowS; else fly.lastCele = nowS;
  var fs = FLY_SHOTS[kind];
  fly.mode = 'flyin'; fly.t = 0;
  fly.from.pos.copy(camera.position);
  fly.from.look.copy(camLook);
  fly.target.pos.set(fs.pos[0], fs.pos[1], fs.pos[2]);
  fly.target.look.set(fs.look[0], fs.look[1], fs.look[2]);
  fly.hold = fs.hold;
}
function schedulePose(tSec, out) {
  var cyc = tSec % CAM_TOTAL;
  camCycleTheta = Math.floor(tSec / CAM_TOTAL) * 2.399;
  var acc = 0, idx = 0, lt = 0;
  for (var i = 0; i < SHOTS.length; i++) {
    if (cyc < acc + SHOTS[i].dur) { idx = i; lt = cyc - acc; break; }
    acc += SHOTS[i].dur;
  }
  var shot = SHOTS[idx];
  shot.pose(lt / shot.dur, out);
  var TR = 3;
  if (lt < TR) {
    var prev = SHOTS[(idx - 1 + SHOTS.length) % SHOTS.length];
    prev.pose(1, poseB);
    var e2 = easeInOut(lt / TR);
    out.pos.lerpVectors(poseB.pos, out.pos, e2);
    out.look.lerpVectors(poseB.look, out.look, e2);
  }
}
var FORCE_SHOT = q.get('shot'); // 測試用：?shot=0..5&k=0.5 固定鏡位
function updateCamera(dt) {
  if (FORCE_SHOT !== null && FORCE_SHOT !== '') {
    SHOTS[clamp(+FORCE_SHOT | 0, 0, SHOTS.length - 1)].pose(clamp(+(q.get('k') || 0.5), 0, 1), poseA);
    camera.position.copy(poseA.pos);
    camLook.copy(poseA.look);
    camera.lookAt(camLook);
    return;
  }
  var tSec = Date.now() / 1000; // 真實時間 → 重載後鏡位一致，且 DEMO 不會亂飛
  schedulePose(tSec, poseA);
  if (fly.mode === 'auto') {
    camera.position.copy(poseA.pos);
    camLook.copy(poseA.look);
  } else {
    fly.t += dt;
    if (fly.mode === 'flyin') {
      var k3 = easeInOut(clamp(fly.t / 2.5, 0, 1));
      camera.position.lerpVectors(fly.from.pos, fly.target.pos, k3);
      camLook.lerpVectors(fly.from.look, fly.target.look, k3);
      if (fly.t >= 2.5) { fly.mode = 'hold'; fly.t = 0; }
    } else if (fly.mode === 'hold') {
      camera.position.copy(fly.target.pos);
      camLook.copy(fly.target.look);
      if (fly.t >= fly.hold) {
        fly.mode = 'flyback'; fly.t = 0;
        fly.from.pos.copy(camera.position);
        fly.from.look.copy(camLook);
      }
    } else { // flyback
      var k4 = easeInOut(clamp(fly.t / 3, 0, 1));
      camera.position.lerpVectors(fly.from.pos, poseA.pos, k4);
      camLook.lerpVectors(fly.from.look, poseA.look, k4);
      if (fly.t >= 3) fly.mode = 'auto';
    }
  }
  camera.position.y += 0.15 * Math.sin(et * 0.35); // 手持呼吸感
  camera.lookAt(camLook);
}

/* ═══════════════ 13. 氛圍（晝夜） ═══════════════ */
var SKY = [
  { h: 0,    top: '#141230', bot: '#241a3a' },
  { h: 4.5,  top: '#141230', bot: '#241a3a' },
  { h: 6,    top: '#3a2a55', bot: '#c96a7e' },
  { h: 7.5,  top: '#7e9cc9', bot: '#f3d9b0' },
  { h: 10,   top: '#6FC2F5', bot: '#EAF3F9' },
  { h: 15.5, top: '#6FC2F5', bot: '#EAF3F9' },
  { h: 17,   top: '#c98a6a', bot: '#e8b891' },
  { h: 18,   top: '#8a4a6a', bot: '#e88a6a' },
  { h: 20,   top: '#1c1840', bot: '#3a2a55' },
  { h: 24,   top: '#141230', bot: '#241a3a' }
];
var lastAmbHour = -1;
function updateAmbience(t) {
  if (!world.ok) return;
  var d = new Date(t);
  var hour = d.getHours() + d.getMinutes() / 60;
  var a = SKY[0], b = SKY[SKY.length - 1], f = 0;
  for (var i = 0; i < SKY.length - 1; i++) {
    if (hour >= SKY[i].h && hour < SKY[i + 1].h) {
      a = SKY[i]; b = SKY[i + 1];
      f = (hour - a.h) / (b.h - a.h);
      break;
    }
  }
  var top = lerpColor(a.top, b.top, f), bot = lerpColor(a.bot, b.bot, f);
  _c.set(top); _c2.set(bot);
  // 天穹頂點色
  var colAttr = skyDome.geometry.attributes.color;
  for (var v4 = 0; v4 < colAttr.count; v4++) {
    var fac = skyFactors[v4];
    colAttr.setXYZ(v4, _c2.r + (_c.r - _c2.r) * fac, _c2.g + (_c.g - _c2.g) * fac, _c2.b + (_c.b - _c2.b) * fac);
  }
  colAttr.needsUpdate = true;
  scene.fog.color.copy(_c2);

  // 太陽 / 月亮軌道
  var sunTh = (hour - 6) / 12 * Math.PI;
  sunMesh.position.set(Math.cos(sunTh) * 120, Math.sin(sunTh) * 90 + 4, -60);
  sunMesh.visible = hour > 5.5 && hour < 18.5;
  var moonTh = (hour - 18) / 12 * Math.PI;
  moonMesh.position.set(Math.cos(moonTh) * 120, Math.sin(moonTh) * 80 + 6, -60);
  moonMesh.visible = hour >= 18.5 || hour < 5.8;

  // 燈光強度
  var dayF = clamp(Math.sin(sunTh), 0, 1);
  sunLight.intensity = 0.25 + dayF * 1.25; // 白天陽光更燦爛
  sunLight.position.copy(sunMesh.visible ? sunMesh.position : moonMesh.position);
  sunLight.color.set(sunMesh.visible ? 0xFFF6E0 : 0x8FA3D8);
  hemiLight.intensity = 0.5 + dayF * 0.6;
  hemiLight.color.set(lerpColor('#3E436B', '#BFE3FF', dayF));

  var nightF = clamp(1 - dayF * 1.6, 0, 1);
  var isNightHours = hour >= 18 || hour < 7;
  lampGlowPts.material.opacity = isNightHours ? 0.85 : 0;
  windowsMat.opacity = isNightHours ? 0.95 : 0;
  shopLight.intensity = isNightHours ? 2.2 : 0;
  stars.material.opacity = nightF * 0.95;

  // 深夜 Zzz + 人口 + 訪客入口
  var deepNight = hour >= 1 && hour < 8;
  visitorGateOpen = !deepNight;
  for (var z2 = 0; z2 < zzzSprites.length; z2++) {
    zzzSprites[z2].material.opacity = deepNight ? 0.5 + 0.4 * Math.sin(et * 1.5 + z2) : 0;
    if (deepNight) zzzSprites[z2].position.y = 4.6 + 0.3 * Math.sin(et * 0.8 + z2);
  }
  if (Math.floor(hour * 60) !== lastAmbHour) {
    lastAmbHour = Math.floor(hour * 60);
    updateCensus(hour);
  }
}

/* ═══════════════ 14. 主渲染迴圈 ═══════════════ */
var rafActive = false;
var fpsEMA = 60, dbgT = 0;
function loop() {
  if (document.hidden) { rafActive = false; return; }
  rafActive = true;
  requestAnimationFrame(loop);
  var dt = Math.min(clock3.getDelta(), 0.1);
  et += dt;
  updateNPCs(dt);
  updateParticles(dt);
  updateCamera(dt);
  renderer.render(scene, camera);
  if (DEBUG) {
    fpsEMA = fpsEMA * 0.95 + (dt > 0 ? 1 / dt : 60) * 0.05;
    dbgT += dt;
    if (dbgT > 0.5) {
      dbgT = 0;
      var inf = renderer.info;
      $('debugHud').textContent =
        'fps  ' + fpsEMA.toFixed(0) +
        '\ncalls ' + inf.render.calls +
        '\ntris  ' + inf.render.triangles +
        '\ngeo   ' + inf.memory.geometries +
        '\ntex   ' + inf.memory.textures;
      document.title = 'fps:' + fpsEMA.toFixed(0) + ' calls:' + inf.render.calls;
    }
  }
}
document.addEventListener('visibilitychange', function () {
  if (!document.hidden) {
    if (D) renderNow(true);
    if (world.ok && !rafActive) { clock3.getDelta(); requestAnimationFrame(loop); }
  }
});

/* ═══════════════ 15. 主迴圈（1 Hz 數字） ═══════════════ */
var regShown = 0, regTarget = 0, tweenRAF = null;
world.todayOrders = 0; world.monthRev = 0; world.monthOrders = 0;
function setRegister(target) {
  if (Math.round(target) === Math.round(regTarget)) return;
  regTarget = target;
  if (document.hidden || !world.ok) { regShown = regTarget; paintToday(); return; }
  var from = regShown, start = performance.now(), dur = 1300;
  cancelAnimationFrame(tweenRAF);
  (function step(ts) {
    var p = clamp((ts - start) / dur, 0, 1);
    var e2 = 1 - Math.pow(1 - p, 3);
    regShown = from + (regTarget - from) * e2;
    if (Math.round(regShown) !== lastTodayInt) { lastTodayInt = Math.round(regShown); paintToday(); }
    if (p < 1) tweenRAF = requestAnimationFrame(step);
  })(start);
}

function renderNow(skipAnim) {
  if (!D) return;
  var t = now();

  if (startOfDay(t) !== sim.dayStart) { buildSim(); skipAnim = true; }

  var msOfDay = t - sim.dayStart;
  var simSum = 0, simCount = 0;
  var newEvents = [];
  for (var i = 0; i < sim.events.length; i++) {
    var ev = sim.events[i];
    if (ev.t <= msOfDay) {
      simSum += ev.amount; simCount++;
      if (!skipAnim && ev.t > lastTickMs && msOfDay - ev.t < 15e3 * SPEED) newEvents.push(ev);
    } else break;
  }
  lastTickMs = msOfDay;

  var revMtd = (D.kpi && D.kpi.rev_mtd) || 0;
  var ordersMtd = (D.kpi && D.kpi.orders_mtd) || 0;
  var displayedToday = sim.realTodayRev + simSum;
  var displayedMTD = revMtd + simSum;
  var displayedTodayOrders = sim.realTodayOrders + simCount;
  var pct = D.target > 0 ? (displayedMTD / D.target) * 100 : 0;

  world.todayOrders = displayedTodayOrders;
  var monthChanged = world.monthRev !== displayedMTD;
  world.monthRev = displayedMTD;
  world.monthOrders = ordersMtd + simCount;

  if (world.ok) {
    setRegister(displayedToday);
    if (monthChanged) paintMonth();
    // 目標塔
    var fillPct = clamp(pct, 0, 100);
    gaugeFill.scale.y = Math.max(fillPct / 100, 0.01);
    crownGroup.visible = pct >= 100;
    var pctStr = pct.toFixed(1) + '%';
    if (gaugePctSprite._last !== pctStr) {
      gaugePctSprite._last = pctStr;
      var g = gaugePctSprite.canvas.getContext('2d');
      g.clearRect(0, 0, 256, 96);
      g.textAlign = 'center'; g.textBaseline = 'middle';
      g.font = '700 62px "Cormorant Garamond"';
      g.lineWidth = 8; g.strokeStyle = 'rgba(20,10,16,.8)';
      g.strokeText(pctStr, 128, 48);
      g.fillStyle = '#C9A961';
      g.fillText(pctStr, 128, 48);
      gaugePctSprite.tex.needsUpdate = true;
    }
    world.setBoxCount(Math.max(dockShown, Math.min(simCount, 12)));
  } else {
    // 精簡 fallback
    $('fbToday').textContent = fmt(displayedToday);
    $('fbMonth').textContent = fmt(displayedMTD);
    $('fbPct').textContent = pct.toFixed(1) + '%';
  }

  // 慶祝
  var dayKey = ymd(t);
  if (displayedToday >= sim.dailyTarget && sim.dailyTarget > 0) {
    var dk = 'tzg_daily_' + dayKey;
    var already = false;
    try { already = sessionStorage.getItem(dk) === '1'; } catch (e) {}
    if (!already && !skipAnim) {
      try { sessionStorage.setItem(dk, '1'); } catch (e) {}
      celebrate('今日達標 🎉');
    } else if (!already) {
      try { sessionStorage.setItem(dk, '1'); } catch (e) {}
    }
  }
  if (prevPct !== null && !skipAnim) {
    [25, 50, 75, 100].forEach(function (mst) {
      if (prevPct < mst && pct >= mst && !firedMilestones[dayKey + mst]) {
        firedMilestones[dayKey + mst] = true;
        celebrate('本月達成 ' + mst + '% 🏆');
      }
    });
  }
  prevPct = pct;

  if (!skipAnim) newEvents.slice(-3).forEach(fireEvent);

  updateAmbience(t);
}

/* ═══════════════ 16. 強健性 / 啟動 ═══════════════ */
setInterval(function () {
  if (TIME_TRAVEL) return;
  var d = new Date();
  if (d.getHours() === 4 && d.getMinutes() === 30) {
    var key = 'tzg_live_reload';
    try {
      if (localStorage.getItem(key) !== ymd(Date.now())) {
        localStorage.setItem(key, ymd(Date.now()));
        location.reload();
      }
    } catch (e) { location.reload(); }
  }
}, 30e3);

// 字型載入完成後重繪動態 canvas（首繪可能用到後備字型）
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(function () {
    if (!world.ok) return;
    labelCache.forEach(function (v) { v.tex.dispose(); });
    labelCache.clear();
    paintToday(); paintMonth(); paintJumbo();
    if (D) buildStaff();
  });
}

// 驗證掛鉤
window.__world = {
  debugState: function () {
    var act = 0;
    for (var i = 0; i < npcs.length; i++) if (npcs[i].scale > 0.02) act++;
    var m22 = new THREE.Matrix4();
    if (world.ok && npcParts.body) npcParts.body.getMatrixAt(22, m22);
    return {
      ok: world.ok,
      today: Math.round(regTarget),
      pct: prevPct,
      calls: world.ok ? renderer.info.render.calls : 0,
      geometries: world.ok ? renderer.info.memory.geometries : 0,
      textures: world.ok ? renderer.info.memory.textures : 0,
      activeNPCs: act,
      staff0: npcs[STAFF_BASE] ? { s: +npcs[STAFF_BASE].scale.toFixed(2), ts: npcs[STAFF_BASE].targetScale, x: +npcs[STAFF_BASE].pos.x.toFixed(1), z: +npcs[STAFF_BASE].pos.z.toFixed(1) } : null,
      bodyM: Array.from(m22.elements.slice(12, 15)).map(function (x) { return +x.toFixed(1); })
    };
  }
};

initWorld();
loadData();
loadMeta();
setInterval(function () { if (D) renderNow(false); }, DEMO ? 250 : 1000);
if (!DEMO) {
  setInterval(loadData, 10 * 60e3);
  setInterval(loadMeta, 30 * 60e3);
}
</script>
