#disclaimer {

var LS_KEY = 'tzg_live_D';
var D = null;
var retryDelay = 60e3;
var retryTimer = null;

function extractD(html) {
  var i = html.indexOf('const D=');
  if (i < 0) throw new Error('no const D');
  var j = html.indexOf('\n', i);
  if (j < 0) j = html.length;
  var raw = html.slice(i + 8, j).trim().replace(/;$/, '');
  return JSON.parse(raw);
}

function applyData(newD, fromCache) {
  var changed = !D || !D.meta || D.meta.data_as_of_iso !== newD.meta.data_as_of_iso;
  D = newD;
  if (changed) {
    buildStaff();
    buildTicker();
    buildSim();
    renderStatic();
    if (world.ok) rebuildDistricts();
    renderNow(true);
  }
  $('loadingOverlay').classList.add('hidden');
  $('errorOverlay').classList.add('hidden');
  updateStalePlaque(fromCache ? '⚠ 資料更新失敗，顯示 ' + (D.meta.data_as_of || '快取') + ' 資料' : null);
}

function updateStalePlaque(forcedMsg) {
  var el = $('stalePlaque'), txt = $('staleText');
  if (forcedMsg) { txt.textContent = forcedMsg; el.classList.add('show'); return; }
  if (D && D.meta && D.meta.data_as_of_iso && !DEMO) {
    var ageH = (now() - new Date(D.meta.data_as_of_iso).getTime()) / 36e5;
    if (ageH > 36) { txt.textContent = '⚠ 資料已 ' + Math.round(ageH) + ' 小時未更新'; el.classList.add('show'); return; }
  }
  el.classList.remove('show');
}

function loadData() {
  if (DEMO) { applyData(DEMO_D, false); return; }
  fetch('output/dashboard_latest.html?_live=' + Date.now(), { cache: 'no-store' })
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
    .then(function (html) {
      var d = extractD(html);
      retryDelay = 60e3;
      try { localStorage.setItem(LS_KEY, JSON.stringify(d)); } catch (e) {}
      applyData(d, false);
    })
    .catch(function () {
      if (D) { updateStalePlaque('⚠ 資料更新失敗，顯示 ' + (D.meta.data_as_of || '快取') + ' 資料'); }
      else {
        var cached = null;
        try { cached = JSON.parse(localStorage.getItem(LS_KEY)); } catch (e) {}
        if (cached && cached.meta) applyData(cached, true);
        else { $('loadingOverlay').classList.add('hidden'); $('errorOverlay').classList.remove('hidden'); }
      }
      clearTimeout(retryTimer);
      retryTimer = setTimeout(loadData, retryDelay);
      retryDelay = Math.min(retryDelay * 2, 300e3);
    });
}

var sim = { events: [], dayStart: 0, simStartMs: 0, realTodayRev: 0, realTodayOrders: 0, dailyTarget: 150000 };
var lastTickMs = -1;
var prevPct = null;
var firedMilestones = {};
var workerList = [];

function hourCurve() {
  var counts = new Array(24).fill(0);
  (D.hour_dist || []).forEach(function (h) { if (h && h.hour >= 0 && h.hour < 24) counts[h.hour] = +h.orders || 0; });
  var total = counts.reduce(function (a, b) { return a + b; }, 0);
  var prior = [1,1,.4,.3,.3,.4,.8,1.5,2.5,3.5,4.5,5,5.5,6,6.5,7,7.5,8.5,9.5,11,11.5,11,8,4];
  var pTotal = prior.reduce(function (a, b) { return a + b; }, 0);
  var w = [], sum = 0;
  for (var h = 0; h < 24; h++) {
    var real = total > 0 ? counts[h] / total : 0;
    if (total > 0) {
      var l = counts[(h + 23) % 24] / total, r = counts[(h + 1) % 24] / total;
      real = (l + 2 * real + r) / 4;
    }
    var blend = total >= 100 ? 0.8 * real + 0.2 * (prior[h] / pTotal)
                             : 0.5 * real + 0.5 * (prior[h] / pTotal);
    blend += 0.002;
    w.push(blend); sum += blend;
  }
  return w.map(function (x) { return x / sum; });
}

function buildSim() {
  var t = now();
  sim.dayStart = startOfDay(t);
  var seed = hashStr(ymd(t) + '|' + (D.meta.data_as_of_iso || ''));
  var rng = mulberry32(seed);
  var w = hourCurve();

  var dt = (D.last_7_days && D.last_7_days.daily_target) || 150000;
  sim.dailyTarget = dt;
  var fullDays = ((D.last_7_days && D.last_7_days.data) || []).filter(function (d) { return !d.is_today && d.rev > 0; });
  var estDaily = fullDays.length ? fullDays.reduce(function (a, d) { return a + d.rev; }, 0) / fullDays.length : dt;
  estDaily = clamp(estDaily, 0.4 * dt, 1.6 * dt);
  var dayTotal = estDaily * (0.85 + 0.3 * rng());
  var avgOrder = (D.kpi && D.kpi.avg_order) || 4500;
  var medOrder = (D.kpi && D.kpi.median_order) || Math.round(avgOrder * 0.4);
  var estOrders = clamp(Math.round(dayTotal / avgOrder), 5, 80);

  sim.realTodayRev = 0; sim.realTodayOrders = 0;
  var todayKey = String(new Date(t).getMonth() + 1).padStart(2, '0') + '/' + String(new Date(t).getDate()).padStart(2, '0');
  (((D.last_7_days || {}).data) || []).forEach(function (d) {
    if (d.date === todayKey) { sim.realTodayRev = d.rev || 0; sim.realTodayOrders = d.orders || 0; }
  });

  var asOf = new Date(D.meta.data_as_of_iso || 0).getTime();
  sim.simStartMs = Math.max(0, asOf - sim.dayStart);

  var events = [];
  for (var h = 0; h < 24; h++) {
    var lam = estOrders * w[h];
    var n = Math.floor(lam) + (rng() < (lam - Math.floor(lam)) ? 1 : 0);
    for (var k = 0; k < n; k++) events.push({ t: h * 36e5 + rng() * 36e5 });
  }
  events.sort(function (a, b) { return a.t - b.t; });

  var rawSum = 0;
  events.forEach(function (ev) {
    ev.amount = rng() < 0.75 ? medOrder * Math.exp(gauss(rng) * 0.6) : avgOrder * (1 + 2 * rng());
    rawSum += ev.amount;
  });
  var scale = rawSum > 0 ? dayTotal / rawSum : 1;
  events.forEach(function (ev) { ev.amount = Math.max(200, Math.round(ev.amount * scale)); });

  var weights = workerList.map(function (wk) { return Math.max(wk.rev, 1); });
  var wSum = weights.reduce(function (a, b) { return a + b; }, 0) || 1;
  var prods = (D.prod_qty || []).map(function (p) { return shortProduct(p.name); });
  events.forEach(function (ev) {
    var r = rng() * wSum, idx = 0;
    for (var i2 = 0; i2 < weights.length; i2++) { r -= weights[i2]; if (r <= 0) { idx = i2; break; } }
    ev.worker = idx;
    ev.product = prods.length ? prods[Math.floor(rng() * prods.length)] : '新訂單';
  });

  sim.events = events.filter(function (ev) { return ev.t > sim.simStartMs; });
  lastTickMs = -1;
  prevPct = null;
  world.setBoxCount(0);
}

  // 在橢圓島半徑比例 [tMin..tMax] 環帶找一個不與 exclude [{x,z,r}] 衝突的點
  for (var tries = 0; tries < 60; tries++) {
    var a = scRng() * Math.PI * 2;
    var t = tMin + scRng() * (tMax - tMin);
    var x = Math.cos(a) * RX * t, z = Math.sin(a) * RZ * t;
    var ok = true;
    for (var i = 0; i < exclude.length; i++) {
      var e = exclude[i];
      if ((x - e.x) * (x - e.x) + (z - e.z) * (z - e.z) < e.r * e.r) { ok = false; break; }
    }
    if (ok) return { x: x, z: z };
  }
  return null;
}

function updateStudio(dt) {
  if (!studio.g) return;
  // 女主角：姿勢輪播加快（像在講話）+ 手勢持續小幅比劃
  studio.poseT += dt;
  var heartLock = studio.heartT < 2.5;
  if (heartLock) studio.heartT += dt;
  if (!heartLock && studio.poseT > 3.2) { studio.poseT = 0; studio.poseIdx = (studio.poseIdx + 1) % HER_POSES.length; }
  var P = HER_POSES[heartLock ? 2 : studio.poseIdx];
  var wave = (!heartLock && studio.poseIdx === 0) ? Math.sin(et * 6) * 0.3 : 0;
  var talkL = Math.sin(et * 4.4) * 0.14, talkR = Math.sin(et * 5.1 + 1.7) * 0.14; // 講話比手畫腳
  studio.armL.rotation.x += (P[0] + talkL * 0.6 - studio.armL.rotation.x) * Math.min(1, dt * 6);
  studio.armL.rotation.z += (P[1] + talkL - studio.armL.rotation.z) * Math.min(1, dt * 6);
  studio.armR.rotation.x += (P[2] + talkR * 0.6 - studio.armR.rotation.x) * Math.min(1, dt * 6);
  studio.armR.rotation.z += (P[3] + wave + talkR - studio.armR.rotation.z) * Math.min(1, dt * 6);
  studio.heroine.rotation.y = Math.sin(et * 0.4) * 0.22 + (heartLock ? Math.sin(studio.heartT * 10) * 0.06 : 0);
  // 頭部點頭/歪頭 + 嘴唇開合（說話感）
  if (studio.headGrp) {
    studio.headGrp.rotation.x = Math.sin(et * 2.6) * 0.07 + Math.sin(et * 0.9) * 0.03;
    studio.headGrp.rotation.z = Math.sin(et * 1.4) * 0.05;
    studio.lips.scale.y = 0.7 + Math.abs(Math.sin(et * 6.5)) * 0.9;
  }
  studio.hairSway.rotation.x = Math.sin(et * 1.3) * 0.08 + 0.04; // 風扇吹髮 + 微擺
  // 小腳尖交替踏點（隨談話節奏）
  if (studio.shoeL) {
    studio.shoeL.position.y = 0.1 + Math.max(0, Math.sin(et * 2.8)) * 0.09;
    studio.shoeR.position.y = 0.1 + Math.max(0, Math.sin(et * 2.8 + Math.PI)) * 0.09;
    studio.shoeL.rotation.x = -Math.max(0, Math.sin(et * 2.8)) * 0.5;
    studio.shoeR.rotation.x = -Math.max(0, Math.sin(et * 2.8 + Math.PI)) * 0.5;
  }
  // 風扇旋轉 + 收音師桿微晃 + 溱姐寵粉橫幅浮動
  if (studio.fanRotor) studio.fanRotor.rotation.x = et * 9;
  if (studio.boomOp) studio.boomOp.rotation.z = Math.sin(et * 1.1) * 0.03;
  if (studio.fanBanner) studio.fanBanner.position.y = 7.4 + Math.sin(et * 0.8) * 0.25;
  // 攝影機追蹤她的擺動；攝影師跟著小幅擺
  studio.camHead.rotation.y = Math.PI + Math.sin(et * 0.4) * 0.1;
  studio.camHead.rotation.x = 0.12 + Math.sin(et * 0.7) * 0.02;
  studio.cameraman.position.y = Math.abs(Math.sin(et * 2.2)) * 0.03;
  if (studio.cmJump < 1.2) { studio.cmJump += dt; studio.cameraman.position.y += Math.abs(Math.sin(studio.cmJump / 1.2 * Math.PI * 2)) * 0.5; }
  // 助理：兩點折返（反光板位 ↔ 軟箱燈）+ 反光板閃光
  studio.aT = (studio.aT || 0) + dt * 0.1;
  var ak = 0.5 + 0.5 * Math.sin(studio.aT * Math.PI * 2);
  var ae = ak * ak * (3 - 2 * ak);
  studio.assistant.position.x = -2.6 + ae * 0.9;
  studio.assistant.position.z = 2.6 - ae * 1.1;
  studio.assistant.position.y = Math.abs(Math.sin(et * 7)) * 0.05;
  if (studio.asJump < 1.2) { studio.asJump += dt; studio.assistant.position.y += Math.abs(Math.sin(studio.asJump / 1.2 * Math.PI * 2)) * 0.5; }
  studio.reflGlow.material.opacity = Math.pow(Math.max(0, Math.sin(et * 0.9)), 8) * 0.85;
  // REC 閃爍
  studio.rec.material.opacity = (et % 0.9 < 0.55) ? 1 : 0.3;
  // 偶發拍攝星光
  studio.sparkleT -= dt;
  if (studio.sparkleT < 0) {
    studio.sparkleT = 40 + Math.random() * 20;
    firework(47, 5, 6, 0xF2A9C0);
  }
}

function buildMountains() {
  var M2 = [];
  var mrng = mulberry32(4949);
  var ROCKS = [0xD9B584, 0xC98A8A, 0x9A8FA8, 0xB87A5A, 0xB8AE9C];
  var ORES = [0xF2A9C0, 0xF2D377, 0x9FD8D4, 0xCBB3E6, 0xA8E0F0, 0xE88CA3];
  var N_PK = LITE ? 8 : 13;
  for (var pk = 0; pk < N_PK; pk++) {
    // 角度覆蓋北半圈（π..2π），避開東西兩端點
    var ang = Math.PI * (1.08 + (pk / (N_PK - 1)) * 0.84);
    var t2 = 1.02 + mrng() * 0.1;
    var mx = Math.cos(ang) * RX * t2;
    var mz = Math.sin(ang) * RZ * t2;
    var mh = 9 + mrng() * 12;               // 高山 9–21
    var mw = 5 + mrng() * 4.5;
    var rc = ROCKS[pk % ROCKS.length];
    M2.push(colorize(new THREE.ConeGeometry(mw, mh, 7).translate(mx, mh / 2 - 1.5, mz), rc));
    if (mh > 15) M2.push(colorize(new THREE.ConeGeometry(mw * (1 - (mh - 3) / mh) + 1.1, 3.2, 7).translate(mx, mh - 3.1, mz), PAL.gold)); // 高峰鍍金頂（v7）
    M2.push(colorize(new THREE.ConeGeometry(mw * 0.62, mh * 0.66, 6)
      .translate(mx + mw * 0.7 * (mrng() < 0.5 ? 1 : -1), mh * 0.33 - 1.5, mz + mw * 0.4), rc));
    // 彩色礦脈：面向城鎮的坡面鑲 3-4 顆
    for (var ore = 0; ore < 3 + (pk % 2); ore++) {
      var oy = 1.5 + mrng() * mh * 0.55;
      var of2 = (mh - oy) / mh * mw * 0.8;   // 依高度貼坡面
      var oj = (mrng() - 0.5) * mw * 0.7;
      M2.push(colorize(new THREE.OctahedronGeometry(0.5 + mrng() * 0.6, 0)
        .applyMatrix4(new THREE.Matrix4().makeScale(1, 1.5, 1))
        .translate(mx - Math.cos(ang) * of2 + oj * Math.sin(ang), oy, mz - Math.sin(ang) * of2 - oj * Math.cos(ang)),
        ORES[(pk + ore) % ORES.length]));
    }
  }
  var mtn = new THREE.Mesh(mergeGeometries(M2.map(function (x) { return x.toNonIndexed(); })), vertexToon);
  scene.add(mtn);
  M2.forEach(function (x) { x.dispose(); });
  mtn.userData.studio = 'mountain'; // 點山 → 落石沙塵（環形合併網格不適合旋轉搖晃）
  clickTargets.push(mtn);

  var mg1 = glowSprite('rgba(255,127,168,.45)', 11); mg1.position.set(-30, 8, -46); scene.add(mg1);

}

function drawTextCanvas(c, text, st) {
  var g = c.getContext('2d');
  g.clearRect(0, 0, c.width, c.height);
  g.font = st.font;
  g.textAlign = 'center'; g.textBaseline = 'middle';
  if (st.bg) {
    g.fillStyle = st.bg;
    roundRect(g, 4, 4, c.width - 8, c.height - 8, 18);
    g.fill();
    if (st.border) { g.strokeStyle = st.border; g.lineWidth = 4; roundRect(g, 4, 4, c.width - 8, c.height - 8, 18); g.stroke(); }
  }
  g.fillStyle = st.fg;
  g.fillText(text, c.width / 2, c.height / 2 + 2);
}
function roundRect(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x + r, y); g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r);
  g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath();
}
function makeLabel(text, styleKey) {
  var key = styleKey + '|' + text;
  var hit = labelCache.get(key);
  if (hit) {
    hit.lastUse = et;
    var sp0 = new THREE.Sprite(new THREE.SpriteMaterial({ map: hit.tex, transparent: true, depthWrite: false }));
    sp0.scale.set(hit.aspect * TEXT_STYLES[styleKey].h, TEXT_STYLES[styleKey].h, 1);
    return sp0;
  }
  var st = TEXT_STYLES[styleKey];
  var probe = document.createElement('canvas').getContext('2d');
  probe.font = st.font;
  var w = Math.min(512, Math.ceil(probe.measureText(text).width) + st.pad * 2);
  var c = document.createElement('canvas');
  c.width = Math.max(64, w); c.height = 96;
  drawTextCanvas(c, text, st);
  var tex = canvasTex(c);
  var entry = { tex: tex, aspect: c.width / c.height, lastUse: et, canvas: c, text: text, styleKey: styleKey };
  labelCache.set(key, entry);
  if (labelCache.size > LABEL_LRU) { // 汰換最舊
    var oldest = null, oldestKey = null;
    labelCache.forEach(function (v, k) { if (!oldest || v.lastUse < oldest.lastUse) { oldest = v; oldestKey = k; } });
    if (oldestKey) { oldest.tex.dispose(); labelCache.delete(oldestKey); }
  }
  var sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
  sp.scale.set(entry.aspect * st.h, st.h, 1);
  return sp;
}

function makeLabelSheet(entries) {
  var ROW = 96;
  var c = document.createElement('canvas');
  c.width = 1024; c.height = Math.max(128, Math.pow(2, Math.ceil(Math.log2(entries.length * ROW))));
  var g = c.getContext('2d');
  g.textAlign = 'center'; g.textBaseline = 'middle';
  var geos = [];
  entries.forEach(function (en, i) {
    var st = en.style || {};
    g.font = st.font || '700 44px "Noto Sans TC"';
    g.fillStyle = st.fg || '#F5EFE4';
    if (st.stroke) { g.lineWidth = 6; g.strokeStyle = st.stroke; g.strokeText(en.text, 512, i * ROW + ROW / 2); }
    g.fillText(en.text, 512, i * ROW + ROW / 2);
    var w = en.w || 4;
    var pg = new THREE.PlaneGeometry(w, w * (ROW / 1024));
    // UV 對到自己那一列（v 以 canvas 實際高度為基準，0 在底部）
    var uv = pg.attributes.uv;
    for (var u = 0; u < uv.count; u++) {
      uv.setY(u, (c.height - (i + 1 - uv.getY(u)) * ROW) / c.height);
    }
    if (en.ry) pg.rotateY(en.ry);
    pg.translate(en.x, en.y, en.z);
    geos.push(pg);
  });
  var tex = canvasTex(c);
  var mesh = new THREE.Mesh(mergeGeometries(geos.map(function (gg) { return gg.toNonIndexed(); })),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true, side: THREE.DoubleSide, depthWrite: false }));
  geos.forEach(function (gg) { gg.dispose(); });
  mesh.userData.ownTex = tex;
  return mesh;
}

      CU.x += CU.vx * dt;
      if (CU.x > 130) CU.x = -130;
      var cSq = 1;
      if (CU.jT !== undefined && CU.jT < 1.2) {
        CU.jT += dt;
        cSq = 1 + Math.sin(CU.jT * 14) * 0.18 * (1 - CU.jT / 1.2);
      }
      _q.identity();
      _m.compose(_v.set(CU.x, CU.y + Math.sin(et * 0.3 + CU.ph) * 0.8, CU.z), _q, _s.set(CU.sc * (2 - cSq), CU.sc * cSq, CU.sc * (2 - cSq)));
      cloudInst.setMatrixAt(cu, _m);
    }
    cloudInst.instanceMatrix.needsUpdate = true;
  }
  // 彩旗擺動
  if (buntingInst) {
    for (var bf3 = 0; bf3 < buntingData.length; bf3++) {
      var BF = buntingData[bf3];
      _e.set(0, 0, 0.18 * Math.sin(et * 1.6 + BF.ph));
      _q.setFromEuler(_e);
      _m.compose(_v.set(BF.x, BF.y, BF.z), _q, _s.set(1, 1, 1));
      buntingInst.setMatrixAt(bf3, _m);
    }
    buntingInst.instanceMatrix.needsUpdate = true;
  }
  // 花瓣飄落
  if (petalPts) {
    var pa2 = petalPts.geometry.attributes.position;
    for (var pf = 0; pf < petalData.length; pf++) {
      var PF = petalData[pf];
      PF.y -= PF.v * dt;
      if (PF.y < 0.4) { PF.y = 18 + (pf % 7); }
      pa2.setXYZ(pf, PF.x + Math.sin(et * PF.sw + PF.ph) * 1.4, PF.y, PF.z + Math.cos(et * PF.sw * 0.8 + PF.ph) * 0.9);
    }
    pa2.needsUpdate = true;
  }
  if (boats.length) updateBoats(dt);
  // v7 環境慶典：白天不定時煙火 + 禮物氣球升空（熱鬧感）
  world._festT = (world._festT === undefined ? 25 : world._festT) - dt;
  if (world._festT < 0) {
    world._festT = 50 + Math.random() * 45;
    firework((Math.random() - 0.5) * 60, 24 + Math.random() * 10, -18 + (Math.random() - 0.5) * 30,
      [0xFF6FA5, 0xFFD23F, 0x5FB2FF, 0xB98BFF, 0x7FE8F2][(Math.random() * 5) | 0]);
    if (Math.random() < 0.55) launchBalloon((Math.random() - 0.5) * 44, 2, (Math.random() - 0.5) * 40);
  }
  // 今日樓脈動
  if (DYN._towers7 && DYN._todayTower >= 0) {
    var pu = 1 + 0.06 * Math.sin(et * 4);
    _m.compose(_v.set(-36 + DYN._todayTower * 3.6, 0.8, 12), _q.identity(), _s.set(pu, DYN._todayH * pu, pu));
    DYN._towers7.setMatrixAt(DYN._todayTower, _m);
    DYN._towers7.instanceMatrix.needsUpdate = true;
  }
}

    prop.position.x = -2.9;
    ship.add(prop);
    ship.userData = { route: shipRoutes[a2], period: a2 ? 110 : 80, prop: prop, ph: a2 * 0.5 };
    airships.push(ship);
    scene.add(ship);
  }
}

function burstCoins(x, y, z, n) {
  var used = 0;
  for (var i = 0; i < coinData.length && used < n; i++) {
    var cd = coinData[i];
    if (cd.active) continue;
    cd.active = true;
    cd.p.set(x, y, z);
    var a = Math.random() * Math.PI * 2, r = 1 + Math.random() * 2.5;
    cd.v.set(Math.cos(a) * r, 5 + Math.random() * 3.5, Math.sin(a) * r);
    cd.w = (Math.random() - 0.5) * 14;
    used++;
  }
}
function firework(x, y, z, hex) {
  var used = 0;
  _c2.set(hex);
  for (var i = 0; i < fwData.length && used < 80; i++) {
    var fd = fwData[i];
    if (fd.active) continue;
    fd.active = true; fd.life = 1.9;
    fd.p.set(x, y, z);
    var th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    var sp2 = 6 + Math.random() * 4;
    fd.v.set(Math.sin(ph) * Math.cos(th) * sp2, Math.cos(ph) * sp2, Math.sin(ph) * Math.sin(th) * sp2);
    fwColAttr.setXYZ(i, _c2.r, _c2.g, _c2.b);
    used++;
  }
}
function launchBalloon(x, y, z) {
  for (var b = 12; b < 16; b++) {
    if (!balloonData[b].active && balloonData[b].kind === 'launch') {
      balloonData[b].active = true;
      balloonData[b].x = x; balloonData[b].y = y + 2.8; balloonData[b].z = z;
      balloonData[b].t = 0;
      return;
    }
  }
}

function updateParticles(dt) {
  // 閃粉
  var pa = sparklePts.geometry.attributes.position;
  for (var i = 0; i < sparkleData.length; i++) {
    var sd = sparkleData[i];
    sd.y += sd.v * dt;
    if (sd.y > 30) sd.y = 0;
    pa.setXYZ(i, sd.x + Math.sin(et * 0.7 + sd.w) * 1.2, sd.y, sd.z + Math.cos(et * 0.5 + sd.w) * 1.2);
  }
  pa.needsUpdate = true;

  // 金幣
  var anyCoin = false;
  for (var c7 = 0; c7 < coinData.length; c7++) {
    var cd = coinData[c7];
    if (!cd.active) continue;
    anyCoin = true;
    cd.v.y -= 14 * dt;
    cd.p.addScaledVector(cd.v, dt);
    if (cd.p.y < 0.1) {
      cd.active = false;
      _m.compose(_v.set(0, -99, 0), _q.identity(), _s.set(0.001, 0.001, 0.001));
    } else {
      _e.set(et * cd.w, 0, et * cd.w * 0.7); _q.setFromEuler(_e);
      _m.compose(cd.p, _q, _s.set(1, 1, 1));
    }
    coinInst.setMatrixAt(c7, _m);
  }
  if (anyCoin) coinInst.instanceMatrix.needsUpdate = true;

  // 煙火
  var anyFw = false;
  for (var f4 = 0; f4 < fwData.length; f4++) {
    var fd = fwData[f4];
    if (!fd.active) continue;
    anyFw = true;
    fd.life -= dt;
    if (fd.life <= 0) { fd.active = false; fwGeoAttr.setY(f4, -999); continue; }
    fd.v.y -= 3 * dt;
    fd.p.addScaledVector(fd.v, dt);
    fwGeoAttr.setXYZ(f4, fd.p.x, fd.p.y, fd.p.z);
    var fade = clamp(fd.life / 1.9, 0, 1);
    fwColAttr.setXYZ(f4, fwColAttr.getX(f4) * (0.97), fwColAttr.getY(f4) * 0.97, fwColAttr.getZ(f4) * 0.97);
  }
  if (anyFw) { fwGeoAttr.needsUpdate = true; fwColAttr.needsUpdate = true; }

  // 光軌
  var oa = orbPts.geometry.attributes.position;
  for (var o2 = 0; o2 < orbData.n; o2++) {
    orbData.us[o2] = (orbData.us[o2] + dt * 0.035) % 1;
    for (var t3 = 0; t3 < orbData.tail; t3++) {
      var u2 = (orbData.us[o2] - t3 * 0.008 + 1) % 1;
      orbData.rail.getPointAt(u2, _v);
      oa.setXYZ(o2 * orbData.tail + t3, _v.x, _v.y, _v.z);
    }
  }
  oa.needsUpdate = true;

  // 氣球（點擊 → bounceT 果凍彈跳）
  for (var b2 = 0; b2 < 16; b2++) {
    var bd2 = balloonData[b2];
    var bSquash = 1;
    if (bd2.bounceT < 1.2) {
      bd2.bounceT += dt;
      bSquash = 1 + Math.sin(bd2.bounceT * 16) * 0.22 * (1 - bd2.bounceT / 1.2);
    }
    if (bd2.kind === 'drift') {
      bd2.x += bd2.vx * dt;
      if (bd2.x > 85) bd2.x = -85;
      _v.set(bd2.x, bd2.y + Math.sin(et * 0.5 + bd2.ph) * 1.4, bd2.z);
      _e.set(0, 0, 0.06 * Math.sin(et * 0.7 + bd2.ph)); _q.setFromEuler(_e);
      _m.compose(_v, _q, _s.set(2 - bSquash, bSquash, 2 - bSquash));
    } else if (bd2.active) {
      bd2.t += dt;
      bd2.y += 3 * dt;
      var sway = Math.sin(bd2.t * 2.2) * 0.4;
      if (bd2.y > 34) { bd2.active = false; _m.compose(_v.set(0, -99, 0), _q.identity(), _s.set(0.001, 0.001, 0.001)); }
      else {
        _e.set(0, 0, 0.1 * Math.sin(bd2.t * 2)); _q.setFromEuler(_e);
        _m.compose(_v.set(bd2.x + sway, bd2.y, bd2.z), _q, _s.set(2 - bSquash, bSquash, 2 - bSquash));
      }
    } else {
      _m.compose(_v.set(0, -99, 0), _q.identity(), _s.set(0.001, 0.001, 0.001));
    }
    balloonInst.setMatrixAt(b2, _m);
  }
  balloonInst.instanceMatrix.needsUpdate = true;

  // 白鷺（點擊 → 全群驚飛：加速、爬升、急拍翅）/ 蝴蝶
  if (birdInst) {
    for (var bd3 = 0; bd3 < birdData.length; bd3++) {
      var B = birdData[bd3];
      var panic = B.panicT < 2.4;
      if (panic) B.panicT += dt;
      var pF = panic ? (1 - B.panicT / 2.4) : 0;
      var ba = et * B.sp * (1 + pF * 2.4) + B.ph + (panic ? pF * 0.8 : 0);
      var flap = 0.5 + 0.5 * Math.abs(Math.sin(et * (7 + pF * 9) + B.ph));
      _e.set(0, -ba - Math.PI / 2, 0); _q.setFromEuler(_e);
      _m.compose(_v.set(Math.cos(ba) * (B.r + pF * 6), B.y + Math.sin(et * 1.2 + B.ph) * 1.2 + pF * 7, Math.sin(ba) * (B.r + pF * 6)), _q, _s.set(1, flap, 1));
      birdInst.setMatrixAt(bd3, _m);
    }
    birdInst.instanceMatrix.needsUpdate = true;
    for (var bf2 = 0; bf2 < bflyData.length; bf2++) {
      var F = bflyData[bf2];
      var flap2 = 0.4 + 0.6 * Math.abs(Math.sin(et * 11 + F.ph));
      _q.setFromAxisAngle(UP, et * 0.8 + F.ph);
      _m.compose(_v.set(F.cx + Math.sin(et * F.s1 + F.ph) * 2.4, 1.2 + Math.sin(et * F.s2 * 2 + F.ph) * 0.7, F.cz + Math.cos(et * F.s2 + F.ph) * 2.4), _q, _s.set(0.32, 0.32 * flap2, 0.32));
      bflyInst.setMatrixAt(bf2, _m);
    }
    bflyInst.instanceMatrix.needsUpdate = true;
  }

  // 沙漠狐：繞著家附近蹦跳；受驚快跑（會沿建築外緣滑開，不穿牆）
  if (bunnyInst) {
    for (var bn2 = 0; bn2 < bunnyData.length; bn2++) {
      var BY = bunnyData[bn2];
      var fleeing = BY.fleeT > 0;
      if (fleeing) BY.fleeT -= dt;
      var go = fleeing || Math.sin(et * 0.35 + BY.ph) > -0.25;
      if (go) BY.a += dt * BY.sp * (fleeing ? 5 : 1);
      var bx = BY.x + Math.cos(BY.a) * BY.r * (fleeing ? 1.6 : 1);
      var bz = BY.z + Math.sin(BY.a) * BY.r * (fleeing ? 1.6 : 1);
      // 避開建築排除區：命中圓 → 推到圓外緣（沿切線滑開）
      for (var ex2 = 0; ex2 < EXCLUDE.length; ex2++) {
        var EX = EXCLUDE[ex2];
        var dx3 = bx - EX.x, dz3 = bz - EX.z;
        var dd3 = dx3 * dx3 + dz3 * dz3;
        if (dd3 < EX.r * EX.r && dd3 > 1e-4) {
          var dl = Math.sqrt(dd3);
          bx = EX.x + dx3 / dl * (EX.r + 0.2);
          bz = EX.z + dz3 / dl * (EX.r + 0.2);
        }
      }
      var hop = go ? Math.max(0, Math.sin(et * (fleeing ? 10 : 5) + BY.ph)) * (fleeing ? 0.5 : 0.32) : 0;
      _q.setFromAxisAngle(UP, -BY.a);
      _m.compose(_v.set(bx, 0.6 + hop, bz), _q, _s.set(1, 1, 1));
      bunnyInst.setMatrixAt(bn2, _m);
    }
    bunnyInst.instanceMatrix.needsUpdate = true;
  }

  // 駱駝商隊：沿環城大巡遊外側慢走
  if (camelInst) {
    for (var cm2 = 0; cm2 < camelData.length; cm2++) {
      var CM = camelData[cm2];
      CM.u = (CM.u + dt * 0.0042) % 1;
      PATHS[1].getPointAt(CM.u, _v);
      PATHS[1].getTangentAt(CM.u, _v2);
      _v.x += _v2.z * 2.2; _v.z += -_v2.x * 2.2; // 走在巡遊路徑外側車道
      CM.px = _v.x; CM.pz = _v.z;
      var cJump = 0;
      if (CM.jumpT < 1.2) { CM.jumpT += dt; cJump = Math.abs(Math.sin(CM.jumpT / 1.2 * Math.PI * 2)) * 0.7; }
      var cBob = 0.06 * Math.sin(et * 3 + cm2 * 2);
      _e.set(0, Math.atan2(_v2.x, _v2.z), 0.04 * Math.sin(et * 2.4 + cm2)); _q.setFromEuler(_e);
      _m.compose(_v2.set(_v.x, 1.45 + cBob + cJump, _v.z), _q, _s.set(1, 1, 1));
      camelInst.setMatrixAt(cm2, _m);
    }
    camelInst.instanceMatrix.needsUpdate = true;
  }

  // 沙塵（點建物噴發）
  if (dustPts) {
    var dua = dustPts.geometry.attributes.position;
    var anyDust = false;
    for (var du2 = 0; du2 < dustData.length; du2++) {
      var DU2 = dustData[du2];
      if (DU2.life <= 0) continue;
      anyDust = true;
      DU2.life -= dt;
      DU2.vy -= 2.2 * dt;
      DU2.x += DU2.vx * dt; DU2.y += DU2.vy * dt; DU2.z += DU2.vz * dt;
      if (DU2.life <= 0 || DU2.y < 0.3) { DU2.life = 0; dua.setY(du2, -999); continue; }
      dua.setXYZ(du2, DU2.x, DU2.y, DU2.z);
    }
    if (anyDust) dua.needsUpdate = true;
  }

  // 落葉
  if (leafPts) {
    var la2 = leafPts.geometry.attributes.position;
    var anyLeaf = false;
    for (var lf2 = 0; lf2 < leafData.length; lf2++) {
      var L2 = leafData[lf2];
      if (L2.life <= 0) continue;
      anyLeaf = true;
      L2.life -= dt;
      L2.y -= L2.vy * dt;
      if (L2.y < 0.45 || L2.life <= 0) { L2.life = 0; la2.setY(lf2, -999); continue; }
      la2.setXYZ(lf2, L2.x + Math.sin(et * 2.2 + L2.ph) * 0.5, L2.y, L2.z + Math.cos(et * 1.8 + L2.ph) * 0.35);
    }
    if (anyLeaf) la2.needsUpdate = true;
  }

  // 風箏搖曳 + 牽線更新
  for (var kk = 0; kk < kites.length; kk++) {
    var KG = kites[kk];
    var KU = KG.userData;
    KG.position.set(
      KU.ax + Math.sin(et * 0.5 + KU.ph) * 3.5,
      KU.ay + Math.sin(et * 0.8 + KU.ph) * 1.8,
      KU.az + Math.cos(et * 0.4 + KU.ph) * 2.5
    );
    KG.rotation.z = Math.sin(et * 0.9 + KU.ph) * 0.22;
    KG.rotation.y = Math.sin(et * 0.35 + KU.ph) * 0.4;
    var sp3 = KU.str.geometry.attributes.position;
    sp3.setXYZ(0, KU.ax * 0.72, 0.6, KU.az * 0.72);
    sp3.setXYZ(1, KG.position.x, KG.position.y - 1.2, KG.position.z);
    sp3.needsUpdate = true;
  }

  // 飛船
  for (var a3 = 0; a3 < airships.length; a3++) {
    var sh = airships[a3];
    var u3 = ((et / sh.userData.period) + sh.userData.ph) % 1;
    sh.userData.route.getPointAt(u3, sh.position);
    sh.userData.route.getTangentAt(u3, _v2);
    sh.rotation.y = Math.atan2(_v2.x, _v2.z) - Math.PI / 2;
    sh.userData.prop.rotation.x = et * 12;
  }

  // 禮盒上架動畫
  for (var da = dockAnims.length - 1; da >= 0; da--) {
    var an = dockAnims[da];
    an.t += dt * 2.4;
    var k2 = Math.min(an.t, 1);
    var pop = k2 < 0.7 ? (0.4 + 0.9 * (k2 / 0.7)) : (1.3 - 0.3 * ((k2 - 0.7) / 0.3));
    var slot = dockSlotPos(an.idx);
    _m.compose(_v.set(slot.x, slot.y, slot.z), _q.identity(), _s.set(pop, pop, pop));
    dockBoxes.setMatrixAt(an.idx, _m);
    dockBoxes.instanceMatrix.needsUpdate = true;
    if (k2 >= 1) dockAnims.splice(da, 1);
  }

  // 彈窗
  for (var pp = 0; pp < popupPool.length; pp++) {
    var P2 = popupPool[pp];
    if (!P2.active) continue;
    P2.t += dt;
    P2.sprite.position.y += dt * 1.1;
    P2.sprite.material.opacity = clamp(1 - P2.t / P2.dur, 0, 1);
    if (P2.t >= P2.dur) { P2.active = false; P2.sprite.visible = false; }
  }

  // 門脈衝
  if (doorPulseT < 2) {
    doorPulseT += dt;
    doorMat.opacity = 0.35 + 0.5 * Math.abs(Math.sin(doorPulseT * 9));
  } else if (doorMat.opacity !== doorBaseOpacity) {
    doorMat.opacity = doorBaseOpacity;
  }

  // 瀑布
  if (!LITE) for (var wf2 = 0; wf2 < waterfallTexs.length; wf2++) waterfallTexs[wf2].offset.y -= dt * 0.55;

  // 品牌水晶
  brandCrystal.rotation.y += dt * 0.15;
  brandCrystal.position.y = 21 + Math.sin(et * 0.9) * 0.5;
  brandCore.rotation.y -= dt * 0.3;

  // 看板漂浮 + 面向鏡頭
  for (var bb2 = 0; bb2 < billboards.length; bb2++) {
    var B2 = billboards[bb2];
    B2.group.position.y += Math.sin(et * 0.8 + B2.bobPhase) * dt * 0.25;
    B2.group.lookAt(camera.position);
  }
  // 巨幕小島浮動
  screenIslandGroup.position.y = 9 + Math.sin(et * 0.55) * 0.6;
  // EQ 條重繪（2Hz）
  jumboEqT += dt;
  if (world.metaData && jumboEqT - (paintJumbo._last || 0) > 0.5) { paintJumbo._last = jumboEqT; paintJumbo(); }
}

var doorPulseT = 99, doorBaseOpacity = 0.35;
var workingTimers = [];
var evToggle = false;
function fireEvent(ev) {
  if (!world.ok) return;
  var wk = workerList[ev.worker];
  var tScale = DEMO ? 4 : 1;
  doorPulseT = 0;
  Music.sfx('order');
  if (wk) {
    var npc = npcs[wk.npcSlot];
    npc.jumpT = 0;
    popupAt(npc.pos.x, npc.pos.y + 2.6, npc.pos.z, '新訂單 ✦ ' + ev.product, fmt(ev.amount));
  }
  // 交替演出：快遞氣球出貨 ↔ 礦工快送寶石進宮賣錢
  evToggle = !evToggle;
  var expressMiner = null;
  if (!evToggle) {
    for (var m3 = MINER_BASE; m3 < MINER_BASE + 3; m3++) {
      if (npcs[m3].mine && npcs[m3].mine.phase === 'dig' && !npcs[m3].mine.express && npcs[m3].targetScale > 0) {
        expressMiner = npcs[m3];
        break;
      }
    }
  }
  if (expressMiner) {
    expressMiner.mine.express = ev; // 立即帶著發光寶石出發，抵達宮殿時 +NT$ + 金幣
  } else {
    // 快遞員：門口 → 發射台
    workingTimers.push(setTimeout(function () {
      for (var c8 = COURIER_BASE; c8 < COURIER_BASE + 3; c8++) {
        if (npcs[c8].courierT === undefined && npcs[c8].targetScale === 0) {
          npcs[c8].courierT = 0;
          npcs[c8].courierDur = 5 / tScale;
          npcs[c8].targetScale = 1;
          npcs[c8].scale = 0.6;
          break;
        }
      }
    }, 800 / tScale));
    // 到達發射台：氣球升空 + 金幣 + 飄字 + 禮盒上架
    workingTimers.push(setTimeout(function () {
      launchBalloon(30, 0.4, -14);
      burstCoins(30, 1.2, -14, 24);
      popupAt(30, 4.2, -14, '+' + fmt(ev.amount), null);
      world.setBoxCount(Math.min(dockShown + 1, 12));
    }, 6000 / tScale));
  }
  if (workingTimers.length > 60) workingTimers.splice(0, 30);
  requestFly('order');
}

var bannerSprite = null, bannerTimer = null;
function celebrate(text) {
  if (!world.ok) return;
  Music.sfx('celebrate');
  if (bannerSprite) { scene.remove(bannerSprite); bannerSprite.material.dispose(); bannerSprite = null; }
  bannerSprite = makeLabel(text, 'banner');
  bannerSprite.position.set(0, 15, -16);
  bannerSprite.scale.multiplyScalar(2.4);
  scene.add(bannerSprite);
  var isMilestone = text.indexOf('%') >= 0;
  var bursts = isMilestone ? 8 : 3;
  var cols = [0xE88CA3, 0xC9A961, 0xF5EFE4, 0xD4456A];
  for (var b3 = 0; b3 < bursts; b3++) {
    (function (bi) {
      workingTimers.push(setTimeout(function () {
        firework((Math.random() - 0.5) * 40, 26 + Math.random() * 8, -22 + (Math.random() - 0.5) * 20, cols[bi % 4]);
      }, bi * 700));
    })(b3);
  }
  burstCoins(0, 6, -18, 40);
  workerList.forEach(function (wk) { npcs[wk.npcSlot].jumpT = 0; });
  clearTimeout(bannerTimer);
  bannerTimer = setTimeout(function () {
    if (bannerSprite) { scene.remove(bannerSprite); bannerSprite.material.dispose(); bannerSprite = null; }
  }, 5200);
  requestFly(isMilestone ? 'milestone' : 'daily');
}

    while (nextT < ctx.currentTime + 0.12) {

      nextT += STEP_DUR[step % 2];
      step++;
      if (step >= 4) { step = 0; bar++; } // 每小節 4 步（四分音符）
    }
  }
  function startScheduler() {
    if (timer) return;
    nextT = ctx.currentTime + 0.06;
    timer = setInterval(tick, 25);
    started = true;
    updateBtn();
    setTimeout(function () { if (!muted) $('sndBtn').classList.add('faded'); }, 8000);
  }
  function updateBtn() {
    var b = $('sndBtn');
    b.style.display = 'block';
    b.textContent = muted ? '🔇' : '🔊';
    b.classList.remove('faded');
  }
  function tryStart() {
    if (muted || started) return;
    if (!ctx) init();
    ctx.resume().then(function () {
      if (ctx.state === 'running') startScheduler();
    }).catch(function () {});
  }
  return {
    boot: function () {
      try { muted = q.has('mute') || localStorage.getItem('tzg_live_muted') === '1'; } catch (e) { muted = q.has('mute'); }
      if (muted) { updateBtn(); }
      else {
        tryStart();
        setTimeout(function () { if (!started) updateBtn(); }, 800);
        document.addEventListener('pointerdown', function once() { // 首次點擊解鎖
          document.removeEventListener('pointerdown', once);
          tryStart();
        });
      }
      $('sndBtn').addEventListener('click', function (ev) {
        ev.stopPropagation();
        muted = !muted;
        try { localStorage.setItem('tzg_live_muted', muted ? '1' : '0'); } catch (e) {}
        if (muted) { if (ctx) ctx.suspend(); updateBtn(); }
        else { started = false; if (timer) { clearInterval(timer); timer = null; } updateBtn(); tryStart(); }
      });
    },
    onVisibility: function (hidden) {
      if (!ctx || muted) return;
      if (hidden) ctx.suspend();
      else { ctx.resume(); nextT = ctx.currentTime + 0.06; }
    },
    sfx: function (type) {
      if (!ctx || ctx.state !== 'running' || muted) return;
      var nowS = ctx.currentTime;
      var throttle = { order: 1.5, celebrate: 10, boat: 8, pop: 0.25, rustle: 0.8, thud: 0.3, chirp: 1.2 }[type] || 2;
      if (sfxLast[type] && nowS - sfxLast[type] < throttle) return;
      sfxLast[type] = nowS;
      if (type === 'order') {
        playBell(1318.5, nowS, 0.55, busSfx);
        playBell(1568, nowS + 0.12, 0.45, busSfx);
      } else if (type === 'celebrate') {
        [0, 4, 7, 12, 16].forEach(function (sm, i2) { playCelesta(freq(sm + 24), nowS + i2 * 0.12, 0.5); });
      } else if (type === 'pop') {
        var op = ctx.createOscillator(); op.type = 'sine';
        op.frequency.setValueAtTime(520, nowS);
        op.frequency.linearRampToValueAtTime(880, nowS + 0.07);
        var gp2 = ctx.createGain();
        env(gp2, nowS, 0.004, 0.1, 0.05);
        op.connect(gp2); gp2.connect(busSfx);
        op.start(nowS); op.stop(nowS + 0.25);
      } else if (type === 'rustle') {
        var sr = ctx.createBufferSource(); sr.buffer = noiseBuf;
        var bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 0.8;
        var gr = ctx.createGain();
        env(gr, nowS, 0.02, 0.09, 0.14);
        sr.connect(bp); bp.connect(gr); gr.connect(busSfx);
        sr.start(nowS); sr.stop(nowS + 0.6);
      } else if (type === 'boat') {
        var o = ctx.createOscillator(); o.type = 'triangle';
        o.frequency.setValueAtTime(196, nowS);
        o.frequency.linearRampToValueAtTime(147, nowS + 0.4);
        var g = ctx.createGain();
        env(g, nowS, 0.05, 0.08, 0.25);
        var lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600;
        o.connect(g); g.connect(lp); lp.connect(busSfx);
        o.start(nowS); o.stop(nowS + 0.7);
      } else if (type === 'thud') {
        // 建物搖晃：低沉「咚」＋一點沙聲
        var ot = ctx.createOscillator(); ot.type = 'sine';
        ot.frequency.setValueAtTime(180, nowS);
        ot.frequency.exponentialRampToValueAtTime(70, nowS + 0.16);
        var gt2 = ctx.createGain();
        env(gt2, nowS, 0.004, 0.14, 0.09);
        ot.connect(gt2); gt2.connect(busSfx);
        ot.start(nowS); ot.stop(nowS + 0.4);
        var st3 = ctx.createBufferSource(); st3.buffer = noiseBuf;
        var bt = ctx.createBiquadFilter(); bt.type = 'bandpass'; bt.frequency.value = 900; bt.Q.value = 0.6;
        var gn2 = ctx.createGain();
        env(gn2, nowS, 0.008, 0.04, 0.08);
        st3.connect(bt); bt.connect(gn2); gn2.connect(busSfx);
        st3.start(nowS); st3.stop(nowS + 0.3);
      } else if (type === 'chirp') {
        // 白鷺驚飛：兩聲高音啁啾
        [0, 0.14].forEach(function (dt4) {
          var oc2 = ctx.createOscillator(); oc2.type = 'sine';
          oc2.frequency.setValueAtTime(2100, nowS + dt4);
          oc2.frequency.linearRampToValueAtTime(2800, nowS + dt4 + 0.05);
          oc2.frequency.linearRampToValueAtTime(1900, nowS + dt4 + 0.1);
          var gc2 = ctx.createGain();
          env(gc2, nowS + dt4, 0.006, 0.06, 0.05);
          oc2.connect(gc2); gc2.connect(busSfx);
          oc2.start(nowS + dt4); oc2.stop(nowS + dt4 + 0.3);
        });
      }
    },
    state: function () {
      if (muted) return 'muted';
      if (!ctx) return 'off';
      return started && ctx.state === 'running' ? 'running' : ctx.state;
    }
  };
})();

/* ═══════════════ 14. 主渲染迴圈 ═══════════════ */
var rafActive = false;
var fpsEMA = 60, dbgT = 0;
function loop() {
  if (document.hidden) { rafActive = false; return; }
  rafActive = true;
  requestAnimationFrame(loop);
  var dt = Math.min(clock3.getDelta(), 0.1);
  et += dt;
  updateNPCs(dt);
  updateParticles(dt);
  updateTown(dt);
  updateStudio(dt);
  updateWobbles(dt);
  updateCamera(dt);
  renderer.render(scene, camera);
  if (DEBUG) {
    fpsEMA = fpsEMA * 0.95 + (dt > 0 ? 1 / dt : 60) * 0.05;
    dbgT += dt;
    if (dbgT > 0.5) {
      dbgT = 0;
      var inf = renderer.info;
      $('debugHud').textContent =
        'fps  ' + fpsEMA.toFixed(0) +
        '\ncalls ' + inf.render.calls +
        '\ntris  ' + inf.render.triangles +
        '\ngeo   ' + inf.memory.geometries +
        '\ntex   ' + inf.memory.textures;
      document.title = 'fps:' + fpsEMA.toFixed(0) + ' calls:' + inf.render.calls;
    }
  }
}
document.addEventListener('visibilitychange', function () {
  Music.onVisibility(document.hidden);
  if (!document.hidden) {
    if (D) renderNow(true);
    if (world.ok && !rafActive) { clock3.getDelta(); requestAnimationFrame(loop); }
  }
});

/* ═══════════════ 15. 主迴圈（1 Hz 數字） ═══════════════ */
var regShown = 0, regTarget = 0, tweenRAF = null;
world.todayOrders = 0; world.monthRev = 0; world.monthOrders = 0;
function setRegister(target) {
  if (Math.round(target) === Math.round(regTarget)) return;
  regTarget = target;
  if (document.hidden || !world.ok) { regShown = regTarget; paintToday(); return; }
  var from = regShown, start = performance.now(), dur = 1300;
  cancelAnimationFrame(tweenRAF);
  (function step(ts) {
    var p = clamp((ts - start) / dur, 0, 1);
    var e2 = 1 - Math.pow(1 - p, 3);
    regShown = from + (regTarget - from) * e2;
    if (Math.round(regShown) !== lastTodayInt) { lastTodayInt = Math.round(regShown); paintToday(); }
    if (p < 1) tweenRAF = requestAnimationFrame(step);
  })(start);
}

function renderNow(skipAnim) {
  if (!D) return;
  var t = now();

  if (startOfDay(t) !== sim.dayStart) { buildSim(); skipAnim = true; }

  var msOfDay = t - sim.dayStart;
  var simSum = 0, simCount = 0;
  var newEvents = [];
  for (var i = 0; i < sim.events.length; i++) {
    var ev = sim.events[i];
    if (ev.t <= msOfDay) {
      simSum += ev.amount; simCount++;
      if (!skipAnim && ev.t > lastTickMs && msOfDay - ev.t < 15e3 * SPEED) newEvents.push(ev);
    } else break;
  }
  lastTickMs = msOfDay;

  var revMtd = (D.kpi && D.kpi.rev_mtd) || 0;
  var ordersMtd = (D.kpi && D.kpi.orders_mtd) || 0;
  var displayedToday = sim.realTodayRev + simSum;
  var displayedMTD = revMtd + simSum;
  var displayedTodayOrders = sim.realTodayOrders + simCount;
  var pct = D.target > 0 ? (displayedMTD / D.target) * 100 : 0;

  world.todayOrders = displayedTodayOrders;
  var monthChanged = world.monthRev !== displayedMTD;
  world.monthRev = displayedMTD;
  world.monthOrders = ordersMtd + simCount;

  if (world.ok) {
    setRegister(displayedToday);
    if (monthChanged) paintMonth();
    // 目標塔
    var fillPct = clamp(pct, 0, 100);
    gaugeFill.scale.y = Math.max(fillPct / 100, 0.01);
    crownGroup.visible = pct >= 100;
    var pctStr = pct.toFixed(1) + '%';
    if (gaugePctSprite._last !== pctStr) {
      gaugePctSprite._last = pctStr;
      var g = gaugePctSprite.canvas.getContext('2d');
      g.clearRect(0, 0, 256, 96);
      g.textAlign = 'center'; g.textBaseline = 'middle';
      g.font = '700 62px "Cormorant Garamond"';
      g.lineWidth = 8; g.strokeStyle = 'rgba(20,10,16,.8)';
      g.strokeText(pctStr, 128, 48);
      g.fillStyle = '#C9A961';
      g.fillText(pctStr, 128, 48);
      gaugePctSprite.tex.needsUpdate = true;
    }
    world.setBoxCount(Math.max(dockShown, Math.min(simCount, 12)));
    // 月營收大道：本月柱隨模擬營收即時長高
    if (DYN._pillars && DYN._curIdx >= 0 && monthChanged) {
      var hCur = 1 + 7 * clamp(displayedMTD / DYN._M, 0, 1.15);
      _m.compose(_v.set(DYN._curX, 0.75, DYN._curZ), _q.identity(), _s.set(1, hCur, 1));
      DYN._pillars.setMatrixAt(DYN._curIdx, _m);
      DYN._pillars.instanceMatrix.needsUpdate = true;
    }
  } else {
    // 精簡 fallback
    $('fbToday').textContent = fmt(displayedToday);
    $('fbMonth').textContent = fmt(displayedMTD);
    $('fbPct').textContent = pct.toFixed(1) + '%';
  }

  // 慶祝
  var dayKey = ymd(t);
  if (displayedToday >= sim.dailyTarget && sim.dailyTarget > 0) {
    var dk = 'tzg_daily_' + dayKey;
    var already = false;
    try { already = sessionStorage.getItem(dk) === '1'; } catch (e) {}
    if (!already && !skipAnim) {
      try { sessionStorage.setItem(dk, '1'); } catch (e) {}
      celebrate('今日達標 🎉');
    } else if (!already) {
      try { sessionStorage.setItem(dk, '1'); } catch (e) {}
    }
  }
  if (prevPct !== null && !skipAnim) {
    [25, 50, 75, 100].forEach(function (mst) {
      if (prevPct < mst && pct >= mst && !firedMilestones[dayKey + mst]) {
        firedMilestones[dayKey + mst] = true;
        celebrate('本月達成 ' + mst + '% 🏆');
      }
    });
  }
  prevPct = pct;

  if (!skipAnim) newEvents.slice(-3).forEach(fireEvent);

  updateAmbience(t);
}

/* ═══════════════ 16. 強健性 / 啟動 ═══════════════ */
setInterval(function () {
  if (TIME_TRAVEL) return;
  var d = new Date();
  if (d.getHours() === 4 && d.getMinutes() === 30) {
    var key = 'tzg_live_reload';
    try {
      if (localStorage.getItem(key) !== ymd(Date.now())) {
        localStorage.setItem(key, ymd(Date.now()));
        location.reload();
      }
    } catch (e) { location.reload(); }
  }
}, 30e3);

// 字型載入完成後重繪動態 canvas（首繪可能用到後備字型）
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(function () {
    if (!world.ok) return;
    // 就地重繪快取標籤（不 dispose，場上 sprite 直接更新）
    labelCache.forEach(function (v) {
      drawTextCanvas(v.canvas, v.text, TEXT_STYLES[v.styleKey]);
      v.tex.needsUpdate = true;
    });
    paintToday(); paintMonth(); paintJumbo();
    if (D) rebuildDistricts(); // 標籤合板需重建
  });
}

// 驗證掛鉤
window.__world = {
  scene: function () { return scene; }, // 驗證用
  pick: function (fx, fy) { // 驗證用：以畫面比例座標射線，回傳最先命中的物件描述
    if (!world.ok) return null;
    var rc = new THREE.Raycaster();
    rc.setFromCamera(new THREE.Vector2(fx * 2 - 1, -(fy * 2 - 1)), camera);
    var all = [];
    scene.traverse(function (o) { if (o.isMesh || o.isSprite) all.push(o); });
    var hits = rc.intersectObjects(all, false);
    if (!hits.length) return null;
    var h = hits[0];
    return {
      obj: h.object.type,
      geo: h.object.geometry ? h.object.geometry.type : null,
      inst: h.instanceId === undefined ? null : h.instanceId,
      at: [+h.point.x.toFixed(1), +h.point.y.toFixed(1), +h.point.z.toFixed(1)]
    };
  },

  debugState: function () {
    var act = 0;
    for (var i = 0; i < npcs.length; i++) if (npcs[i].scale > 0.02) act++;
    var m22 = new THREE.Matrix4();
    if (world.ok && npcParts.body) npcParts.body.getMatrixAt(22, m22);
    return {
      ok: world.ok,
      today: Math.round(regTarget),
      pct: prevPct,
      calls: world.ok ? renderer.info.render.calls : 0,
      geometries: world.ok ? renderer.info.memory.geometries : 0,
      textures: world.ok ? renderer.info.memory.textures : 0,
      activeNPCs: act,
      staff0: npcs[STAFF_BASE] ? { s: +npcs[STAFF_BASE].scale.toFixed(2), ts: npcs[STAFF_BASE].targetScale, x: +npcs[STAFF_BASE].pos.x.toFixed(1), z: +npcs[STAFF_BASE].pos.z.toFixed(1) } : null,
      bodyM: Array.from(m22.elements.slice(12, 15)).map(function (x) { return +x.toFixed(1); }),
      districts: !!DYN.monthly,
      audio: Music.state(),
      boats: boats.filter(function (b) { return b.state !== 'cooldown'; }).length,
      labels: labelCache.size,
      wobbles: wobbles.length,
      quarters: DYN._qRevs || null,
      annualTarget: world.annualTarget || 0,
      camLift: +camLiftCur.toFixed(2)
    };
  }
};

initWorld();
Music.boot();
loadData();
loadMeta();
loadAnnualPlan();
setInterval(function () { if (D) renderNow(false); }, DEMO ? 250 : 1000);
if (!DEMO) {
  setInterval(loadData, 10 * 60e3);
  setInterval(loadMeta, 30 * 60e3);
  setInterval(loadAnnualPlan, 6 * 3600e3);
}
</script>
</body>
